
<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>ChatBI 智能数据助手</title>
    <script src="echarts.min.js"></script>
    <script src="marked.min.js?v=2"></script>
    <script src="https://cdn.jsdelivr.net/npm/mermaid@10/dist/mermaid.min.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        :root {
            --primary: #4f6ef7;
            --primary: #4f6ef7;
            --primary-dark: #3451d1;
            --primary-light: rgba(79,110,247,0.09);
            --primary-glow: rgba(79,110,247,0.22);
            --accent: #06b6d4;
            --bg: #eef1fb;
            --surface: #ffffff;
            --surface2: #f4f6fe;
            --border: rgba(79,110,247,0.12);
            --border-active: rgba(79,110,247,0.5);
            --text: #1b2040;
            --text-sub: #5c6484;
            --text-hint: #9ba3c4;
            --radius-lg: 20px;
            --radius-md: 14px;
            --radius-sm: 10px;
            --shadow-sm: 0 2px 14px rgba(79,110,247,0.10);
            --shadow-md: 0 8px 32px rgba(79,110,247,0.16);
        }
        html, body {
            height: 100%; overflow: hidden;
            font-family: -apple-system, BlinkMacSystemFont, 'PingFang SC', 'Noto Sans SC', 'Helvetica Neue', sans-serif;
            background: var(--bg); color: var(--text);
            -webkit-font-smoothing: antialiased;
        }

        /* ── Layout ── */
        .app-shell { position: fixed; top: 0; left: 0; right: 0; bottom: 0; display: flex; flex-direction: column; overflow: hidden; }

        /* ── Header ── */
        .header {
            background: linear-gradient(135deg, #5875f8 0%, #4264f5 40%, #2e4fd4 100%);
            color: #fff; padding: 13px 16px;
            display: flex; align-items: center; justify-content: space-between;
            flex-shrink: 0; box-shadow: 0 3px 24px rgba(52,81,209,0.30); z-index: 10;
        }
        .header h1 { font-size: 1rem; font-weight: 700; display: flex; align-items: center; gap: 8px; }
        .header-right { display: flex; gap: 8px; }
        .header-btn {
            background: rgba(255,255,255,0.15); border: 1px solid rgba(255,255,255,0.25);
            color: #fff; padding: 6px 12px; border-radius: 8px; cursor: pointer;
            font-size: 0.82rem; transition: background 0.2s;
        }
        .header-btn:hover { background: rgba(255,255,255,0.28); }

        /* ── Main area ── */
        .main { flex: 1; display: flex; overflow: hidden; }

        /* ── Sidebar ── */
        .sidebar { width: 240px; background: var(--surface); border-right: 1px solid var(--border); display: flex; flex-direction: column; flex-shrink: 0; }
        .sidebar-header { padding: 12px; border-bottom: 1px solid var(--border); }
        .new-chat-btn {
            width: 100%; background: var(--primary); color: #fff; border: none;
            padding: 9px 12px; border-radius: var(--radius-sm); cursor: pointer;
            font-size: 0.88rem; font-weight: 600; transition: background 0.2s;
        }
        .new-chat-btn:hover { background: var(--primary-dark); }
        .session-list { flex: 1; overflow-y: auto; padding: 8px; }
        .session-item {
            padding: 9px 10px; border-radius: var(--radius-sm); cursor: pointer;
            font-size: 0.83rem; color: var(--text-sub); white-space: nowrap;
            overflow: hidden; text-overflow: ellipsis; transition: background 0.15s;
            display: flex; justify-content: space-between; align-items: center; margin-bottom: 2px;
        }
        .session-item:hover, .session-item.active { background: var(--primary-light); color: var(--primary); }
        .session-del { opacity: 0; background: none; border: none; color: #e05; cursor: pointer; font-size: 0.78rem; padding: 2px 5px; border-radius: 4px; }
        .session-item:hover .session-del { opacity: 1; }

        /* ── Chat area ── */
        .chat-area { flex: 1; display: flex; flex-direction: column; overflow: hidden; background: var(--bg); }
        .messages { flex: 1; overflow-y: auto; -webkit-overflow-scrolling: touch; padding: 16px 14px; display: flex; flex-direction: column; gap: 14px; }
        .message { display: flex; flex-direction: column; }
        .message.user { align-items: flex-end; }
        .message.assistant { align-items: flex-start; }
        .message-label { font-size: 0.62rem; color: var(--text-hint); margin-bottom: 5px; font-weight: 700; letter-spacing: 0.08em; text-transform: uppercase; }

        /* User bubble */
        .message.user .message-content {
            max-width: 78%; padding: 11px 16px;
            border-radius: var(--radius-lg); border-bottom-right-radius: 5px;
            background: linear-gradient(135deg, #4f6ef7 0%, #3451d1 100%);
            color: #fff; line-height: 1.65; word-break: break-word; font-size: 0.9rem;
            box-shadow: 0 4px 16px rgba(79,110,247,0.30); white-space: pre-wrap;
        }

        /* AI bubble */
        .message.assistant .message-content {
            width: 100%; padding: 16px 18px;
            border-radius: var(--radius-lg); border-bottom-left-radius: 5px;
            background: linear-gradient(160deg, #ffffff 0%, #f8faff 100%);
            color: var(--text); word-break: break-word; font-size: 0.9rem;
            border: 1px solid rgba(79,110,247,0.10);
            box-shadow: 0 3px 16px rgba(79,110,247,0.09), 0 1px 3px rgba(79,110,247,0.05);
        }

        /* ── Markdown styles ── */
        .md-body { line-height: 1.8; }
        .md-body h1, .md-body h2, .md-body h3, .md-body h4, .md-body h5, .md-body h6 {
            font-weight: 700; color: var(--text); margin: 14px 0 8px; line-height: 1.35;
        }
        .md-body h1 { font-size: 1.15rem; border-bottom: 2px solid rgba(79,110,247,0.18); padding-bottom: 6px; margin-top: 6px; }
        .md-body h2 { font-size: 1.02rem; border-bottom: 1px solid rgba(79,110,247,0.12); padding-bottom: 4px; }
        .md-body h3 { font-size: 0.96rem; }
        .md-body h4 { font-size: 0.9rem; color: var(--text-sub); }
        .md-body p { margin: 6px 0; }
        .md-body ul, .md-body ol { padding-left: 20px; margin: 6px 0; }
        .md-body li { margin: 3px 0; line-height: 1.7; }
        .md-body strong { font-weight: 700; color: #1a1f3d; }
        .md-body em { font-style: italic; color: var(--text-sub); }
        .md-body a {
            color: var(--primary); text-decoration: none;
            border-bottom: 1px solid rgba(79,110,247,0.35);
            transition: border-color 0.2s, color 0.2s;
            word-break: break-all;
        }
        .md-body a:hover { color: var(--primary-dark); border-bottom-color: var(--primary-dark); }
        .md-body blockquote {
            margin: 10px 0; padding: 10px 14px;
            border-left: 3px solid var(--primary);
            background: var(--primary-light); border-radius: 0 8px 8px 0;
            color: var(--text-sub); font-size: 0.88rem;
        }
        .md-body hr { border: none; border-top: 1px solid var(--border); margin: 14px 0; }
        /* Inline code */
        .md-body code {
            background: #eef1fb; color: #3451d1; border-radius: 4px;
            padding: 1px 6px;
            font-family: 'JetBrains Mono', 'Cascadia Code', 'Courier New', monospace;
            font-size: 0.83em;
        }
        /* Code block */
        .md-body pre {
            background: #1e2235; border-radius: 10px;
            padding: 14px 16px; overflow-x: auto; margin: 10px 0;
            box-shadow: inset 0 2px 8px rgba(0,0,0,0.25);
        }
        .md-body pre code {
            background: transparent; color: #e2e8f5; padding: 0;
            font-size: 0.83rem; line-height: 1.7;
        }
        /* Table */
        .md-body table {
            border-collapse: collapse; width: 100%; font-size: 0.85rem;
            margin: 10px 0; border-radius: 8px; overflow: hidden;
            box-shadow: 0 1px 6px rgba(79,110,247,0.08);
        }
        .md-body th {
            background: linear-gradient(135deg, #4f6ef7 0%, #3a5bd9 100%);
            color: #fff; font-weight: 600; padding: 9px 12px; text-align: left;
        }
        .md-body td { padding: 8px 12px; border-bottom: 1px solid rgba(79,110,247,0.08); background: #fff; }
        .md-body tr:nth-child(even) td { background: #f6f8ff; }
        .md-body tr:last-child td { border-bottom: none; }
        .md-body tr:hover td { background: rgba(79,110,247,0.04); }
        /* Image */
        .md-body img { max-width: 100%; border-radius: 8px; margin: 6px 0; box-shadow: var(--shadow-sm); }

        /* ── ECharts container ── */
        .chart-container {
            width: 100%; height: 320px; margin: 12px 0;
            border-radius: 12px; background: #fff;
            border: 1px solid rgba(79,110,247,0.10);
            box-shadow: 0 2px 12px rgba(79,110,247,0.08);
        }

        /* ── Mermaid diagram container ── */
        .mermaid-container {
            margin: 12px 0; padding: 16px;
            border-radius: 12px; background: #fff;
            border: 1px solid rgba(79,110,247,0.10);
            box-shadow: 0 2px 12px rgba(79,110,247,0.08);
            overflow-x: auto; text-align: center;
        }
        .mermaid-container svg { max-width: 100%; height: auto; }

        /* ── Typing indicator ── */
        .typing-indicator {
            display: inline-flex; gap: 5px; align-items: center;
            padding: 12px 16px; background: var(--surface);
            border: 1px solid var(--border);
            border-radius: var(--radius-lg); border-bottom-left-radius: 5px;
            box-shadow: var(--shadow-sm);
        }
        .typing-dot { width: 6px; height: 6px; border-radius: 50%; background: var(--primary); animation: typingBounce 1.2s infinite; }
        .typing-dot:nth-child(2) { animation-delay: 0.2s; }
        .typing-dot:nth-child(3) { animation-delay: 0.4s; }
        @keyframes typingBounce { 0%,60%,100% { transform: translateY(0); opacity: 0.4; } 30% { transform: translateY(-6px); opacity: 1; } }

        /* ── Tool indicator ── */
        .tool-indicator {
            display: inline-flex; align-items: center; gap: 6px;
            font-size: 0.76rem; color: var(--primary);
            background: var(--primary-light); padding: 4px 10px;
            border-radius: 6px; margin-bottom: 8px;
            border: 1px solid rgba(79,110,247,0.15);
        }

        /* ── Tool waiting indicator (with dots animation) ── */
        .tool-indicator.waiting::after {
            content: '';
            display: inline-block;
            width: 14px; height: 14px;
            border: 2px solid var(--primary);
            border-top-color: transparent;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }
        @keyframes spin { to { transform: rotate(360deg); } }

        /* ── Thinking block (collapsible) ── */
        .thinking-block {
            background: #f8f9fc; border: 1px solid rgba(79,110,247,0.12);
            border-radius: 8px; margin: 8px 0; overflow: hidden;
        }
        .thinking-header {
            display: flex; align-items: center; gap: 6px; padding: 8px 12px;
            font-size: 0.78rem; color: var(--text-sub); cursor: pointer;
            background: rgba(79,110,247,0.04);
            user-select: none;
        }
        .thinking-header:hover { background: rgba(79,110,247,0.08); }
        .thinking-header::before { content: '🤔'; }
        .thinking-header .arrow { margin-left: auto; transition: transform 0.2s; }
        .thinking-block.collapsed .thinking-header .arrow { transform: rotate(-90deg); }
        .thinking-content {
            padding: 10px 12px; font-size: 0.85rem; color: var(--text-sub);
            border-top: 1px solid rgba(79,110,247,0.08); line-height: 1.6;
        }
        .thinking-block.collapsed .thinking-content { display: none; }

        /* ── Input area ── */
        .input-area {
            padding: 10px 14px;
            background: linear-gradient(180deg, #f8faff 0%, #ffffff 100%);
            border-top: 1px solid rgba(79,110,247,0.09);
            box-shadow: 0 -4px 20px rgba(79,110,247,0.07);
        }
        .context-bar { display: flex; gap: 6px; flex-wrap: wrap; margin-bottom: 8px; }
        .ctx-tag { font-size: 0.75rem; background: var(--primary-light); color: var(--primary); padding: 3px 8px; border-radius: 4px; }
        .input-row { display: flex; gap: 8px; align-items: flex-end; }
        .input-box {
            flex: 1; border: 1.5px solid rgba(79,110,247,0.15); border-radius: 22px;
            padding: 10px 16px; font-size: 0.95rem; font-family: inherit;
            resize: none; min-height: 44px; max-height: 120px; outline: none;
            transition: border-color 0.2s, box-shadow 0.2s;
            background: #fff; box-shadow: 0 1px 6px rgba(79,110,247,0.06);
        }
        .input-box:focus { border-color: var(--border-active); box-shadow: 0 0 0 3px rgba(79,110,247,0.1); }
        .input-box::placeholder { color: var(--text-hint); }
        .send-btn {
            width: 46px; height: 46px; flex-shrink: 0;
            background: linear-gradient(135deg, var(--primary) 0%, var(--primary-dark) 100%);
            color: #fff; border: none; border-radius: 16px; cursor: pointer;
            display: flex; align-items: center; justify-content: center;
            transition: opacity 0.2s, transform 0.15s;
            box-shadow: 0 4px 18px var(--primary-glow);
        }
        .send-btn:active { opacity: 0.85; transform: scale(0.90); }
        .send-btn:disabled { opacity: 0.35; cursor: not-allowed; box-shadow: none; }
        .interpret-btn {
            background: linear-gradient(135deg, #06b6d4, #0891b2); color: #fff;
            border: none; border-radius: 14px; padding: 0 14px; cursor: pointer;
            font-size: 0.82rem; font-weight: 600; height: 46px; transition: opacity 0.2s; flex-shrink: 0;
        }
        .interpret-btn:hover:not(:disabled) { opacity: 0.85; }
        .interpret-btn:disabled { opacity: 0.4; cursor: not-allowed; }

        /* ── Config panel ── */
        .config-panel {
            position: fixed; top: 0; right: 0; bottom: 0; width: 320px;
            background: var(--surface); box-shadow: var(--shadow-md);
            transform: translateX(100%); transition: transform 0.3s ease;
            z-index: 100; display: flex; flex-direction: column;
        }
        .config-panel.open { transform: translateX(0); }
        .config-panel-header { padding: 14px 16px; border-bottom: 1px solid var(--border); display: flex; justify-content: space-between; align-items: center; }
        .config-panel-header h3 { font-size: 0.95rem; font-weight: 700; }
        .close-config { background: none; border: none; cursor: pointer; font-size: 1.2rem; color: var(--text-sub); }
        .config-body { flex: 1; overflow-y: auto; padding: 14px; display: flex; flex-direction: column; gap: 12px; }
        .config-group label { display: block; font-size: 0.8rem; font-weight: 600; color: var(--text-sub); margin-bottom: 4px; }
        .config-input { width: 100%; border: 1.5px solid var(--border); border-radius: 8px; padding: 8px 10px; font-size: 0.85rem; font-family: inherit; outline: none; transition: border-color 0.2s; }
        .config-input:focus { border-color: var(--primary); }
        .config-save-btn { margin: 0 14px 14px; background: var(--primary); color: #fff; border: none; border-radius: var(--radius-sm); padding: 10px; cursor: pointer; font-size: 0.9rem; font-weight: 600; }

        /* ── Overlay ── */
        .overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.25); z-index: 99; display: none; }
        .overlay.visible { display: block; }

        /* ── Scrollbar ── */
        ::-webkit-scrollbar { width: 5px; }
        ::-webkit-scrollbar-thumb { background: rgba(79,110,247,0.2); border-radius: 10px; }

        /* ── Plan confirm overlay ── */
        .plan-confirm-overlay {
            position: absolute; bottom: 0; left: 0; right: 0;
            background: linear-gradient(180deg, rgba(238,241,251,0) 0%, rgba(238,241,251,0.96) 18%, #eef1fb 100%);
            padding: 24px 20px 14px;
            display: flex; flex-direction: column; align-items: center; gap: 10px;
            z-index: 5;
            animation: slideUp 0.25s ease;
        }
        @keyframes slideUp { from { opacity:0; transform:translateY(12px); } to { opacity:1; transform:translateY(0); } }
        .plan-confirm-title {
            font-size: 0.82rem; font-weight: 600; color: var(--text-sub);
            background: rgba(79,110,247,0.08); padding: 5px 12px;
            border-radius: 20px; border: 1px solid rgba(79,110,247,0.15);
        }
        .plan-confirm-btns { display: flex; gap: 10px; width: 100%; max-width: 420px; }
        .plan-confirm-btn {
            flex: 1; padding: 11px 0; border: none; border-radius: 12px;
            font-size: 0.9rem; font-weight: 600; cursor: pointer;
            transition: opacity 0.2s, transform 0.15s;
            box-shadow: 0 4px 16px rgba(0,0,0,0.12);
        }
        .plan-confirm-btn.execute {
            background: linear-gradient(135deg, #22c55e 0%, #16a34a 100%);
            color: #fff; box-shadow: 0 3px 14px rgba(34,197,94,0.35);
        }
        .plan-confirm-btn.abandon {
            background: linear-gradient(135deg, #f97316 0%, #ea580c 100%);
            color: #fff; box-shadow: 0 3px 14px rgba(249,115,22,0.30);
        }
        .plan-confirm-btn:active { transform: scale(0.96); }
        .plan-confirm-btn:hover:not(:disabled) { opacity: 0.88; }
        .plan-confirm-btn:disabled { opacity: 0.4; cursor: not-allowed; }

        /* ── Task board (collapsible panel above input) ── */
        .task-board {
            border-top: 1px solid rgba(79,110,247,0.10);
            background: var(--surface);
            flex-shrink: 0;
            overflow: hidden;
            transition: max-height 0.3s ease;
            max-height: 0;
        }
        .task-board.expanded { max-height: 220px; }
        .task-board-header {
            display: flex; align-items: center; gap: 6px;
            padding: 6px 14px; cursor: pointer;
            font-size: 0.78rem; font-weight: 600; color: var(--text-sub);
            background: var(--surface2);
            border-bottom: 1px solid rgba(79,110,247,0.08);
            user-select: none;
            transition: background 0.15s;
        }
        .task-board-header:hover { background: var(--primary-light); color: var(--primary); }
        .task-board-toggle { margin-left: auto; font-size: 0.72rem; transition: transform 0.25s; }
        .task-board.expanded .task-board-toggle { transform: rotate(180deg); }
        .task-board-badge {
            background: var(--primary); color: #fff;
            border-radius: 10px; padding: 1px 7px; font-size: 0.7rem;
        }
        .task-board-body {
            overflow-y: auto; max-height: 170px; padding: 8px 14px 10px;
            display: flex; flex-direction: column; gap: 5px;
        }
        .task-item {
            display: flex; align-items: center; gap: 8px;
            padding: 6px 10px; border-radius: 8px;
            font-size: 0.82rem; background: var(--surface2);
            border: 1px solid transparent;
        }
        .task-item.todo { border-color: rgba(79,110,247,0.1); color: var(--text-sub); }
        .task-item.in_progress {
            border-color: rgba(79,110,247,0.3);
            background: rgba(79,110,247,0.06); color: var(--primary); font-weight: 600;
        }
        .task-item.done {
            border-color: rgba(34,197,94,0.2);
            background: rgba(34,197,94,0.05); color: #15803d;
        }
        .task-item.failed {
            border-color: rgba(239,68,68,0.2);
            background: rgba(239,68,68,0.05); color: #dc2626;
        }
        .task-item.abandoned { color: #9ca3af; }
        .task-icon { font-size: 0.85rem; flex-shrink: 0; }
        .task-name { flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
        .task-state-label { font-size: 0.7rem; opacity: 0.75; flex-shrink: 0; }
        .task-board-plan-name {
            font-size: 0.75rem; color: var(--text-hint); padding: 4px 10px 2px;
        }

        /* ── Mobile ── */
        .sidebar-toggle { display: none; background: none; border: none; color: #fff; font-size: 1.3rem; cursor: pointer; }
        @media (max-width: 640px) {
            .sidebar { position: fixed; left: 0; top: 0; bottom: 0; z-index: 50; transform: translateX(-100%); transition: transform 0.3s ease; }
            .sidebar.open { transform: translateX(0); }
            .sidebar-toggle { display: block; }
        }
    </style>
</head>
<body>
<div class="overlay" id="overlay" onclick="closeSidebar(); closeConfig();"></div>

<div class="app-shell">
    <!-- Header -->
    <header class="header">
        <div style="display:flex;align-items:center;gap:10px;">
            <button class="sidebar-toggle" onclick="toggleSidebar()">☰</button>
            <h1>🤖 ChatBI 智能数据助手</h1>
        </div>
        <div class="header-right">
            <button class="header-btn" onclick="openConfig()">⚙ 配置</button>
            <button class="header-btn" onclick="newChat()">＋ 新对话</button>
        </div>
    </header>

    <div class="main">
        <!-- Sidebar -->
        <aside class="sidebar" id="sidebar">
            <div class="sidebar-header">
                <button class="new-chat-btn" onclick="newChat()">＋ 新对话</button>
            </div>
            <div class="session-list" id="sessionList"></div>
        </aside>

        <!-- Chat area -->
        <div class="chat-area" style="position:relative;">
            <div class="messages" id="messages"></div>
            <!-- Plan confirm overlay (shown above input when plan needs confirmation) -->
            <div class="plan-confirm-overlay" id="planConfirmOverlay" style="display:none;">
                <div class="plan-confirm-title" id="planConfirmTitle">📋 AI 已生成执行计划，是否确认执行？</div>
                <div class="plan-confirm-btns">
                    <button class="plan-confirm-btn execute" id="planExecuteBtn" onclick="executePlan(this)">✅ 确认执行</button>
                    <button class="plan-confirm-btn abandon" id="planAbandonBtn" onclick="abandonPlan(this)">❌ 不执行</button>
                </div>
            </div>
            <!-- Task board (collapsible, above input) -->
            <div class="task-board" id="taskBoard">
                <div class="task-board-header" onclick="toggleTaskBoard()">
                    <span>📋</span>
                    <span id="taskBoardTitle">执行计划</span>
                    <span class="task-board-badge" id="taskBoardBadge" style="display:none;"></span>
                    <span class="task-board-toggle">▲</span>
                </div>
                <div class="task-board-body" id="taskBoardBody"></div>
            </div>
            <div class="input-area">
                <div class="context-bar" id="contextBar"></div>
                <div class="input-row">
                    <textarea class="input-box" id="inputBox" placeholder="请输入您的问题…" rows="1"
                              onkeydown="handleKey(event)" oninput="autoResize(this)"></textarea>
                    <button class="interpret-btn" id="interpretBtn" onclick="interpretData()" title="解读当前图表数据">📊 解读</button>
                    <button class="send-btn" id="sendBtn" onclick="sendMessage()">

function preprocessMarkdown(text) {
    if (!text) return text;

    text = text.replace(/(^|)(-{3,})( |$)/g, '---');
    // Ensure heading markers are preceded by a newline to avoid text###heading runs
    text = text.replace(/([^\n#])(#{1,6} )/g, '$1\n$2');

}

// ─── Config ───
function loadConfig() {

}
function openConfig() {
    ['cfgUserName','cfgAgentId','cfgToken','cfgReportId','cfgReportName','cfgDashboardId','cfgDashboardName','cfgProjectId'].forEach(id => {

// ─── Context bar ───
function renderContextBar() {
    const bar = document.getElementById('contextBar');

    if (reportName) bar.innerHTML += `<span class="ctx-tag">📋 ${escHtml(reportName)}</span>`;
    if (dashboardName) bar.innerHTML += `<span class="ctx-tag">📊 ${escHtml(dashboardName)}</span>`;

// ─── Sessions ───
function loadSessions() {
    fetch(`/api/chatbi/sessions?userName=${encodeURIComponent(userName || '')}`)
        .then(r => r.json()).then(renderSessionList).catch(() => {});
}
function renderSessionList(sessions) {
    const list = document.getElementById('sessionList');
    list.innerHTML = '';
    (sessions || []).forEach(s => {
        const item = document.createElement('div');
        item.className = 'session-item' + (s.sessionId === sessionId ? ' active' : '');
        item.dataset.id = s.sessionId;
        item.innerHTML = `<span style="flex:1;overflow:hidden;text-overflow:ellipsis;">${escHtml(s.title || '新对话')}</span>
            <button class="session-del" onclick="deleteSession(event,'${s.sessionId}')">✕</button>`;
        item.addEventListener('click', () => switchSession(s.sessionId));
        list.appendChild(item);
    });
}
function switchSession(id) {
    if (isStreaming) return;
    sessionId = id;
    document.querySelectorAll('.session-item').forEach(el => el.classList.toggle('active', el.dataset.id === id));
    document.getElementById('messages').innerHTML = '';
    hidePlanConfirmOverlay();
    clearTaskBoard();
    planConfirmBubble = null;
    cachedPlanName = '';
    // Re-subscribe SSE for the new session
    subscribePlanStream();
    fetch(`/api/chatbi/sessions/${id}/messages`)
        .then(r => r.json())
        .then(msgs => (msgs || []).forEach(m => addMessage(m.role === 'user' ? 'user' : 'assistant', m.content, true)))
        .catch(() => {});

}
function newChat() {
    if (isStreaming) return;
    sessionId = generateId();
    document.getElementById('messages').innerHTML = '';
    document.querySelectorAll('.session-item').forEach(el => el.classList.remove('active'));
    hidePlanConfirmOverlay();
    clearTaskBoard();

    subscribePlanStream();

}
function deleteSession(e, id) {
    e.stopPropagation();
    if (!confirm('确认删除该对话？')) return;

        .then(() => { if (id === sessionId) newChat(); loadSessions(); });

// ─── Sidebar ───
function toggleSidebar() {
    document.getElementById('sidebar').classList.toggle('open');
    document.getElementById('overlay').classList.toggle('visible');
}
function closeSidebar() {

        document.getElementById('overlay').classList.remove('visible');

// ─── Chat ───
function handleKey(e) { if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMessage(); } }
function autoResize(el) { el.style.height = 'auto'; el.style.height = Math.min(el.scrollHeight, 120) + 'px'; }
function sendMessage() {
    const box = document.getElementById('inputBox');
    const text = box.value.trim();
    if (!text || isStreaming) return;
    box.value = ''; box.style.height = '';
    doChat(text);
}
function interpretData() { if (!chartParam || isStreaming) return; doChat('请解读当前数据'); }

function doChat(message) {
    isStreaming = true;
    document.getElementById('sendBtn').disabled = true;
    document.getElementById('interpretBtn').disabled = true;
    addMessage('user', message, false);

    currentAiText = '';
    currentThinkingText = '';
    executedTools = [];
    lastEventType = null;
    // Hide confirm overlay when a new message is sent
    hidePlanConfirmOverlay();
    planConfirmBubble = null;

    const aiRow = document.createElement('div');
    aiRow.className = 'message assistant';
    aiRow.innerHTML = '<div class="message-label">AI</div><div class="message-content"><div class="typing-indicator"><div class="typing-dot"></div><div class="typing-dot"></div><div class="typing-dot"></div></div></div>';
    document.getElementById('messages').appendChild(aiRow);
    scrollToBottom();
    currentAiBubble = aiRow.querySelector('.message-content');

    const body = { sessionId, message, userName, agentId, supersonicToken, reportId, reportName, dashboardId, dashboardName, projectId, param: chartParam };
    fetch('/api/chatbi/chat', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json', 'Accept': 'text/event-stream' },
        body: JSON.stringify(body)
    }).then(resp => {
        if (!resp.ok || !resp.body) throw new Error(`HTTP ${resp.status}`);
        const reader = resp.body.getReader();
        const decoder = new TextDecoder();
        let buffer = '';
        function readChunk() {
            reader.read().then(({ done, value }) => {
                if (done) {
                    if (buffer.trim()) buffer = parseSseBuffer(buffer, true);
                    finishStream();
                    return;
                }
                buffer += decoder.decode(value, { stream: true });
                buffer = parseSseBuffer(buffer, false);
                readChunk();
            }).catch(() => finishStream());
        }
        readChunk();
    }).catch(err => {
        if (currentAiBubble) currentAiBubble.innerHTML = `<span style="color:#e05">请求失败: ${escHtml(err.message)}</span>`;
        finishStream();
    });
}

function parseSseBuffer(buffer, flushAll) {
    const normalized = buffer.replace(/\r\n/g, '\n');
    const frames = flushAll ? [normalized] : normalized.split('\n\n');
    const remainder = flushAll ? '' : frames.pop();
    frames.forEach(frame => handleSseFrame(frame));
    return remainder;
}

function handleSseFrame(frame) {
    if (!frame || !frame.trim()) return;
    let eventType = null;
    const dataLines = [];
    frame.split('\n').forEach(line => {
        if (line.startsWith('event:')) {
            eventType = line.slice(6).trim();
        } else if (line.startsWith('data:')) {
            dataLines.push(line.slice(5).replace(/^ /, ''));
        }
    });
    const data = dataLines.join('\n');
    // Map SSE event type to payload type directly (backend sends event:done / event:tool / event:thinking / event:chunk)
    if (eventType === 'done') { handleChunk('[STOPPED]'); return; }
    if (eventType === 'tool' && data) {
        try {
            const p = JSON.parse(data);
            handleChunk('[TOOL:' + (p.content || '') + ']');
        } catch(_) { handleChunk('[TOOL:' + data + ']'); }
        return;
    }
    if (eventType === 'thinking' && data) {
        try {
            const p = JSON.parse(data);
            handleChunk('[THINKING]' + (p.content || ''));
        } catch(_) { handleChunk('[THINKING]' + data); }
        return;
    }
    if (eventType === 'chunk' && data) {
        try {
            const p = JSON.parse(data);
            handleChunk(p.content || '');
        } catch(_) { handleChunk(data); }
        return;
    }
    // Fallback: no event type, treat data as plain chunk
    if (data) handleChunk(data);
}

function handleChunk(chunk) {
    if (!currentAiBubble) return;
    const payload = parseChunkPayload(chunk);
    if (payload.type === 'done') { finishStream(); return; }
    if (payload.type === 'tool') {
        const toolName = payload.content || '';
        executedTools.push(toolName);
        lastEventType = 'tool';
        renderAiBubbleWithThinking(currentAiBubble, currentAiText, currentThinkingText, false);
        scrollToBottom();
        return;
    }
    // Only actual reply content (not thinking) clears the waiting state
    if (payload.type === 'chunk') {
        lastEventType = 'chunk';
    }
    if (payload.type === 'thinking') {
        currentThinkingText += payload.content || '';
        renderAiBubbleWithThinking(currentAiBubble, currentAiText, currentThinkingText, false);
        scrollToBottom();
        return;
    }
    currentAiText += payload.content || '';
    renderAiBubbleWithThinking(currentAiBubble, currentAiText, currentThinkingText, false);
    scrollToBottom();
}

function parseChunkPayload(chunk) {
    if (chunk === '[STOPPED]') return { type: 'done', content: '' };
    if (chunk.startsWith('[TOOL:') && chunk.endsWith(']')) {
        return { type: 'tool', content: chunk.slice(6, -1) };
    }
    // Detect thinking content marked by backend
    if (chunk.startsWith('[THINKING]')) {
        return { type: 'thinking', content: chunk.slice(10) };
    }
    try {
        const payload = JSON.parse(chunk);
        if (payload && typeof payload === 'object' && payload.type) {
            return { type: payload.type, content: payload.content || '' };
        }
    } catch (e) {
        // Fall back to plain text chunks for compatibility with legacy responses.
    }
    return { type: 'chunk', content: chunk };
}

function finishStream() {
    isStreaming = false;
    lastEventType = null;
    document.getElementById('sendBtn').disabled = false;
    document.getElementById('interpretBtn').disabled = !chartParam;
    if (currentAiBubble && (currentAiText || currentThinkingText))
        renderAiBubbleWithThinking(currentAiBubble, currentAiText, currentThinkingText, true);
    currentAiBubble = null;
    currentAiText = '';
    currentThinkingText = '';
    executedTools = [];
    lastEventType = null;
    scrollToBottom();
    loadSessions();
}

// ─── Plan confirm & task board management ───

/** Subscribe to plan SSE stream for current session */
function subscribePlanStream() {
    closePlanEventSource();
    const es = new EventSource(`/api/chatbi/plan/${sessionId}/stream`);
    planEventSource = es;
    es.onmessage = function(e) {
        try {
            const plan = JSON.parse(e.data);
            handlePlanUpdate(plan);
        } catch(_) {}
    };
    es.onerror = function() {
        // Retry after 3s on error (session may not have a plan yet)
        closePlanEventSource();
        setTimeout(() => { if (!planEventSource) subscribePlanStream(); }, 3000);
    };
}

/** Close existing plan SSE connection */
function closePlanEventSource() {
    if (planEventSource) {
        planEventSource.close();
        planEventSource = null;
    }
}

/** Handle plan state update from SSE */
function handlePlanUpdate(plan) {
    // Update task board regardless of confirm state
    updateTaskBoard(plan);

    // Heartbeat may send an empty plan (no subtasks) while still waiting for user
    if (plan && plan.waitingForUser) {
        showPlanConfirmOverlay(plan);
        return;
    }

    if (!plan || !plan.subtasks || plan.subtasks.length === 0) {
        hidePlanConfirmOverlay();
        return;
    }
    if (plan.needConfirm) {
        showPlanConfirmOverlay(plan);
    } else {
        hidePlanConfirmOverlay();
    }
}

/** Show the floating confirm overlay */
function showPlanConfirmOverlay(plan) {
    const overlay = document.getElementById('planConfirmOverlay');
    const title = document.getElementById('planConfirmTitle');
    if (!overlay) return;
    // Plan may be empty (heartbeat) while waitingForUser=true — use cached name or fallback
    const planName = plan.name ? `「${plan.name}」` : (cachedPlanName ? `「${cachedPlanName}」` : '执行计划');
    title.textContent = `📋 AI 已生成${planName}，是否确认执行？`;
    document.getElementById('planExecuteBtn').disabled = false;
    document.getElementById('planAbandonBtn').disabled = false;
    overlay.style.display = 'flex';
    // Cache plan name for heartbeat messages that don't carry it
    if (plan.name) cachedPlanName = plan.name;
    // Auto-expand task board so user can see the plan
    expandTaskBoard();
    scrollToBottom();
}

/** Hide the confirm overlay */
function hidePlanConfirmOverlay() {
    const overlay = document.getElementById('planConfirmOverlay');
    if (overlay) overlay.style.display = 'none';
}

/** Update task board with current plan */
function updateTaskBoard(plan) {
    const board = document.getElementById('taskBoard');
    const body = document.getElementById('taskBoardBody');
    const badge = document.getElementById('taskBoardBadge');
    const titleEl = document.getElementById('taskBoardTitle');
    if (!board || !body) return;

    if (!plan || !plan.subtasks || plan.subtasks.length === 0) {
        // No active plan — do NOT clear board, keep last known state visible
        return;
    }

    // Update title
    titleEl.textContent = plan.name ? `计划：${plan.name}` : '执行计划';

    // Count states
    const total = plan.subtasks.length;
    const done = plan.subtasks.filter(t => t.state === 'done').length;
    const inProg = plan.subtasks.filter(t => t.state === 'in_progress').length;
    const allDone = done === total;

    // Badge shows done/total
    badge.textContent = `${done}/${total}`;
    badge.style.display = '';
    badge.style.background = allDone ? '#16a34a' : (inProg > 0 ? 'var(--primary)' : '#9ba3c4');

    // Render task items
    const stateIcon = { todo: '⏳', in_progress: '▶️', done: '✅', failed: '❌', abandoned: '🚫' };
    const stateLabel = { todo: '待执行', in_progress: '执行中', done: '完成', failed: '失败', abandoned: '已放弃' };
    body.innerHTML = plan.subtasks.map(t => {
        const st = t.state || 'todo';
        return `<div class="task-item ${st}">`
            + `<span class="task-icon">${stateIcon[st] || '⏳'}</span>`
            + `<span class="task-name" title="${escHtml(t.name || '')}">${escHtml(t.name || '子任务')}</span>`
            + `<span class="task-state-label">${stateLabel[st] || st}</span>`
            + `</div>`;
    }).join('');

    // Only auto-expand when there are active/pending tasks; do not force-expand if user collapsed it
    const hasActiveTask = inProg > 0 || plan.needConfirm;
    if (hasActiveTask) {
        expandTaskBoard();
    } else if (!taskBoardExpanded) {
        // keep collapsed if user already collapsed
    }
}

/** Expand task board */
function expandTaskBoard() {
    const board = document.getElementById('taskBoard');
    if (board && !board.classList.contains('expanded')) {
        board.classList.add('expanded');
        taskBoardExpanded = true;
    }
}

/** Toggle task board open/closed — only hides panel, does NOT clear data */
function toggleTaskBoard() {
    const board = document.getElementById('taskBoard');
    if (!board) return;
    const isNowExpanded = board.classList.contains('expanded');
    board.classList.toggle('expanded', !isNowExpanded);
    taskBoardExpanded = !isNowExpanded;
}

/** Clear task board (on new chat / session switch) */
function clearTaskBoard() {
    const body = document.getElementById('taskBoardBody');
    const badge = document.getElementById('taskBoardBadge');
    const titleEl = document.getElementById('taskBoardTitle');
    const board = document.getElementById('taskBoard');
    if (body) body.innerHTML = '';
    if (badge) { badge.style.display = 'none'; }
    if (titleEl) titleEl.textContent = '执行计划';
    if (board) board.classList.remove('expanded');
    taskBoardExpanded = false;
}

/** User clicks ✅ execute
 *
 * Strategy: call /confirm (marks plan confirmed in backend), then send '执行'
 * ONLY to the DataQueryAgent sub-session via the existing SSE chat stream.
 * We do NOT call doChat() here because that would route through RouterAgent
 * and create a new redundant AI response bubble.
 * Instead, we inject '执行' directly into the current streaming session.
 */
function executePlan(btn) {
    document.getElementById('planExecuteBtn').disabled = true;
    document.getElementById('planAbandonBtn').disabled = true;
    fetch(`/api/chatbi/plan/${sessionId}/confirm`, { method: 'POST' })
        .then(() => {
            hidePlanConfirmOverlay();
            planConfirmBubble = null;
            // Send a silent '执行' message that continues the current agent conversation
            // without creating a new user/AI bubble pair in the UI
            sendSilentMessage('执行');
        })
        .catch(() => {
            document.getElementById('planExecuteBtn').disabled = false;
            document.getElementById('planAbandonBtn').disabled = false;
        });
}

/** User clicks ❌ abandon */
function abandonPlan(btn) {
    document.getElementById('planExecuteBtn').disabled = true;
    document.getElementById('planAbandonBtn').disabled = true;
    fetch(`/api/chatbi/plan/${sessionId}/abandon`, { method: 'POST' })
        .then(() => {
            hidePlanConfirmOverlay();
            planConfirmBubble = null;
            // Send silent '不执行' — collapses task board after response
            sendSilentMessage('不执行');
        })
        .catch(() => {
            document.getElementById('planExecuteBtn').disabled = false;
            document.getElementById('planAbandonBtn').disabled = false;
        });
}

/**
 * Send a message to the backend without creating a new user bubble.
 * The AI response appends to the existing current AI bubble (or creates
 * a minimal one if none is active).
 * Used for plan confirm/abandon flow where we don't want extra UI noise.
 */
function sendSilentMessage(message) {
    if (isStreaming) return;
    isStreaming = true;
    document.getElementById('sendBtn').disabled = true;
    document.getElementById('interpretBtn').disabled = true;

    currentAiText = '';
    currentThinkingText = '';
    executedTools = [];
    lastEventType = null;

    // Reuse or create an AI bubble for the streamed response
    let aiRow = document.querySelector('.message.assistant:last-child');
    if (!aiRow) {
        aiRow = document.createElement('div');
        aiRow.className = 'message assistant';
        aiRow.innerHTML = '<div class="message-label">AI</div><div class="message-content"></div>';
        document.getElementById('messages').appendChild(aiRow);
    }
    // Add typing indicator to existing bubble
    const mc = aiRow.querySelector('.message-content');
    mc.innerHTML += '<div class="typing-indicator" id="silentTyping"><div class="typing-dot"></div><div class="typing-dot"></div><div class="typing-dot"></div></div>';
    currentAiBubble = mc;
    scrollToBottom();

    const body = { sessionId, message, userName, agentId, supersonicToken, reportId, reportName, dashboardId, dashboardName, projectId, param: chartParam };
    fetch('/api/chatbi/chat', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json', 'Accept': 'text/event-stream' },
        body: JSON.stringify(body)
    }).then(resp => {
        if (!resp.ok || !resp.body) throw new Error(`HTTP ${resp.status}`);
        // Remove typing indicator once stream starts
        const typingEl = document.getElementById('silentTyping');
        if (typingEl) typingEl.remove();
        const reader = resp.body.getReader();
        const decoder = new TextDecoder();
        let buffer = '';
        function readChunk() {
            reader.read().then(({ done, value }) => {
                if (done) {
                    if (buffer.trim()) buffer = parseSseBuffer(buffer, true);
                    finishStream();
                    return;
                }
                buffer += decoder.decode(value, { stream: true });
                buffer = parseSseBuffer(buffer, false);
                readChunk();
            }).catch(() => finishStream());
        }
        readChunk();
    }).catch(err => {
        const typingEl = document.getElementById('silentTyping');
        if (typingEl) typingEl.remove();
        finishStream();
    });
}

/** Get the last assistant message bubble (legacy helper) */
function getLastAiBubble() {
    const msgs = document.querySelectorAll('.message.assistant .message-content');
    return msgs.length ? msgs[msgs.length - 1] : null;
}

// ─── marked.js 已在顶部完成初始化 ───

// ─── Extract and separate thinking blocks from text ───
function extractThinkingBlocks(text) {
    const thinking = [];
    const mainText = text.replace(/\[THINKING_BLOCK\]([\s\S]*?)\[\/THINKING_BLOCK\]/g, (_, content) => {
        thinking.push(content);
        return '';
    }).trim();
    return { mainText, thinking };
}

// ─── Toggle thinking block visibility ───
function toggleThinking(el) {
    const block = el.closest('.thinking-block');
    if (block) block.classList.toggle('collapsed');
}

// Build HTML for thinking blocks
function buildThinkingHtml(thinkingText) {
    if (!thinkingText) return '';
    const previewLen = 60;
    const preview = thinkingText.replace(/\n/g, ' ').slice(0, previewLen) + (thinkingText.length > previewLen ? '…' : '');
    return `<div class="thinking-block collapsed">`
        + `<div class="thinking-header" onclick="toggleThinking(this)"><span>${escHtml(preview)}</span><span class="arrow">▼</span></div>`
        + `<div class="thinking-content">${escHtml(thinkingText)}</div>`
        + `</div>`;
}

// Build HTML for main markdown text
function buildMarkdownHtml(text) {
    if (!text) return '';
    const processed = preprocessMarkdown(text);
    let mdHtml;
    if (typeof marked !== 'undefined' && typeof marked.parse === 'function') {
        try {
            mdHtml = marked.parse(processed, { gfm: true, breaks: true });
            if (typeof mdHtml !== 'string') mdHtml = simpleMarkdown(processed);
        } catch(e) {
            console.warn('marked.parse error:', e);
            mdHtml = simpleMarkdown(processed);
        }
    } else {
        mdHtml = simpleMarkdown(processed);
    }
    return '<div class="md-body">' + mdHtml + '</div>';
}

// ─── Render AI bubble (with separate thinking content) ───
// mainText: the actual reply, thinkingText: reasoning_content
function renderAiBubbleWithThinking(container, mainText, thinkingText, final) {
    if (!mainText && !thinkingText && !executedTools.length) return;
    let html = '';
    // Render completed tool call indicators
    executedTools.forEach(function(toolName) {
        html += '<div class="tool-indicator">🔧 ' + escHtml(toolName) + '</div>';
    });
    // Show "正在执行" when the most recent event was a tool call
    if (lastEventType === 'tool') {
        html += '<div class="tool-indicator waiting">正在执行</div>';
    }
    if (thinkingText) html += buildThinkingHtml(thinkingText);
    if (mainText) html += buildMarkdownHtml(mainText);
    container.innerHTML = html;
    if (final) renderCharts(container);
}

// ─── Render AI bubble (legacy: text only, used for history messages) ───
function renderAiBubble(container, text, final) {
    if (!text) return;
    const toolInd = container.querySelector('.tool-indicator');
    const html = buildMarkdownHtml(text);
    container.innerHTML = (toolInd ? toolInd.outerHTML : '') + html;
    if (final) renderCharts(container);
}

// ─── ECharts rendering ───
function renderCharts(container) {
    // 1. 处理 <chart> 标签格式（简化格式自动转 ECharts option）
    if (typeof echarts !== 'undefined') {
        container.innerHTML = container.innerHTML.replace(/<chart>\s*([\s\S]*?)\s*<\/chart>/gi, (match, jsonStr) => {
            try {
                const data = JSON.parse(jsonStr);
                const option = convertSimpleChartToECharts(data);
                return '<pre><code>' + JSON.stringify(option, null, 0) + '</code></pre>';
            } catch (e) { return match; }
        });

        // 2. 渲染 ECharts option JSON（来自代码块）
        container.querySelectorAll('pre code').forEach(codeEl => {
            const raw = codeEl.textContent.trim();
            if (!raw.startsWith('{')) return;
            try {
                const option = JSON.parse(raw);
                if (!option.series && !option.xAxis && !option.legend) return;
                const wrapper = document.createElement('div');
                wrapper.className = 'chart-container';
                wrapper.id = 'chart-' + (++chartCounter);
                codeEl.closest('pre').replaceWith(wrapper);
                if (!option.color) option.color = ['#4f6ef7','#06b6d4','#34d399','#fb923c','#f472b6','#a78bfa','#fbbf24'];
                const chart = echarts.init(wrapper);
                chart.setOption(option);
                window.addEventListener('resize', () => chart.resize());
            } catch (e) { /* not echarts JSON */ }
        });
    }

    // 3. 渲染 Mermaid 图表（来自 ```mermaid 代码块）
    if (typeof mermaid !== 'undefined') {
        container.querySelectorAll('pre code.language-mermaid, pre code[class*="mermaid"]').forEach(codeEl => {
            renderMermaidBlock(codeEl.textContent.trim(), codeEl.closest('pre'));
        });
        // Also handle unclassed code blocks that look like mermaid
        container.querySelectorAll('pre code:not([class])').forEach(codeEl => {
            const raw = codeEl.textContent.trim();
            if (/^(graph|sequenceDiagram|classDiagram|stateDiagram|erDiagram|gantt|journey|pie|gitGraph|flowchart)/i.test(raw)) {
                renderMermaidBlock(raw, codeEl.closest('pre'));
            }
        });
    }
}

function renderMermaidBlock(code, preEl) {
    try {
        const id = 'mermaid-' + (++chartCounter);
        const wrapper = document.createElement('div');
        wrapper.className = 'mermaid-container';
        mermaid.render(id, code).then(({ svg }) => {
            wrapper.innerHTML = svg;
        }).catch(err => {
            console.warn('[Mermaid] render error:', err);
            // fallback: show as code block
        });
        preEl.replaceWith(wrapper);
    } catch(e) {
        console.warn('[Mermaid] init error:', e);
    }
}

// 将简化图表格式转换为 ECharts option
function convertSimpleChartToECharts(data) {
    const type = data.type || 'bar';
    const title = data.title || '';
    const items = data.data || [];
    
    const labels = items.map(d => d.label || d.name || '');
    const values = items.map(d => d.value || 0);
    
    if (type === 'pie') {
        return {
            title: { text: title, left: 'center' },
            tooltip: { trigger: 'item', formatter: '{b}: {c} ({d}%)' },
            legend: { orient: 'vertical', left: 'left', top: 'middle' },
            series: [{
                name: title,
                type: 'pie',
                radius: ['40%', '70%'],
                label: { show: true, formatter: '{b}: {d}%' },
                data: items.map(d => ({ value: d.value, name: d.label || d.name }))
            }]
        };
    } else if (type === 'line') {
        return {
            title: { text: title, left: 'center' },
            tooltip: { trigger: 'axis' },
            xAxis: { type: 'category', data: labels },
            yAxis: { type: 'value' },
            series: [{ name: title, type: 'line', smooth: true, data: values }]
        };
    } else {
        // bar (default)
        return {
            title: { text: title, left: 'center' },
            tooltip: { trigger: 'axis', axisPointer: { type: 'shadow' } },
            grid: { left: '3%', right: '4%', bottom: '3%', containLabel: true },
            xAxis: { type: 'category', data: labels, axisLabel: { rotate: labels.length > 5 ? 30 : 0 } },
            yAxis: { type: 'value' },
            series: [{ name: title, type: 'bar', data: values }]
        };
    }
}

// ─── Add message ───
function addMessage(role, content, rendered) {
    const isUser = role === 'user';
    const div = document.createElement('div');
    div.className = 'message ' + (isUser ? 'user' : 'assistant');
    if (isUser) {
        div.innerHTML = `<div class="message-label">You</div><div class="message-content">${escHtml(content)}</div>`;
    } else {
        const label = document.createElement('div');
        label.className = 'message-label';
        label.textContent = 'AI';
        const mc = document.createElement('div');
        mc.className = 'message-content';
        div.appendChild(label);
        div.appendChild(mc);
        renderAiBubble(mc, content, true);
    }
    document.getElementById('messages').appendChild(div);
    scrollToBottom();
}

function scrollToBottom() {
    const msgs = document.getElementById('messages');
    msgs.scrollTop = msgs.scrollHeight;
}

// ─── Fallback markdown ───
function simpleMarkdown(text) {
    if (!text) return '';
    // 代码块（优先处理，避免内部内容被其他规则误替换）
    text = text.replace(/```(\w*)\n?([\s\S]*?)```/g, (_, l, c) => `<pre><code>${escHtml(c.trim())}</code></pre>`);
    text = text.replace(/`([^`]+)`/g, (_, c) => `<code>${escHtml(c)}</code>`);
    // 粗体 / 斜体
    text = text.replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>');
    text = text.replace(/\*(.+?)\*/g, '<em>$1</em>');
    // 标题（从多级到少级，避免 ### 被 # 规则误匹配；支持 h1-h6）
    text = text.replace(/^#{6} (.+)$/gm, '<h6>$1</h6>');
    text = text.replace(/^#{5} (.+)$/gm, '<h5>$1</h5>');
    text = text.replace(/^#{4} (.+)$/gm, '<h4>$1</h4>');
    text = text.replace(/^#{3} (.+)$/gm, '<h3>$1</h3>');
    text = text.replace(/^#{2} (.+)$/gm, '<h2>$1</h2>');
    text = text.replace(/^# (.+)$/gm, '<h1>$1</h1>');
    // 分隔线
    text = text.replace(/^---+$/gm, '<hr>');
    // 表格
    text = text.replace(/(\|.+\|\n)+/g, m => {
        const rows = m.trim().split('\n').filter(r => !/^\|[-:| ]+\|$/.test(r));
        if (!rows.length) return m;
        const hdr = rows[0].split('|').filter(c => c.trim()).map(c => `<th>${c.trim()}</th>`).join('');
        const body = rows.slice(1).map(r => '<tr>' + r.split('|').filter(c => c.trim()).map(c => `<td>${c.trim()}</td>`).join('') + '</tr>').join('');
        return `<table><thead><tr>${hdr}</tr></thead><tbody>${body}</tbody></table>`;
    });
    // 列表
    text = text.replace(/^[\*\-] (.+)$/gm, '<li>$1</li>').replace(/(<li>[\s\S]*?<\/li>)/g, '<ul>$1</ul>');
    text = text.replace(/\n\n/g, '<br><br>').replace(/\n/g, '<br>');
    return text;
}

// ─── Utilities ───
function generateId() { return 'sess-' + Date.now().toString(36) + '-' + Math.random().toString(36).slice(2, 8); }
function escHtml(s) { return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }
