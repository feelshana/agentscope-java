# Active profile: dev（本地开发）or prod（线上生产）
spring:
  profiles:
    active: dev
  codec:
    max-in-memory-size: 10MB
  flyway:
    enabled: false
  web:
    resources:
      cache:
        period: 0
        cachecontrol:
          no-cache: true
          no-store: true

server:
  port: 7082

# MyBatis-Plus configuration
mybatis-plus:
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.nologging.NoLoggingImpl
  global-config:
    db-config:
      id-type: assign_uuid

# Chat session memory settings
chat:
  session:
    max-history-tokens: 8000
    keep-recent-messages: 6

logging:
  level:
    io.agentscope: INFO
    io.agentscope.examples.chatbi: INFO

agent:
  # 当前使用的系统提示词文件名，文件须放在 resources/prompts/ 目录下
  system-prompt-file: chatbi-system-prompt.txt
