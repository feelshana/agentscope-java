# Active profile: dev（本地开发）or prod（线上生产）
# 线上部署时通过启动参数覆盖：java -jar xxx.jar --spring.profiles.active=prod
spring:
  profiles:
    active: dev
  codec:
    max-in-memory-size: 10MB
  # Flyway – disabled here; migration is triggered manually in MybatisConfig
  flyway:
    enabled: false

server:
  port: 7081

# MyBatis-Plus configuration
mybatis-plus:
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.nologging.NoLoggingImpl
  global-config:
    db-config:
      id-type: assign_uuid

# Chat session memory settings
chat:
  session:
    # Max token count before triggering summary compression (approx chars / 4)
    max-history-tokens: 8000
    # How many recent messages to keep verbatim after compression
    keep-recent-messages: 6

agent:
  # 当前使用的系统提示词文件名，文件须放在 resources/prompts/ 目录下
  system-prompt-file: prompt-V4.txt
