server:
  port: 8081

# OpenAI API configuration (can also be set via OPENAI_API_KEY / OPENAI_BASE_URL environment variables)
openai:
  api-key: ${OPENAI_API_KEY:}
  base-url: ${OPENAI_BASE_URL:}

# External data API configuration
data:
  api:
    # Base URL of the external data service (legacy fallback)
    base-url: ${DATA_API_BASE_URL:http://localhost:9090}
    # Set to true to use built-in mock responses (no real API needed)
    mock: ${DATA_API_MOCK:false}
    # Base URL of the NLP intelligent query service (SuperSonic)
    nlp-base-url: ${DATA_API_NLP_BASE_URL:http://localhost:9080}
    # Authorization header value for the NLP intelligent query service
    nlp-authorization: ${DATA_API_NLP_AUTHORIZATION:eyJhbGciOiJIUzUxMiJ9..BldDbgrCLjWj6I1wx5ctDtR2_gRh3C9zrSoTAMXvvX1SiQQVeQPb7FTCs7_pY1UNEL_x5lXWCjnCkwACwQXl4Q}
    # 对应4个数据集的agentId，逗号分隔，可随时修改
    nlp-agent-ids: 84,85,86,87
spring:
  codec:
    max-in-memory-size: 10MB

agent:
  # 当前使用的系统提示词文件名，文件须放在 resources/prompts/ 目录下
  system-prompt-file: prompt-V4.txt

logging:
  level:
    io.agentscope: DEBUG
    io.agentscope.examples.dataanalysis: INFO
