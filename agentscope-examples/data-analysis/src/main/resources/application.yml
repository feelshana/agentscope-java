# Active profile: dev（本地开发）or prod（线上生产）
# 线上部署时通过启动参数覆盖：java -jar xxx.jar --spring.profiles.active=prod
spring:
  profiles:
    active: dev
  codec:
    max-in-memory-size: 10MB
  # Flyway – disabled here; migration is triggered manually in MybatisConfig
  flyway:
    enabled: false
  # 禁用静态资源缓存，开发期间强制每次从磁盘读取（生产可删除此段）
  web:
    resources:
      cache:
        period: 0
        cachecontrol:
          no-cache: true
          no-store: true

server:
  port: 7081

# MyBatis-Plus configuration
mybatis-plus:
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.nologging.NoLoggingImpl
  global-config:
    db-config:
      id-type: assign_uuid

# Chat session memory settings
chat:
  session:
    # Max token count before triggering summary compression (approx chars / 4)
    max-history-tokens: 8000
    # How many recent messages to keep verbatim after compression
    keep-recent-messages: 6

logging:
  level:
    io.agentscope: INFO
    io.agentscope.examples.dataanalysis: INFO
agent:
  # 当前使用的系统提示词文件名，文件须放在 resources/prompts/ 目录下
  system-prompt-file: prompt-V4.txt

# 阿里云 NLS 一句话识别配置
# 请在 application-dev.yml（或环境变量）中填写真实值
aliyun:
  nls:
    # 控制台 -> 智能语音交互 -> 项目管理 -> Appkey
    app-key: ${ALIYUN_NLS_APP_KEY:}
    # RAM 账号的 AccessKey ID
    access-key-id: ${ALIYUN_AK_ID:}
    # RAM 账号的 AccessKey Secret
    access-key-secret: ${ALIYUN_AK_SECRET:}
    # NLS Token 服务地址（固定）
    token-url: https://nls-meta.cn-shanghai.aliyuncs.com/
    # 一句话识别地址
    asr-url: https://nls-gateway-cn-shanghai.aliyuncs.com/stream/v1/asr
