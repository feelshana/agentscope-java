    // Click a suggestion chip: fill & send immediately
    function sendSuggestion(btn) {
        if (isProcessing) return;
        const text = btn.textContent.replace(/^[\p{Emoji}\s]+/u, '').trim();
        document.getElementById('chatInput').value = text;
        sendMessage();
    }
    // Post-report inline chip: send full text as-is
    function sendSuggestionText(btn) {
        if (isProcessing) return;
        const text = btn.textContent.trim();
        document.getElementById('chatInput').value = text;
        sendMessage();
    }
    // Called when user clicks 执行 / 不执行 confirm buttons
    function sendConfirm(btn, text) {
        // Disable both buttons and mark decision taken (prevents re-injection on next plan SSE)
        confirmDecided = true;
        // 只有点「执行」才允许面板在子任务开始时自动展开
        confirmExecuted = (text === '执行');
        const actions = btn.closest('.confirm-actions');
        if (actions) {
            actions.querySelectorAll('.confirm-btn').forEach(b => b.disabled = true);
        }

        if (text === '不执行') {
            // 「不执行」：先让后端立即 abandon 当前计划（清空 PlanNotebook.currentPlan），
            // 防止 LLM 在后续轮次中收到残留计划的 system-hint。
            // 同时调 /api/plan/confirm 抑制 needConfirm 广播（兜底）。
            clearPlanPanelUI();
            fetch(

                BASE_PATH + '/api/plan/abandon?sessionId=' + encodeURIComponent(currentSessionId),
                { method: 'POST' }
            ).catch(() => {});
        } else {
            // Notify backend to suppress further needConfirm=true broadcasts for this plan
            fetch(
                BASE_PATH + '/api/plan/confirm?sessionId=' + encodeURIComponent(currentSessionId),
                { method: 'POST' }
            ).catch(() => {});
        }

        // 重置 userCollapsed，后续子任务开始执行时面板可自动展开
        userCollapsed = false;

        document.getElementById('chatInput').value = text;
        sendMessage(true);  // fromConfirm=true: skip confirmDecided reset
    }

    function handleInputKey(e) {
        if (e.key === 'Enter' && !e.shiftKey) {
            e.preventDefault();
            sendMessage();
        }
    }

    function autoResize(el) {
        el.style.height = 'auto';
        el.style.height = Math.min(el.scrollHeight, 110) + 'px';
    }

    async function sendMessage(fromConfirm) {
        const input = document.getElementById('chatInput');
        const message = input.value.trim();
        if (!message || isProcessing) return;

        // Update session activity timestamp and mark as having active stream
        touchSessionActivity();
        persistActiveSession(currentSessionId, true);

        if (currentResumeEventSource) {
            currentResumeEventSource.close();
            currentResumeEventSource = null;
        }

        let fullMessage = message;


        appendMessage('user', message);
        input.value = '';
        input.style.height = 'auto';
        setProcessing(true);
        streamingUserScrolledUp = false;  // reset auto-scroll lock for new message
        // Only reset confirmDecided when user sends a fresh message (not from confirm buttons)
        if (!fromConfirm) confirmDecided = false;
        // Mark that a plan may arrive (for clearPlanPendingIfNeeded), but do NOT show drawer yet
        planPending = true;

        const typingEl = appendTyping();
        const requestId = generateUUID();
        const url = BASE_PATH + '/api/chat?message=' + encodeURIComponent(fullMessage)
            + '&sessionId=' + encodeURIComponent(currentSessionId)
            + '&requestId=' + encodeURIComponent(requestId)
            + '&account=' + encodeURIComponent(currentUserName);
        const eventSource = new EventSource(url);

        // Track current EventSource for visibility handling
        currentEventSource = eventSource;
        let assistantText = '';
        let assistantEl = null;
        let finalized = false;
        let inSpecialBlock = false;  // true once <report> or <chart> tag detected
        let inReportStream = false;   // true when streaming report content (not chart)
        // Set to true after query_dataset completes so normal-text streaming shows a
        // "generating chart…" pre-indicator before the <chart> tag actually arrives.
        let pendingChartLoading = false;

        // Initialize streaming context for visibility handling
        // This object is updated throughout the streaming process
        streamingContext = {
            eventSource: eventSource,
            assistantEl: null,
            assistantText: '',
            finalized: false,
            doFinalize: null  // will be set after doFinalize is defined
        };

        // ── Query-waiting indicator ──────────────────────────────────────────────────
        // When the LLM finishes emitting "Now I will query…" text and falls silent
        // while waiting for query_dataset to return, we show a waiting card after a
        // short debounce so the user isn't left staring at a frozen screen.
        let queryWaitDebounce = null;  // setTimeout handle (2-sec debounce)
        let queryWaitTimer   = null;   // setInterval handle (elapsed counter in card)
        let queryWaitEl      = null;   // DOM reference to the waiting card element
        let queryWaitSecs    = 0;      // seconds elapsed since card appeared
        let queryWaitActive  = false;  // true while card is visible

        function showQueryWaitCard() {
            if (queryWaitActive || !assistantEl) return;
            queryWaitActive = true;
            queryWaitSecs = 0;
            const content = assistantEl.querySelector('.message-content');
            if (!content) return;
            // Remove any stale card first
            const old = content.querySelector('#queryWaitCard');
            if (old) old.remove();
            const card = document.createElement('div');
            card.id = 'queryWaitCard';
            card.style.cssText =
                'display:flex;align-items:center;gap:10px;margin-top:8px;'
                + 'padding:9px 14px;background:var(--surface2);border:1px solid var(--border);'
                + 'border-radius:var(--radius-sm);font-size:0.8rem;color:var(--text-hint);';
            card.innerHTML =
                '<div style="width:13px;height:13px;flex-shrink:0;border:2px solid var(--border);'
                + 'border-top-color:var(--primary);border-radius:50%;'
                + 'animation:spinLoader 0.7s linear infinite;"></div>'
                + '<span id="queryWaitText">🔍 正在向数据服务查询，请稍等… 00:00</span>';
            content.appendChild(card);
            queryWaitEl = card;
            if (!streamingUserScrolledUp) document.getElementById('chatMessages').scrollTop = 99999;
            // Tick every second to update elapsed time
            queryWaitTimer = setInterval(() => {
                queryWaitSecs++;
                const m = String(Math.floor(queryWaitSecs / 60)).padStart(2, '0');
                const s = String(queryWaitSecs % 60).padStart(2, '0');
                const el = document.getElementById('queryWaitText');
                if (el) el.textContent = `🔍 正在向数据服务查询，请稍等… ${m}:${s}`;
            }, 1000);
        }

        function clearQueryWaitCard() {
            if (queryWaitDebounce) { clearTimeout(queryWaitDebounce); queryWaitDebounce = null; }
            if (queryWaitTimer)    { clearInterval(queryWaitTimer);   queryWaitTimer = null; }
            if (queryWaitEl) { queryWaitEl.remove(); queryWaitEl = null; }
            queryWaitActive = false;
        }

        // Detect user scroll: if user scrolls up (away from bottom), stop auto-scroll
        // 移动端使用 touchstart/touchend 而非 scroll 事件，避免 JS 自动滚动触发的事件覆盖用户意图
        const chatMsgsEl = document.getElementById('chatMessages');
        let _userIsTouching = false;
        function onTouchStart() {
            _userIsTouching = true;
        }
        function onTouchEnd() {
            _userIsTouching = false;
            // 触摸结束时判断是否在底部，如果已回到底部则恢复自动滚动
            const atBottom = chatMsgsEl.scrollHeight - chatMsgsEl.scrollTop - chatMsgsEl.clientHeight < 80;
            if (atBottom) streamingUserScrolledUp = false;
        }
        function onUserScroll() {
            // 只有用户主动触摸时的 scroll 才有效，JS 触发的 scrollTop 变化不处理
            if (!_userIsTouching) return;
            const atBottom = chatMsgsEl.scrollHeight - chatMsgsEl.scrollTop - chatMsgsEl.clientHeight < 80;
            streamingUserScrolledUp = !atBottom;
        }
        chatMsgsEl.addEventListener('touchstart', onTouchStart, { passive: true });
        chatMsgsEl.addEventListener('touchend',   onTouchEnd,   { passive: true });
        chatMsgsEl.addEventListener('scroll',     onUserScroll, { passive: true });

        function doFinalize() {
            if (finalized) return;
            finalized = true;
            // Mark session as no longer having active stream
            persistActiveSession(currentSessionId, false);
            // Clean up global streaming state
            if (currentEventSource === eventSource) {
                currentEventSource = null;
            }
            if (streamingContext && streamingContext.eventSource === eventSource) {
                streamingContext.finalized = true;
            }
            chatMsgsEl.removeEventListener('touchstart', onTouchStart);
            chatMsgsEl.removeEventListener('touchend',   onTouchEnd);
            chatMsgsEl.removeEventListener('scroll',     onUserScroll);
            // Clean up query-wait timers to prevent memory leaks
            clearQueryWaitCard();
            // 清除图表等待提示卡的计时器（finalizeMessage 会移除 DOM，这里只需停计时器）
            if (window._chartWaitTimer) { clearInterval(window._chartWaitTimer); window._chartWaitTimer = null; }
            // 取消尚未执行的滚动 rAF
            if (_scrollRafId) { cancelAnimationFrame(_scrollRafId); _scrollRafId = null; }
            // 重置流式渲染状态变量
            _streamLastStableLen = 0;
            _streamLastTableCount = 0;
            removeTyping(typingEl);
            if (assistantEl) finalizeMessage(assistantEl, assistantText, true);
            // If LLM answered directly (no plan was ever pushed), clear pending state
            planPending = false;
            clearPlanPendingIfNeeded();
            setProcessing(false);
        }

        // Set doFinalize reference in streamingContext for visibility handler
        streamingContext.doFinalize = doFinalize;
        // clearTimers: minimal cleanup for visibility-change abort (without finalizeMessage)
        streamingContext.clearTimers = () => clearQueryWaitCard();

        // Sanitise and render report HTML incrementally (same rules as finalizeMessage)
        // ── 增量渲染策略：避免每次 chunk 全量 innerHTML 替换导致移动端回流闪烁 ──
        // 关键数据：上一次已稳定渲染的 Markdown 长度，只有超过该长度才触发 DOM 更新
        let _streamLastStableLen = 0;
        // 表格冻结：记录上一次渲染的表格数量，流式期间表格还在增长时冻结 DOM，避免滚动条闪现/消失导致 reflow
        let _streamLastTableCount = 0;
        // 滚动 rAF 节流标志：每帧最多触发一次滚动，防止高频 scrollTop 操作加重移动端图层合成开销
        let _scrollRafId = null;
        // 节流计时器：防止 reportClosed 时节流 timer 再次展示旧内容
        let _streamPendingStable = '';
        let _streamThrottleTimer = null;

        function renderReportStream(rawContent) {
            const content = assistantEl.querySelector('.message-content');
            if (!content) return;
            let reportBlock = content.querySelector('#streamingReportBlock');
            if (!reportBlock) {
                // Remove loading indicator and create report block
                const loadingEl = content.querySelector('#msgLoadingIndicator');
                if (loadingEl) loadingEl.remove();
                reportBlock = document.createElement('div');
                reportBlock.className = 'report-block report-block-streaming';
                reportBlock.id = 'streamingReportBlock';
                content.classList.add('has-chart');
                content.appendChild(reportBlock);
                _streamLastStableLen = 0;
                requestAnimationFrame(() => {
                    reportBlock.scrollIntoView({ behavior: 'smooth', block: 'start' });
                });
            }

            // ── 找到稳定可渲染部分（排除末尾不完整的表格/标题）──────────────────────
            function splitAtIncompleteTable(md) {
                const lines = md.split('\n');
                let tableStart = -1;
                for (let i = lines.length - 1; i >= 0; i--) {
                    const trimmed = lines[i].trim();
                    if (trimmed.startsWith('|') || trimmed === '') {
                        if (trimmed.startsWith('|')) tableStart = i;
                    } else {
                        break;
                    }
                }
                if (tableStart === -1) return { stable: md, pending: '' };
                const tableLines = lines.slice(tableStart);
                const hasSeparator = tableLines.some(l => /^\|[\s\-:|]+\|/.test(l.trim()));
                const dataRowsAfterSep = (() => {
                    let seenSep = false;
                    return tableLines.filter(l => {
                        const t = l.trim();
                        if (!seenSep && /^\|[\s\-:|]+\|/.test(t)) { seenSep = true; return false; }
                        return seenSep && t.startsWith('|');
                    }).length;
                })();
                if (!hasSeparator || dataRowsAfterSep === 0) {
                    return { stable: lines.slice(0, tableStart).join('\n'), pending: tableLines.join('\n') };
                }
                return { stable: md, pending: '' };
            }

            if (typeof renderMarkdown !== 'undefined') {
                // ── 过滤末尾可能尚未完整的 XML/HTML 标签片段 ──
                // LLM 流式输出时 </report> 可能分多个 chunk 到达，
                // 中间状态可能是: "</" 或 "</r" 或 "</re" 或 "</rep" 或 "</repo" 等。
                // 过滤这些未完成的标签，防止它们被 markdown 渲染为普通文本展示给用户。
                const cleanContent = rawContent.replace(/<\/?[a-zA-Z]{0,20}\s*$/, '');
                const { stable, pending } = splitAtIncompleteTable(cleanContent);

                // ── 只有稳定内容有新增时才刷新主体，避免高频无效 DOM 写入 ──
                if (stable.length > _streamLastStableLen) {
                    _streamLastStableLen = stable.length;
                    const stableHtml = renderMarkdown(stable);
                
                    // ── 表格冻结机制：计算本次 stableHtml 里的表格数量 ──
                    // 如果表格数比上次多（表格还在流式增长），则跳过本次 innerHTML 更新。
                    // 原因：表格行数增加时宽度就会变，导致滚动条闪现／消失 → reflow → 闪烁。
                    // 等到表格行数稳定（不再增加）后才做一次性渲染，大幅减少闪烁次数。
                    const curTableCount = (stableHtml.match(/<table/g) || []).length;
                    const tableGrowing = curTableCount > _streamLastTableCount;
                    _streamLastTableCount = curTableCount;
                
                    if (!tableGrowing) {
                        // 表格已稳定（数量未增加）→ 可以安全更新 DOM
                        let stableNode = reportBlock.querySelector('#reportStableZone');
                        if (!stableNode) {
                            stableNode = document.createElement('div');
                            stableNode.id = 'reportStableZone';
                            // contain:layout paint 隔离重绘但不脱离文档流尺寸计算（不加 size，避免气泡高度塔陷为0）
                            stableNode.style.cssText = 'contain:layout paint;will-change:contents;-webkit-transform:translateZ(0);transform:translateZ(0);';
                            const oldPre = reportBlock.querySelector('#streamingTablePending');
                            reportBlock.innerHTML = '';
                            reportBlock.appendChild(stableNode);
                            if (oldPre) reportBlock.appendChild(oldPre);
                        }
                        stableNode.innerHTML = stableHtml;
                        if (typeof wrapTables !== 'undefined') {
                            wrapTables(stableNode);
                            // ── 流式期间给所有 table-wrapper 加 overflow-x:hidden ──
                            // 锁定滚动条隐藏，彻底消除宽表格导致的滚动条闪现/消失 reflow
                            // doFinalize 里会恢复为 overflow-x:auto
                            stableNode.querySelectorAll('.table-wrapper').forEach(tw => {
                                tw.style.overflowX = 'hidden';
                            });
                        }
                    }
                }

                // ── 更新/移除 pending 占位 pre（不影响稳定区） ──
                let pendingEl = reportBlock.querySelector('#streamingTablePending');
                if (pending) {
                    if (!pendingEl) {
                        pendingEl = document.createElement('pre');
                        pendingEl.id = 'streamingTablePending';
                        pendingEl.style.cssText =
                            'white-space:pre-wrap;word-break:break-word;'
                            + 'font-family:inherit;font-size:0.82rem;line-height:1.6;'
                            + 'color:var(--text-hint);opacity:0.55;background:transparent;'
                            + 'padding:4px 0;margin:4px 0 0;';
                        reportBlock.appendChild(pendingEl);
                    }
                    pendingEl.textContent = pending;
                } else if (pendingEl) {
                    pendingEl.remove();
                }
            } else {
                // marked 未加载时降级展示
                let rawEl = reportBlock.querySelector('#reportStableZone');
                if (!rawEl) {
                    rawEl = document.createElement('pre');
                    rawEl.id = 'reportStableZone';
                    rawEl.style.cssText = 'white-space:pre-wrap;word-break:break-word;font-family:inherit;font-size:0.85rem;line-height:1.7;color:var(--text-sub);background:transparent;padding:0;margin:0;';
                    reportBlock.appendChild(rawEl);
                }
                rawEl.textContent = rawContent;
            }
            // ── rAF 节流滚动：每帧最多触发一次，防止高频 scrollTop 操作加重移动端 WebView 图层合成开销 ──
            if (!streamingUserScrolledUp && !_scrollRafId) {
                _scrollRafId = requestAnimationFrame(() => {
                    _scrollRafId = null;
                    document.getElementById('chatMessages').scrollTop = 99999;
                });
            }
        }

        eventSource.onmessage = (event) => {
            const chunk = event.data;
            if (chunk === '[STOPPED]') { eventSource.close(); doFinalize(); return; }

            // Update streaming context for visibility handler
            if (streamingContext) {
                streamingContext.assistantEl = assistantEl;
                streamingContext.assistantText = assistantText;
            }

            // ── Tool progress markers: update status line in bubble, never accumulate in text ──
            if (/^\[TOOL:[^\]]+\]$/.test(chunk)) {
                const toolName = chunk.slice(6, -1);
                const label = toolName === 'list_datasets'  ? '⚙️ 正在发现可用数据集…'
                            : toolName === 'query_dataset'  ? '📊 数据查询完成，正在分析…'
                            : `⚙️ 工具执行中（${toolName}）…`;
                // Any tool completing means we're no longer silently waiting – clear wait card.
                clearQueryWaitCard();
                // After query_dataset finishes, the LLM will emit conclusion text then
                // a <chart> block. Flag this so we can show a chart pre-loading indicator.
                if (toolName === 'query_dataset') pendingChartLoading = true;
                // Ensure bubble exists
                if (!assistantEl) { removeTyping(typingEl); assistantEl = appendMessage('assistant', ''); }
                // Update streaming context
                if (streamingContext) streamingContext.assistantEl = assistantEl;
                const content = assistantEl.querySelector('.message-content');
                let statusEl = content.querySelector('#toolStatusLine');
                if (!statusEl) {
                    statusEl = document.createElement('div');
                    statusEl.id = 'toolStatusLine';
                    statusEl.style.cssText = 'font-size:0.8rem;color:var(--text-hint);margin:4px 0 2px;display:flex;align-items:center;gap:6px;';
                    content.appendChild(statusEl);
                }
                statusEl.textContent = label;
                if (!streamingUserScrolledUp) document.getElementById('chatMessages').scrollTop = 99999;
                return;
            }

            assistantText += chunk;

            // Update streaming context for visibility handler
            if (streamingContext) {
                streamingContext.assistantText = assistantText;
            }

            // Once we see a special-block opening tag, switch to streaming report / loading
            if (!inSpecialBlock && /<report>|<chart>/i.test(assistantText)) {
                inSpecialBlock = true;
                pendingChartLoading = false; // chart block has arrived; no longer "pending"
                // Determine if this is a report block (stream it) or chart block (show spinner)
                inReportStream = /<report>/i.test(assistantText);
                // Ensure we have a bubble
                if (!assistantEl) { removeTyping(typingEl); assistantEl = appendMessage('assistant', ''); }
                // Update streaming context
                if (streamingContext) streamingContext.assistantEl = assistantEl;
                const beforeTag = assistantText
                    .replace(/<report>[\s\S]*/i, '')
                    .replace(/<chart>[\s\S]*/i, '')
                    .trim();
                const content = assistantEl.querySelector('.message-content');
                // Remove tool status line (replaced by report loading indicator)
                const _statusEl = content.querySelector('#toolStatusLine');
                if (_statusEl) _statusEl.remove();
                // Remove pre-chart loading bar if it was shown during normal streaming
                const _preChartEl = content.querySelector('#preChartLoadingBar');
                if (_preChartEl) _preChartEl.remove();
                // 渲染 <report> 之前的普通文本（如果有 Markdown 格式也一并渲染）
                let textNode = '';
                if (beforeTag) {
                    // 过滤裸露的图表 JSON，然后用统一的 renderMarkdown 渲染
                    // 匹配单系列（data）和多系列（series/categories）两种格式
                    const looseChartJsonRegex = /\{(?:[^{}]|\{(?:[^{}]|\{[^{}]*\})*\})*"type"\s*:\s*"(?:bar|line|pie|multi_line|multi_bar|dual_axes)"(?:[^{}]|\{(?:[^{}]|\{[^{}]*\})*\})*\}/gi;
                    let filteredBefore = beforeTag.replace(looseChartJsonRegex, '').trim();
                    const parsedBefore = (typeof renderMarkdown !== 'undefined')
                        ? renderMarkdown(filteredBefore)
                        : escapeHtml(filteredBefore);
                    textNode = `<div class="text-part" id="msgTextPart">${parsedBefore}</div>`;
                }
                if (inReportStream) {
                    // Start with text part only; report block will be created on first content chunk
                    content.innerHTML = textNode +
                        `<div class="loading-indicator" id="msgLoadingIndicator">
                            <div class="loading-spinner"></div>生成分析报告中…
                        </div>`;
                    // Keep scroll at bottom – smooth scroll to conclusion text is disorienting
                    if (!streamingUserScrolledUp) document.getElementById('chatMessages').scrollTop = 99999;
                    // Immediately try to render any report content already buffered
                    const reportInner = assistantText.match(/<report>([\s\S]*)/i);
                    if (reportInner && reportInner[1].trim()) {
                        // Strip closing tag if already present
                        const rawSoFar = reportInner[1].replace(/<\/report>[\s\S]*/i, '');
                        renderReportStream(rawSoFar);
                    }
                } else {
                    // Chart block: show spinner; the loading text will be updated in real time
                    // (per-chunk KB counter) by the inSpecialBlock branch below.
                    content.innerHTML = textNode +
                        `<div class="loading-indicator" id="msgLoadingIndicator">
                            <div class="loading-spinner"></div><span id="chartLoadingText">正在生成图表…</span>
                        </div>`;
                    if (!streamingUserScrolledUp) document.getElementById('chatMessages').scrollTop = 99999;
                }
                return;
            }

            if (inSpecialBlock) {
                // For report blocks: stream the inner content in real time
                if (inReportStream) {
                    const reportInner = assistantText.match(/<report>([\s\S]*)/i);
                    if (reportInner) {
                        // 检测 </report> 闭合标签是否已到达
                        const reportClosed = /<\/report>/i.test(reportInner[1]);
                        // Strip closing tag if already received
                        const rawSoFar = reportInner[1].replace(/<\/report>[\s\S]*/i, '');
                        if (rawSoFar.trim()) renderReportStream(rawSoFar);

                        // ── 报告内容已全部输出，等待 <chart> 段到来 ──
                        // 当 </report> 闭合标签到达时，将 inReportStream 切换为 false，
                        // 并在 report block 底部显示“正在绘制图表…”等待提示，
                        // 防止 </report 标签文字被展示给用户。
                        if (reportClosed && inReportStream) {
                            inReportStream = false;
                            // 立刻清除所有展示中的 pending 占位元素（可能包含 </report 片段）
                            if (assistantEl) {
                                const _content = assistantEl.querySelector('.message-content');
                                const _reportBlock = _content && _content.querySelector('#streamingReportBlock');
                                if (_reportBlock) {
                                    const _pendingEl = _reportBlock.querySelector('#streamingTablePending');
                                    if (_pendingEl) _pendingEl.remove();
                                    // 清空节流缓存，防止节流 timer 再次展示旧内容
                                    _streamPendingStable = '';
                                    if (_streamThrottleTimer) { clearTimeout(_streamThrottleTimer); _streamThrottleTimer = null; }

                                    if (!_reportBlock.querySelector('#chartWaitingCard')) {
                                        const waitCard = document.createElement('div');
                                        waitCard.id = 'chartWaitingCard';
                                        waitCard.style.cssText =
                                            'display:flex;align-items:center;gap:10px;'
                                            + 'margin-top:16px;padding:12px 16px;'
                                            + 'background:linear-gradient(135deg,rgba(79,110,247,0.06) 0%,rgba(6,182,212,0.05) 100%);'
                                            + 'border:1px solid rgba(79,110,247,0.18);border-radius:10px;'
                                            + 'font-size:0.82rem;color:var(--primary);';
                                        waitCard.innerHTML =
                                            // 旋转加载圈
                                            '<div style="width:16px;height:16px;flex-shrink:0;border:2.5px solid rgba(79,110,247,0.2);'
                                            + 'border-top-color:#4f6ef7;border-radius:50%;'
                                            + 'animation:spinLoader 0.7s linear infinite;"></div>'
                                            // 图表 emoji + 文字
                                            + '<span id="chartWaitingText" style="font-weight:500;">&#x1F4CA; 正在绘制图表，请稍候…</span>';
                                        _reportBlock.appendChild(waitCard);
                                        // 动态点动画
                                        let _wDots = 0;
                                        window._chartWaitTimer = setInterval(() => {
                                            const el = document.getElementById('chartWaitingText');
                                            if (!el) { clearInterval(window._chartWaitTimer); return; }
                                            _wDots = (_wDots + 1) % 4;
                                            el.innerHTML = '&#x1F4CA; 正在绘制图表，请稍候' + '．'.repeat(_wDots);
                                        }, 400);
                                        if (!streamingUserScrolledUp) {
                                            requestAnimationFrame(() => {
                                                document.getElementById('chatMessages').scrollTop = 99999;
                                            });
                                        }
                                    } // end if !chartWaitingCard
                                } // end if _reportBlock
                            } // end if assistantEl
                        } // end if reportClosed
                    } // end if reportInner
                } else {
                    // Chart JSON accumulating: update the loading text with received byte count
                    // so the user sees progress rather than a frozen spinner.
                    // 如果是由 report 切换过来的（inReportStream 已变 false），
                    // chartLoadingText 不存在，此时只需更新已有的等待卡文字即可。
                    const chartInner = assistantText.match(/<chart>([\s\S]*)/i);
                    if (chartInner) {
                        const received = chartInner[1].replace(/<\/chart>[\s\S]*/i, '').length;
                        const kb = (received / 1024).toFixed(1);
                        // 先尝试更新原有的 chartLoadingText（纯 chart 模式）
                        const loadingTxt = document.getElementById('chartLoadingText');
                        if (loadingTxt) {
                            loadingTxt.textContent = `正在生成图表… (${kb}KB)`;
                        } else {
                            // report+chart 组合模式：先检查是否需要补插等待卡（如果 reportClosed 时等待卡没有成功插入）
                            if (assistantEl && !document.getElementById('chartWaitingCard')) {
                                const _c = assistantEl.querySelector('.message-content');
                                const _rb = _c && (_c.querySelector('#streamingReportBlock') || _c.querySelector('.report-block'));
                                if (_rb) {
                                    const _pendingEl2 = _rb.querySelector('#streamingTablePending');
                                    if (_pendingEl2) _pendingEl2.remove();
                                    const waitCard = document.createElement('div');
                                    waitCard.id = 'chartWaitingCard';
                                    waitCard.style.cssText =
                                        'display:flex;align-items:center;gap:10px;'
                                        + 'margin-top:16px;padding:12px 16px;'
                                        + 'background:linear-gradient(135deg,rgba(79,110,247,0.06) 0%,rgba(6,182,212,0.05) 100%);'
                                        + 'border:1px solid rgba(79,110,247,0.18);border-radius:10px;'
                                        + 'font-size:0.82rem;color:var(--primary);';
                                    waitCard.innerHTML =
                                        '<div style="width:16px;height:16px;flex-shrink:0;border:2.5px solid rgba(79,110,247,0.2);'
                                        + 'border-top-color:#4f6ef7;border-radius:50%;'
                                        + 'animation:spinLoader 0.7s linear infinite;"></div>'
                                        + '<span id="chartWaitingText" style="font-weight:500;">&#x1F4CA; 正在绘制图表，请稍候…</span>';
                                    _rb.appendChild(waitCard);
                                    if (!window._chartWaitTimer) {
                                        let _wDots = 0;
                                        window._chartWaitTimer = setInterval(() => {
                                            const el2 = document.getElementById('chartWaitingText');
                                            if (!el2) { clearInterval(window._chartWaitTimer); return; }
                                            const kb2 = chartInner ? (chartInner[1].replace(/<\/chart>[\s\S]*/i, '').length / 1024).toFixed(1) : '0.0';
                                            el2.innerHTML = '&#x1F4CA; 正在绘制图表，请稍候…';
                                        }, 400);
                                    }
                                    if (!streamingUserScrolledUp) {
                                        requestAnimationFrame(() => {
                                            document.getElementById('chatMessages').scrollTop = 99999;
                                        });
                                    }
                                }
                            }
                            // 更新已有的等待卡文字
                            const waitTxt = document.getElementById('chartWaitingText');
                            if (waitTxt && received > 0) {
                                waitTxt.innerHTML = '&#x1F4CA; 正在绘制图表，请稍候…';
                            }
                        }
                    }
                }
                return;
            }

            // Normal streaming: show plain text
            if (!assistantEl) { removeTyping(typingEl); assistantEl = appendMessage('assistant', ''); }
            // Update streaming context
            if (streamingContext) streamingContext.assistantEl = assistantEl;
            // Remove tool status line once real text arrives
            const statusLineEl = assistantEl.querySelector('#toolStatusLine');
            if (statusLineEl) statusLineEl.remove();
            // Clear any active query-wait card since real text is arriving
            clearQueryWaitCard();
            updateLastMessage(assistantEl, assistantText);

            // ── Start debounce: if text stream goes silent for 2s and we're not inside a
            // special block, assume the LLM has called query_dataset and is waiting.
            // Reset the debounce on every text chunk so it only fires when truly silent.
            if (!inSpecialBlock && !pendingChartLoading) {
                if (queryWaitDebounce) clearTimeout(queryWaitDebounce);
                queryWaitDebounce = setTimeout(() => {
                    queryWaitDebounce = null;
                    showQueryWaitCard();
                }, 2000);
            }

            // If query_dataset already finished and the LLM is now outputting conclusion text,
            // show a "generating chart…" bar at the bottom of the bubble so the user knows
            // a chart is coming. This prevents the chart from hard-popping in with no warning.
            if (pendingChartLoading && assistantEl) {
                const content = assistantEl.querySelector('.message-content');
                if (content && !content.querySelector('#preChartLoadingBar')) {
                    const bar = document.createElement('div');
                    bar.id = 'preChartLoadingBar';
                    bar.style.cssText =
                        'display:flex;align-items:center;gap:8px;margin-top:8px;'
                        + 'padding:8px 12px;background:var(--surface2);border:1px solid var(--border);'
                        + 'border-radius:var(--radius-sm);font-size:0.78rem;color:var(--text-hint);';
                    bar.innerHTML =
                        '<div style="width:12px;height:12px;flex-shrink:0;border:2px solid var(--border);'
                        + 'border-top-color:var(--primary);border-radius:50%;'
                        + 'animation:spinLoader 0.7s linear infinite;"></div>'
                        + '<span id="preChartText">📊 正在生成图表…</span>';
                    content.appendChild(bar);
                    // Animate dots
                    let _preDots = 0;
                    window._preChartTimer = setInterval(() => {
                        const el = document.getElementById('preChartText');
                        if (!el) { clearInterval(window._preChartTimer); return; }
                        _preDots = (_preDots + 1) % 4;
                        el.textContent = '📊 正在生成图表' + '．'.repeat(_preDots);
                    }, 400);
                }
            }
        };

        const checkDone = setInterval(() => {
            if (eventSource.readyState === EventSource.CLOSED) {
                clearInterval(checkDone); doFinalize();
            }
        }, 300);

        eventSource.onerror = () => {
            // When app is in background on mobile, SSE connection may be interrupted.
            // If page is hidden, don't close immediately - let visibility handler deal with it.
            if (document.visibilityState === 'hidden') {
                console.log('[SSE] onerror while page hidden - close source and wait resume');
                // Important: EventSource may auto-reconnect and re-hit /api/chat,
                // causing duplicate user turns. Close explicitly and recover via /api/chat/resume.
                eventSource.close();
                // 停止 checkDone 定时器，防止它检测到 CLOSED 后触发 doFinalize()
                // （doFinalize 会把 streamingContext.finalized=true，导致切回来时走错误分支）
                clearInterval(checkDone);
                return;
            }

            // Page is visible - this is a real error
            console.log('[SSE] onerror while page visible - closing connection');
            eventSource.close();
            clearInterval(checkDone);
            if (!assistantEl && assistantText === '') {
                removeTyping(typingEl);
                appendMessage('assistant', '（请求出错，请重试）');
                setProcessing(false);
            } else {
                doFinalize();
            }
        };
    }

    function setProcessing(flag) {
        isProcessing = flag;
        document.getElementById('sendBtn').disabled = flag;
        document.getElementById('chatInput').disabled = flag;
    }

    /* ═══════════════════════ Message helpers ═══════════════════════ */
    function appendMessage(role, text) {
        const container = document.getElementById('chatMessages');
        const div = document.createElement('div');
        div.className = 'message ' + role;
        const label = role === 'user' ? '你' : '助手';
        div.innerHTML = `<span class="message-label">${label}</span><div class="message-content">${escapeHtml(text)}</div>`;
        container.appendChild(div);
        container.scrollTop = container.scrollHeight;
        return div;
    }

    function updateLastMessage(el, text) {
        const content = el.querySelector('.message-content');
        // If the snapshot contains a <report> block (e.g. from DB COMPLETED resume),
        // strip it entirely here: finalizeMessage will render it properly as a card.
        // Also strip complete or incomplete <chart> blocks.
        let displayText = text
            .replace(/<report[^>]*>[\s\S]*?<\/report>/gi, '')
            .replace(/<report[^>]*>[\s\S]*/gi, '')  // incomplete report tag tail
            .replace(/<chart[^>]*>[\s\S]*?<\/chart>/gi, '')
            .replace(/<chart[^>]*>[\s\S]*/gi, '')   // incomplete chart tag tail
            .trim();
        // \u8fc7\u6ee4\u6389\u88f8\u9732\u7684\u56fe\u8868 JSON\uff08LLM \u6709\u65f6\u4f1a\u5728 <report> \u4e4b\u524d\u8f93\u51fa JSON\uff09
        // \u5339\u914d\u5355\u7cfb\u5217\uff08data\uff09\u548c\u591a\u7cfb\u5217\uff08series/categories\uff09\u4e24\u79cd\u683c\u5f0f
        const looseChartJsonRegex = /\{(?:[^{}]|\{(?:[^{}]|\{[^{}]*\})*\})*"type"\s*:\s*"(?:bar|line|pie|multi_line|multi_bar|dual_axes)"(?:[^{}]|\{(?:[^{}]|\{[^{}]*\})*\})*\}/gi;
        const filteredText = displayText.replace(looseChartJsonRegex, '').trim();
        // \u4f7f\u7528\u7edf\u4e00\u7684 renderMarkdown \u6e32\u67d3\uff08\u542b\u6807\u9898\u4fee\u590d + **\u4e2d\u6587\uff1a** \u4fee\u590d\uff09
        if (typeof renderMarkdown !== 'undefined') {
            content.innerHTML = renderMarkdown(filteredText);
            if (typeof wrapTables !== 'undefined') wrapTables(content);
        } else {
            content.textContent = filteredText;
        }
        // \u9ad8\u4eae\u5355\u72ec\u4e00\u884c\u7684\u7eaf\u6570\u5b57\u7c97\u4f53\uff08\u7cbe\u786e\u53d6\u6570\u578b\u7ed3\u679c\uff09
        highlightSingleNumber(content);
        if (!streamingUserScrolledUp) {
            document.getElementById('chatMessages').scrollTop = 99999;
        }
    }

    function finalizeMessage(el, fullText, isLastMessage) {
        const chartRegex   = /<chart>\s*([\s\S]*?)\s*<\/chart>/i;
        const reportRegex  = /<report>\s*([\s\S]*?)\s*<\/report>/i;
        const confirmRegex = /\[CONFIRM_PLAN\]/;

        const hasConfirm  = confirmRegex.test(fullText);
        const chartMatch  = fullText.match(chartRegex);
        const reportMatch = fullText.match(reportRegex);

        // Strip all special tokens/blocks from plain text
        let textPart = fullText
            .replace(chartRegex, '')
            .replace(reportRegex, '')
            .replace(confirmRegex, '')
            .trim();

        // 移除不在 <chart> 标签内的裸露图表 JSON（LLM 有时会把 JSON 输出在错误的位置）
        // 匹配单系列（data）和多系列（series/categories）两种格式
        const looseChartJsonRegex = /\{(?:[^{}]|\{(?:[^{}]|\{[^{}]*\})*\})*"type"\s*:\s*"(?:bar|line|pie|multi_line|multi_bar|dual_axes)"(?:[^{}]|\{(?:[^{}]|\{[^{}]*\})*\})*\}/gi;
        textPart = textPart.replace(looseChartJsonRegex, '').trim();

        let chartHtml = '';
        if (chartMatch) {
            try { chartHtml = buildChartHtml(JSON.parse(chartMatch[1].trim())); } catch (e) {}
        }

        let reportHtml = '';
        let reportRawContent = '';
        if (reportMatch) {
            let raw = reportMatch[1].trim();
            reportRawContent = raw; // 保存原始 Markdown 内容用于下载
            // 用统一的 renderMarkdown（含标题修复 + **中文：** 修复）转为 HTML
            const parsedHtml = (typeof renderMarkdown !== 'undefined')
                ? renderMarkdown(raw)
                : `<pre style="white-space:pre-wrap">${escapeHtml(raw)}</pre>`;
            const reportId = 'report_' + Math.random().toString(36).substr(2, 9);
            const downloadBtnsHtml = `
                <div class="report-actions">
                    <button class="report-download-btn" data-report-id="${reportId}">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
                        Markdown
                    </button>
                    <button class="report-download-btn primary" data-report-id="${reportId}">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
                        HTML报告
                    </button>
                </div>`;
            reportHtml = `<div class="report-block" id="${reportId}" data-raw-content="">${parsedHtml}${downloadBtnsHtml}</div>`;
        }

        const content = el.querySelector('.message-content');

        if (reportHtml || chartHtml) {
            // Clear chart loading timers if running
            if (window._chartLoadingTimer) { clearInterval(window._chartLoadingTimer); window._chartLoadingTimer = null; }
            if (window._preChartTimer) { clearInterval(window._preChartTimer); window._preChartTimer = null; }
            if (window._chartWaitTimer) { clearInterval(window._chartWaitTimer); window._chartWaitTimer = null; }
            // 移除 report 内的图表等待提示卡和重连提示卡（如果有）
            const _chartWaitCard = content.querySelector('#chartWaitingCard');
            if (_chartWaitCard) _chartWaitCard.remove();
            const _resumeRetryCard = content.querySelector('#resumeRetryCard');
            if (_resumeRetryCard) _resumeRetryCard.remove();
            content.classList.add('has-chart');

            // ── Surgical DOM update: avoid full innerHTML replace so CSS animations fire ──
            // 1. Remove the loading indicator (spinner shown while chart JSON was buffering)
            const loadingEl = content.querySelector('#msgLoadingIndicator');
            if (loadingEl) loadingEl.remove();
            // Remove any pre-chart bar that may still be in the DOM
            const preChartEl = content.querySelector('#preChartLoadingBar');
            if (preChartEl) preChartEl.remove();

            // 1b. If content has no .text-part yet, it means updateLastMessage wrote raw HTML
            //     directly into content.innerHTML (streaming path). We must clear that stale
            //     content now, otherwise the report/chart text will be duplicated.
            if (!content.querySelector('.text-part')) {
                // Preserve special child nodes that may have been injected via SSE
                const toKeep = [
                    content.querySelector('.confirm-actions-wrap'),
                    content.querySelector('#resumeRetryCard'),
                    content.querySelector('#chartWaitingCard'),
                    content.querySelector('.report-block'),
                    content.querySelector('.chart-wrapper'),
                ].filter(Boolean);
                content.innerHTML = '';
                toKeep.forEach(n => content.appendChild(n));
            }

            // 2. Ensure the text-part div is present (it might not exist yet if LLM had no
            //    preamble text before the <chart>/<report> tag).
            if (textPart) {
                let textPartEl = content.querySelector('.text-part');
                if (!textPartEl) {
                    textPartEl = document.createElement('div');
                    textPartEl.className = 'text-part';
                    content.prepend(textPartEl);
                }
                // 使用 renderMarkdown 渲染 Markdown 格式的普通文本
                if (typeof renderMarkdown !== 'undefined') {
                    textPartEl.innerHTML = renderMarkdown(textPart);
                    if (typeof wrapTables !== 'undefined') wrapTables(textPartEl);
                } else {
                    textPartEl.textContent = textPart;
                }
            }

            // 3. Append report block (replace existing streaming block if present)
            if (reportHtml) {
                const existingReport = content.querySelector('.report-block');
                if (existingReport) existingReport.remove();
                const reportEl = document.createElement('div');
                reportEl.innerHTML = reportHtml;
                const reportBlock = reportEl.firstElementChild;
                // 设置原始内容到data属性
                reportBlock.dataset.rawContent = reportRawContent;
                content.appendChild(reportBlock);
                // 把 report 块内所有 table 包上 table-wrapper，解决列宽不一致
                if (typeof wrapTables !== 'undefined') wrapTables(reportBlock);
                // 流式期间 overflow-x 被锁定为 hidden，此处恢复为 auto，让宽表格可以左右滚动
                reportBlock.querySelectorAll('.table-wrapper').forEach(tw => {
                    tw.style.overflowX = 'auto';
                });
                
                // 为下载按钮添加事件监听
                reportBlock.querySelectorAll('.report-download-btn').forEach(btn => {
                    btn.addEventListener('click', function() {
                        const rawContent = this.closest('.report-block').dataset.rawContent;
                        if (this.classList.contains('primary')) {
                            downloadHtmlReport(rawContent);
                        } else {
                            downloadMarkdownReport(rawContent);
                        }
                    });
                });
            }

            // 4. Append chart wrapper as a NEW element so the CSS fade-in animation triggers.
            //    Using innerHTML on a temp div then moving the child preserves animation.
            if (chartHtml) {
                const tmp = document.createElement('div');
                tmp.innerHTML = chartHtml;
                const chartEl = tmp.firstElementChild;
                content.appendChild(chartEl);
                // Force a reflow so the animation restart is guaranteed
                void chartEl.offsetWidth;
                // 初始化ECharts图表
                requestAnimationFrame(() => {
                    initAllCharts();
                });
            }

            requestAnimationFrame(() => {
                document.getElementById('chatMessages').scrollTop = 99999;
            });
        } else {
            // 没有报告/图表时，也用 marked 渲染 Markdown
            // ⚠️ innerHTML 全量替换前，先把 SSE 已注入的确认按钮保存下来，替换后再追回。
            // 否则 renderPlan(needConfirm=true) 先注入按钮，finalizeMessage 替换 innerHTML 清空
            // 后再次注入，导致确认按钮闪烁出现两次。
            // Clear any residual chart loading timers/cards (may linger after resume)
            if (window._chartLoadingTimer) { clearInterval(window._chartLoadingTimer); window._chartLoadingTimer = null; }
            if (window._preChartTimer) { clearInterval(window._preChartTimer); window._preChartTimer = null; }
            if (window._chartWaitTimer) { clearInterval(window._chartWaitTimer); window._chartWaitTimer = null; }
            const existingConfirmWrap = content.querySelector('.confirm-actions-wrap');
            const textToRender = textPart || fullText;
            if (typeof renderMarkdown !== 'undefined') {
                content.innerHTML = renderMarkdown(textToRender);
                if (typeof wrapTables !== 'undefined') wrapTables(content);
            } else {
                content.textContent = textToRender;
            }
            // 把之前保存的确认按钮追回（如果 SSE 已注入过）
            if (existingConfirmWrap) {
                content.appendChild(existingConfirmWrap);
            }
        }

        // 高亮单独一行的纯数字粗体（精确取数型结果）
        highlightSingleNumber(content);

        // Render confirm-plan action buttons (fallback: triggered by LLM token)
        // Primary injection happens via plan SSE (renderPlan); this is the backup path.
        // Skip if user already made a decision (confirmDecided) to avoid re-injection.
        // Also skip if SSE already injected (check .confirm-actions-wrap, not .confirm-actions)
        if (hasConfirm && !confirmDecided && !content.querySelector('.confirm-actions-wrap')) {
            const wrapDiv = document.createElement('div');
            wrapDiv.className = 'confirm-actions-wrap';
            wrapDiv.innerHTML = `
                <div class="confirm-actions-label">
                    <div class="confirm-actions-label-icon-wrap">
                        <svg class="confirm-actions-label-icon" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                            <path d="M12 2C12 2 8 6.5 8 13a4 4 0 0 0 8 0c0-6.5-4-11-4-11z" fill="rgba(255,255,255,0.95)" stroke="rgba(255,255,255,0.6)" stroke-width="0.5"/>
                            <path d="M9 13.5c-.8.6-2 1-2.5 2.5" stroke="rgba(255,255,255,0.8)" stroke-width="1.4" stroke-linecap="round"/>
                            <path d="M15 13.5c.8.6 2 1 2.5 2.5" stroke="rgba(255,255,255,0.8)" stroke-width="1.4" stroke-linecap="round"/>
                            <circle cx="12" cy="13" r="1.8" fill="rgba(79,110,247,0.9)"/>
                            <path d="M10.5 19.5l1.5 2.5 1.5-2.5" stroke="rgba(255,255,255,0.8)" stroke-width="1.3" stroke-linecap="round" stroke-linejoin="round"/>
                        </svg>
                    </div>
                    <div class="confirm-actions-label-text">
                        <span class="confirm-actions-label-title">计划已就绪</span>
                        <span class="confirm-actions-label-sub">请确认是否开始执行分析</span>
                    </div>
                </div>
                <div class="confirm-actions">
                    <button class="confirm-btn confirm-yes" onclick="sendConfirm(this, '\u6267\u884c')">
                        <svg width="15" height="15" viewBox="0 0 15 15" fill="none"><path d="M3 7.5l3.5 3.5L12 4" stroke="#fff" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>
                        立即执行
                    </button>
                    <button class="confirm-btn confirm-no" onclick="sendConfirm(this, '\u4e0d\u6267\u884c')">暂不执行</button>
                </div>`;
            content.appendChild(wrapDiv);
        }

        // 在消息气泡下方追加推荐问题（仅非确认类回复、且是最后一条消息）
        // 插入到 el（.message.assistant）内部、消息气泡之后，避免撑高内容区
        if (!hasConfirm && isLastMessage && suggestedQuestions.length > 0) {
            // 先移除页面内所有旧的推荐问题块，确保全局只有当前气泡保留一份
            document.querySelectorAll('.post-report-sugg').forEach(old => old.remove());
            const chips = suggestedQuestions.map(q =>
                `<button class="post-report-sugg-chip" onclick="sendSuggestionText(this)">${escapeHtml(q)}</button>`
            ).join('');
            const suggDiv = document.createElement('div');
            suggDiv.className = 'post-report-sugg';
            suggDiv.innerHTML = `
                <div class="post-report-sugg-label">继续提问</div>
                <div class="post-report-sugg-scroll">${chips}</div>`;
            el.appendChild(suggDiv);
        }

        // Scroll to bottom only when there is no report/chart block;
        // report/chart scrolling is handled above with scrollIntoView.
        if (!reportHtml && !chartHtml) {
            document.getElementById('chatMessages').scrollTop = 99999;
        }
    }

    function appendTyping() {
        const container = document.getElementById('chatMessages');
        const div = document.createElement('div');
        div.className = 'message assistant';
        div.innerHTML = `<span class="message-label">助手</span>
            <div class="typing-indicator">
                <span class="typing-dot"></span><span class="typing-dot"></span><span class="typing-dot"></span>
            </div>`;
        container.appendChild(div);
        container.scrollTop = container.scrollHeight;
        return div;
    }

    function removeTyping(el) { if (el && el.parentNode) el.parentNode.removeChild(el); }
    function escapeHtml(t) { return t.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

    // 高亮单独一行的纯数字粗体（精确取数型结果）
    // 匹配模式：<p><strong>数字</strong></p>，其中数字只包含数字、逗号、小数点、百分号、空格
    function highlightSingleNumber(contentEl) {
        if (!contentEl) return;
        const paragraphs = contentEl.querySelectorAll('p');
        paragraphs.forEach(p => {
            const strong = p.querySelector('strong');
            // 确保 p 标签内只有一个 strong 子元素，且没有其他文本节点
            if (strong && p.children.length === 1 && p.childNodes.length === 1) {
                const text = strong.textContent.trim();
                // 检查是否为纯数字格式（允许逗号、小数点、百分号、空格）
                // 例如：168,613,795 或 85.6% 或 1,234.56
                if (/^[\d,\.\s%]+$/.test(text) && /\d/.test(text)) {
                    p.classList.add('single-number');
                }
            }
        });
    }

    // 初始化 marked.js：开启 GFM（表格/任务列表等）和换行符支持
    if (typeof marked !== 'undefined') {
        marked.setOptions({ gfm: true, breaks: true });
        console.log('[DEBUG] marked.js 加载成功，版本:', marked.version || 'unknown');

        /**
         * 统一的 Markdown 预处理 + 渲染函数（全局使用，替代直接调用 marked.parse）
         * 修复 marked 对以下模式的解析问题：
         * 1. **中文标签：** 后紧跟内容时（如 **核心结论：** 文字），marked 有时不能识别为粗体
         * 2. 标题格式修复（#标题 → # 标题）
         */
        window.renderMarkdown = function(raw) {
            if (!raw) return '';
            let md = raw;
            // 修复 Markdown 标题格式：将 `#标题` 替换为 `# 标题`
            md = md.replace(/^(#{1,6})([^#\s])/gm, '$1 $2');
            md = md.replace(/^(#{1,6})\s{2,}/gm, '$1 ');
            // 修复 **中文内容：** 后紧跟文字时 marked 不能识别的问题：
            // 将 `**text：**文字` 或 `**text:** 文字`（冒号全/半角，后无空格）补上空格
            md = md.replace(/(\*\*[^*]+[：:]\*\*)([^\s*])/g, '$1 $2');
            try {
                return marked.parse(md);
            } catch(e) {
                return '<pre style="white-space:pre-wrap;word-break:break-word">' + escapeHtml(md) + '</pre>';
            }
        };

        /**
         * 将容器元素内所有裸露的 <table> 包裹进 <div class="table-wrapper">
         * 解决 display:table 下表头与内容列宽不对齐的问题。
         * 在每次 innerHTML 赋值后调用。
         */
        window.wrapTables = function(el) {
            if (!el) return;
            el.querySelectorAll('table').forEach(table => {
                if (table.parentElement && table.parentElement.classList.contains('table-wrapper')) return;
                const wrapper = document.createElement('div');
                wrapper.className = 'table-wrapper';
                table.parentNode.insertBefore(wrapper, table);
                wrapper.appendChild(table);
            });
        };
    } else {
        console.error('[DEBUG] marked.js 加载失败！请检查网络或文件路径');
        // 显示警告提示
        window.addEventListener('load', function() {
            const warning = document.createElement('div');
            warning.style.cssText = 'position:fixed;top:0;left:0;right:0;background:#ff4444;color:#fff;padding:10px;text-align:center;z-index:9999;font-size:14px;';
            warning.textContent = '警告：Markdown 解析库加载失败，报告将无法正确显示格式';
            document.body.appendChild(warning);
            setTimeout(() => warning.remove(), 5000);
        });
    }

    /* ═══════════════════════ ECharts Engine ═══════════════════════ */
    const CHART_COLORS = [
        '#1a73e8','#ea4335','#fbbc04','#34a853','#9c27b0',
        '#ff6d00','#00bcd4','#795548','#607d8b','#e91e63'
    ];

    // 存储图表实例的映射表，用于切换图表/表格时销毁旧实例
    const chartInstances = new Map();

    function buildChartHtml(def) {
        if (!def) return '';
        const type = (def.type || 'bar').toLowerCase();
        const isMultiSeries = ['multi_line', 'multi_bar', 'dual_axes'].includes(type);
        // 单系列：需要 data 数组；多系列：需要 categories 或 series
        if (isMultiSeries) {
            const hasSeries = Array.isArray(def.series) && def.series.length > 0;
            if (!hasSeries) return '';
        } else {
            if (!Array.isArray(def.data) || def.data.length === 0) return '';
        }
        const chartId = 'echarts_' + Math.random().toString(36).substr(2, 9);
        const tableId = 'table_' + Math.random().toString(36).substr(2, 9);
        
        // 构建工具栏HTML
        const toolbarHtml = `
            <div class="chart-toolbar">
                <button class="chart-tool-btn active" onclick="switchToChart('${chartId}', '${tableId}', this)" title="图表视图">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="18" height="18" rx="2"/><path d="M3 9h18M9 21V9"/></svg>
                </button>
                <button class="chart-tool-btn" onclick="switchToTable('${chartId}', '${tableId}', this)" title="表格视图">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="18" height="18" rx="2"/><path d="M3 9h18M3 15h18M9 3v18M15 3v18"/></svg>
                </button>
            </div>`;
        
        // 构建ECharts图表容器（JSON存入双引号属性，对"转义为&quot;以防止属性值截断）
        const safeJson = JSON.stringify(def).replace(/"/g, '&quot;');
        const chartHtml = `<div class="chart-container" id="${chartId}" data-chart-def="${safeJson}"></div>`;
        // 构建表格容器（默认隐藏）
        const tableHtml = `<div class="data-table-container" id="${tableId}" style="display:none;">${buildDataTable(def)}</div>`;
        
        return `<div class="chart-wrapper">
            <div class="chart-header">
                <div class="chart-title">${escapeHtml(def.title || '数据可视化')}</div>
                ${toolbarHtml}
            </div>
            ${chartHtml}${tableHtml}</div>`;
    }

    // 切换到图表视图
    function switchToChart(chartId, tableId, btn) {
        const chartEl = document.getElementById(chartId);
        const tableEl = document.getElementById(tableId);
        if (!chartEl || !tableEl) return;
        
        chartEl.style.display = 'block';
        tableEl.style.display = 'none';
        
        // 更新按钮状态
        const toolbar = btn.closest('.chart-toolbar');
        toolbar.querySelectorAll('.chart-tool-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        
        // 重新渲染图表
        renderEChart(chartId);
    }

    // 切换到表格视图
    function switchToTable(chartId, tableId, btn) {
        const chartEl = document.getElementById(chartId);
        const tableEl = document.getElementById(tableId);
        if (!chartEl || !tableEl) return;
        
        chartEl.style.display = 'none';
        tableEl.style.display = 'block';
        
        // 更新按钮状态
        const toolbar = btn.closest('.chart-toolbar');
        toolbar.querySelectorAll('.chart-tool-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        
        // 销毁图表实例以节省内存
        if (chartInstances.has(chartId)) {
            chartInstances.get(chartId).dispose();
            chartInstances.delete(chartId);
        }
    }

    // 构建数据表格HTML（支持单系列和多系列）
    function buildDataTable(def) {
        if (!def) return '';
        const type = (def.type || 'bar').toLowerCase();
        const isMultiSeries = ['multi_line', 'multi_bar', 'dual_axes'].includes(type);

        if (isMultiSeries) {
            // 多系列格式：categories + series[]
            const categories = def.categories || [];
            const series = def.series || [];
            if (categories.length === 0 && series.length === 0) return '';

            let html = '<table class="data-table"><thead><tr>';
            html += '<th>序号</th><th>类别</th>';
            series.forEach(s => { html += `<th>${escapeHtml(s.name || '')}</th>`; });
            html += '</tr></thead><tbody>';
            categories.forEach((cat, idx) => {
                html += `<tr><td>${idx + 1}</td><td>${escapeHtml(String(cat))}</td>`;
                series.forEach(s => {
                    const val = s.data && s.data[idx] !== undefined ? s.data[idx] : '-';
                    html += `<td>${typeof val === 'number' ? fmtNum(val) : val}</td>`;
                });
                html += '</tr>';
            });
            html += '</tbody></table>';
            return html;
        } else {
            // 单系列格式：data[{label, value}]
            if (!Array.isArray(def.data) || def.data.length === 0) return '';
            let html = '<table class="data-table"><thead><tr>';
            html += '<th>序号</th><th>类别</th><th>数值</th>';
            html += '</tr></thead><tbody>';
            def.data.forEach((item, idx) => {
                html += `<tr><td>${idx + 1}</td><td>${escapeHtml(String(item.label || ''))}</td><td>${fmtNum(item.value)}</td></tr>`;
            });
            html += '</tbody></table>';
            return html;
        }
    }

    // 使用ECharts渲染图表
    function renderEChart(chartId) {
        const chartEl = document.getElementById(chartId);
        if (!chartEl) return;
        
        // 获取图表定义数据
        const defAttr = chartEl.getAttribute('data-chart-def');
        if (!defAttr) return;
        
        let def;
        try {
            // getAttribute 会自动解码 HTML 实体（&quot; -> "），直接 parse 即可
            def = JSON.parse(defAttr);
        } catch(e) {
            console.error('解析图表数据失败:', e);
            return;
        }
        
        // 销毁旧实例
        if (chartInstances.has(chartId)) {
            chartInstances.get(chartId).dispose();
        }
        
        // 根据数据量动态调整图表高度
        const dataCount = (def.data || []).length;
        const useZoom = dataCount > 15 && def.type !== 'pie';
        const dynamicH = def.type === 'pie'
            ? 320
            : useZoom
                ? Math.max(320, Math.min(460, 300 + Math.max(0, dataCount - 15) * 4))
                : Math.max(280, Math.min(420, 260 + Math.max(0, dataCount - 6) * 8));
        chartEl.style.height = dynamicH + 'px';
        
        // 创建新实例
        const chart = echarts.init(chartEl);
        chartInstances.set(chartId, chart);
        
        const chartType = (def.type || 'bar').toLowerCase();
        let option;
        
        switch (chartType) {
            case 'line':
                option = buildLineOption(def);
                break;
            case 'multi_line':
                option = buildMultiLineOption(def);
                break;
            case 'multi_bar':
                option = buildMultiBarOption(def);
                break;
            case 'dual_axes':
                option = buildDualAxesOption(def);
                break;
            case 'pie':
                option = buildPieOption(def);
                break;
            case 'bar':
            default:
                option = buildBarOption(def);
        }
        
        chart.setOption(option);
        
        // 响应窗口大小变化
        const resizeHandler = () => chart.resize();
        window.addEventListener('resize', resizeHandler);
    }

    // 格式化数字（千位分隔符）
    function formatNumber(num) {
        if (num === null || num === undefined) return '-';
        const n = Number(num);
        if (isNaN(n)) return String(num);
        // 大数字简化
        if (Math.abs(n) >= 1e8) return (n / 1e8).toFixed(1) + '亿';
        if (Math.abs(n) >= 1e4) return (n / 1e4).toFixed(1) + '万';
        // 千位分隔符
        return n.toLocaleString('zh-CN');
    }

    // 构建柱状图配置
    function buildBarOption(def) {
        const data = def.data || [];
        const count = data.length;
        // 数据量阈值：超过此值启用 dataZoom 滑块
        const ZOOM_THRESHOLD = 15;
        const useZoom = count > ZOOM_THRESHOLD;
        // 初始视窗显示条数（滑块初始范围）
        const windowSize = Math.min(count, ZOOM_THRESHOLD);
        const startPct = useZoom ? Math.max(0, Math.round((count - windowSize) / count * 100)) : 0;

        // 标签旋转：数据多或标签长时旋转，useZoom 模式下标签在视窗内可全显示
        const needsRotate = count > 6 || data.some(d => d.label && d.label.length > 4);
        const bottomPad = useZoom ? 60 : (needsRotate ? 90 : 55);

        // interval: zoom 模式下全显 (0)，否则按容量抽稀
        const maxLabels = 8;
        const interval = useZoom ? 0 : (count <= maxLabels ? 0 : Math.ceil(count / maxLabels) - 1);

        const option = {
            title: { 
                text: def.title || '', 
                left: 'center', 
                top: 10, 
                textStyle: { fontSize: 14, fontWeight: 600, color: '#1f2937' }
            },
            tooltip: { 
                trigger: 'axis', 
                axisPointer: { type: 'shadow' },
                formatter: params => {
                    const p = params[0];
                    return `${p.name}<br/>${p.marker} ${p.seriesName || '数值'}: <b>${formatNumber(p.value)}</b>`;
                }
            },
            grid: { 
                left: '3%', 
                right: '4%', 
                top: 60, 
                bottom: bottomPad, 
                containLabel: true 
            },
            xAxis: {
                type: 'category',
                data: data.map(d => d.label),
                axisLabel: { 
                    rotate: needsRotate ? 40 : 0, 
                    fontSize: 11,
                    color: '#4b5563',
                    interval: interval,
                    overflow: 'truncate',
                    width: needsRotate ? 70 : undefined
                },
                axisLine: { lineStyle: { color: '#e5e7eb' } }
            },
            yAxis: { 
                type: 'value', 
                name: def.yLabel || '',
                nameTextStyle: { color: '#6b7280', padding: [0, 0, 0, 40] },
                axisLabel: { 
                    color: '#6b7280',
                    formatter: val => formatNumber(val)
                },
                splitLine: { lineStyle: { color: '#f3f4f6', type: 'dashed' } }
            },
            series: [{
                name: def.seriesName || '数值',
                type: 'bar',
                data: data.map(d => d.value),
                barMaxWidth: 40,
                itemStyle: { 
                    color: new echarts.graphic.LinearGradient(0, 0, 0, 1, [
                        { offset: 0, color: '#4f6ef7' },
                        { offset: 1, color: '#3451d1' }
                    ]),
                    borderRadius: [5, 5, 0, 0] 
                },
                emphasis: { 
                    itemStyle: { 
                        color: new echarts.graphic.LinearGradient(0, 0, 0, 1, [
                            { offset: 0, color: '#3451d1' },
                            { offset: 1, color: '#1e3a8a' }
                        ])
                    } 
                },
                label: {
                    show: count <= 10,
                    position: 'top',
                    fontSize: 10,
                    color: '#4b5563',
                    formatter: p => formatNumber(p.value)
                }
            }]
        };
        // 数据量大时加 dataZoom 滑动条，让用户可以滑动查看全部数据
        if (useZoom) {
            option.dataZoom = [
                {
                    type: 'slider',
                    xAxisIndex: 0,
                    start: startPct,
                    end: 100,
                    height: 20,
                    bottom: 8,
                    borderColor: 'rgba(79,110,247,0.2)',
                    fillerColor: 'rgba(79,110,247,0.12)',
                    handleStyle: { color: '#4f6ef7', borderColor: '#4f6ef7' },
                    textStyle: { color: '#9ba3c4', fontSize: 10 },
                    moveHandleSize: 6
                },
                { type: 'inside', xAxisIndex: 0 }
            ];
        }
        return option;
    }

    // 构建折线图配置
    function buildLineOption(def) {
        const data = def.data || [];
        const count = data.length;
        const ZOOM_THRESHOLD = 15;
        const useZoom = count > ZOOM_THRESHOLD;
        const windowSize = Math.min(count, ZOOM_THRESHOLD);
        const startPct = useZoom ? Math.max(0, Math.round((count - windowSize) / count * 100)) : 0;

        const needsRotate = count > 6 || data.some(d => d.label && d.label.length > 4);
        const bottomPad = useZoom ? 60 : (needsRotate ? 90 : 55);
        const maxLabels = 8;
        const interval = useZoom ? 0 : (count <= maxLabels ? 0 : Math.ceil(count / maxLabels) - 1);
        // 数据点多时缩小圆点，避免密集
        const symbolSize = count > 20 ? 4 : (count > 10 ? 6 : 8);

        const option = {
            title: { 
                text: def.title || '', 
                left: 'center', 
                top: 10, 
                textStyle: { fontSize: 14, fontWeight: 600, color: '#1f2937' }
            },
            tooltip: { 
                trigger: 'axis',
                formatter: params => {
                    const p = params[0];
                    return `${p.name}<br/>${p.marker} ${p.seriesName || '数值'}: <b>${formatNumber(p.value)}</b>`;
                }
            },
            grid: { 
                left: '3%', 
                right: '4%', 
                top: 60, 
                bottom: bottomPad, 
                containLabel: true 
            },
            xAxis: {
                type: 'category',
                data: data.map(d => d.label),
                boundaryGap: false,
                axisLabel: { 
                    rotate: needsRotate ? 40 : 0, 
                    fontSize: 11,
                    color: '#4b5563',
                    interval: interval,
                    overflow: 'truncate',
                    width: needsRotate ? 70 : undefined
                },
                axisLine: { lineStyle: { color: '#e5e7eb' } }
            },
            yAxis: { 
                type: 'value', 
                name: def.yLabel || '',
                nameTextStyle: { color: '#6b7280', padding: [0, 0, 0, 40] },
                axisLabel: { 
                    color: '#6b7280',
                    formatter: val => formatNumber(val)
                },
                splitLine: { lineStyle: { color: '#f3f4f6', type: 'dashed' } }
            },
            series: [{
                name: def.seriesName || '数值',
                type: 'line',
                data: data.map(d => d.value),
                smooth: true,
                symbol: 'circle',
                symbolSize: symbolSize,
                lineStyle: { 
                    color: '#4f6ef7', 
                    width: count > 20 ? 2 : 3,
                    shadowColor: 'rgba(79, 110, 247, 0.3)',
                    shadowBlur: 8,
                    shadowOffsetY: 4
                },
                itemStyle: { 
                    color: '#4f6ef7',
                    borderWidth: 2,
                    borderColor: '#fff'
                },
                areaStyle: { 
                    color: new echarts.graphic.LinearGradient(0, 0, 0, 1, [
                        { offset: 0, color: 'rgba(79, 110, 247, 0.22)' },
                        { offset: 1, color: 'rgba(79, 110, 247, 0.01)' }
                    ])
                },
                label: {
                    show: count <= 10,
                    position: 'top',
                    fontSize: 10,
                    color: '#4b5563',
                    formatter: p => formatNumber(p.value)
                }
            }]
        };
        if (useZoom) {
            option.dataZoom = [
                {
                    type: 'slider',
                    xAxisIndex: 0,
                    start: startPct,
                    end: 100,
                    height: 20,
                    bottom: 8,
                    borderColor: 'rgba(79,110,247,0.2)',
                    fillerColor: 'rgba(79,110,247,0.12)',
                    handleStyle: { color: '#4f6ef7', borderColor: '#4f6ef7' },
                    textStyle: { color: '#9ba3c4', fontSize: 10 },
                    moveHandleSize: 6
                },
                { type: 'inside', xAxisIndex: 0 }
            ];
        }
        return option;
    }

    // 构建饼图配置
    function buildPieOption(def) {
        const data = def.data || [];
        const hasManyItems = data.length > 6;
        return {
            title: { 
                text: def.title || '', 
                left: 'center', 
                top: 10, 
                textStyle: { fontSize: 15, fontWeight: 600, color: '#1f2937' }
            },
            tooltip: { 
                trigger: 'item', 
                formatter: params => {
                    return `${params.name}<br/>${params.marker} 数值: <b>${formatNumber(params.value)}</b> (${params.percent}%)`;
                }
            },
            legend: { 
                orient: 'horizontal', 
                bottom: 10, 
                type: hasManyItems ? 'scroll' : 'plain',
                itemWidth: 12, 
                itemHeight: 12, 
                textStyle: { fontSize: 11, color: '#4b5563' },
                pageIconColor: '#4f6ef7',
                pageTextStyle: { color: '#4b5563' }
            },
            grid: { top: 80, containLabel: true },
            series: [{
                type: 'pie',
                radius: hasManyItems ? ['30%', '50%'] : ['40%', '60%'],
                center: ['50%', '48%'],
                avoidLabelOverlap: true,
                itemStyle: { 
                    borderRadius: 6, 
                    borderColor: '#fff', 
                    borderWidth: 2 
                },
                label: { 
                    show: !hasManyItems,
                    fontSize: 11,
                    color: '#4b5563',

                },

                    label: { show: true, fontSize: 12, fontWeight: 'bold' },

                    }
