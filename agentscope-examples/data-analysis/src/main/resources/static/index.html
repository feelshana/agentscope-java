<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>红海App智能助手</title>
    <!-- ECharts 图表库（本地，避免CDN网络依赖） -->
    <script src="echarts.min.js"></script>
    <!-- Marked.js Markdown 解析库（本地，避免CDN网络依赖） -->
    <script src="marked.min.js"></script>
    <!-- 调试：立即检查 marked 是否加载成功 -->
    <script>
        window.addEventListener('load', function() {
            if (typeof marked === 'undefined') {
                alert('严重错误：marked.js 未能加载！请检查控制台网络请求。');
                console.error('[CRITICAL] marked.js failed to load. Check if marked.min.js exists and is accessible.');
            } else {
                console.log('[OK] marked.js loaded successfully, version:', marked.version);
                // 测试解析
                const testResult = marked.parse('# Test\n**bold**');
                console.log('[TEST] marked.parse test result:', testResult.substring(0, 50));
            }
        });
    </script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

        :root {
            /* Brand */
            --primary: #4f6ef7;
            --primary-dark: #3451d1;
            --primary-light: rgba(79,110,247,0.09);
            --primary-glow: rgba(79,110,247,0.22);
            --accent: #06b6d4;
            /* Surfaces */
            --bg: #eef1fb;
            --surface: #ffffff;
            --surface2: #f4f6fe;
            --surface3: #e6eaff;
            /* Border */
            --border: rgba(79,110,247,0.12);
            --border-active: rgba(79,110,247,0.5);
            /* Text */
            --text: #1b2040;
            --text-sub: #5c6484;
            --text-hint: #9ba3c4;
            /* Bubbles */
            --bubble-user-bg: linear-gradient(135deg, #4f6ef7 0%, #3451d1 100%);
            --bubble-ai-bg: #ffffff;
            /* Sizes */
            --drawer-handle-h: 52px;
            --drawer-hint-h: 40px;
            --safe-bottom: env(safe-area-inset-bottom, 0px);
            --radius-lg: 20px;
            --radius-md: 14px;
            --radius-sm: 10px;
            /* Shadows */
            --shadow-sm: 0 2px 14px rgba(79,110,247,0.10);
            --shadow-md: 0 8px 32px rgba(79,110,247,0.16);
            --shadow-header: 0 2px 20px rgba(79,110,247,0.22);
        }

        html, body {
            height: 100%; overflow: hidden;
            font-family: -apple-system, BlinkMacSystemFont, 'PingFang SC', 'Noto Sans SC', 'Helvetica Neue', sans-serif;
            background: var(--bg);
            color: var(--text);
            -webkit-font-smoothing: antialiased;
        }

        /* ══════════ Layout shell ══════════ */
        /* Use position:fixed inset:0 — the most reliable way to fill the visible viewport
           on all mobile browsers regardless of address bar / DevTools quirks. */
        .app-shell {
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            display: flex; flex-direction: column;
            overflow: hidden;
        }

        /* ══════════ Header ══════════ */
        .header {
            background: linear-gradient(135deg, #5875f8 0%, #4264f5 40%, #2e4fd4 100%);
            color: #fff;
            padding: 13px 16px;
            padding-top: calc(13px + env(safe-area-inset-top, 0px));
            display: flex; align-items: center; justify-content: space-between;
            flex-shrink: 0;
            z-index: 10;
            position: relative;
            box-shadow: 0 3px 24px rgba(52,81,209,0.30);
        }
        .header::before {
            content: '';
            position: absolute; inset: 0;
            background: url("data:image/svg+xml,%3Csvg width='120' height='56' viewBox='0 0 120 56' xmlns='http://www.w3.org/2000/svg'%3E%3Ccircle cx='100' cy='10' r='40' fill='rgba(255,255,255,0.04)'/%3E%3Ccircle cx='10' cy='50' r='30' fill='rgba(255,255,255,0.03)'/%3E%3C/svg%3E") no-repeat right top;
            pointer-events: none;
        }
        .header::after {
            content: '';
            position: absolute; bottom: 0; left: 0; right: 0; height: 1px;
            background: rgba(255,255,255,0.2);
        }
        .header h1 {
            font-size: 0.97rem; font-weight: 700; letter-spacing: 0.02em;
            display: flex; align-items: center; gap: 10px;
            color: #ffffff;
        }
        .header-logo {
            width: 30px; height: 30px; flex-shrink: 0;
            background: rgba(255,255,255,0.2);
            border-radius: 9px;
            display: flex; align-items: center; justify-content: center;
            border: 1px solid rgba(255,255,255,0.3);
            backdrop-filter: blur(4px);
        }
        .header-right { display: flex; align-items: center; gap: 8px; }
        .status-dot {
            width: 7px; height: 7px; border-radius: 50%;
            background: #6ee7b7;
            box-shadow: 0 0 0 2px rgba(110,231,183,0.3);
            transition: all 0.3s; flex-shrink: 0;
        }
        .status-dot.disconnected { background: #fca5a5; box-shadow: 0 0 0 2px rgba(252,165,165,0.3); }
        .header-icon-btn {
            width: 36px; height: 36px;
            background: rgba(255,255,255,0.15);
            border: 1px solid rgba(255,255,255,0.25);
            border-radius: 10px; color: rgba(255,255,255,0.9);
            cursor: pointer; transition: all 0.2s;
            display: flex; align-items: center; justify-content: center;
            -webkit-appearance: none; font-family: inherit;
            backdrop-filter: blur(4px);
        }
        .header-icon-btn:active { background: rgba(255,255,255,0.28); border-color: rgba(255,255,255,0.5); }
        .header-icon-btn svg { width: 18px; height: 18px; }
        /* 历史对话按钮：带文字，更醒目 */
        .header-history-btn {
            height: 36px; padding: 0 12px; gap: 6px;
            background: rgba(255,255,255,0.18);
            border: 1px solid rgba(255,255,255,0.38);
            border-radius: 10px; color: rgba(255,255,255,0.95);
            cursor: pointer; transition: all 0.2s;
            display: flex; align-items: center; justify-content: center;
            -webkit-appearance: none; font-family: inherit;
            backdrop-filter: blur(4px);
            font-size: 0.82rem; font-weight: 600; white-space: nowrap;
        }
        .header-history-btn svg { width: 16px; height: 16px; flex-shrink: 0; }
        .header-history-btn:active { background: rgba(255,255,255,0.32); border-color: rgba(255,255,255,0.6); }
        /* Remove old text-button styles */
        .history-btn, .reset-btn, .status-badge { display: none !important; }

        /* ══════════ Welcome card ══════════ */
        .welcome-card {
            width: 100%;
            background: linear-gradient(160deg, #ffffff 0%, #f8faff 100%);
            border-radius: var(--radius-lg); border-bottom-left-radius: 5px;
            border: 1px solid rgba(79,110,247,0.12);
            box-shadow: 0 4px 20px rgba(79,110,247,0.09), 0 1px 4px rgba(79,110,247,0.05);
            overflow: hidden;
        }
        .welcome-banner {
            background: var(--surface);
            padding: 20px 18px 16px;
            display: flex; align-items: flex-start; gap: 14px;
            border-bottom: 1px solid var(--border);
        }
        .welcome-avatar {
            width: 48px; height: 48px; flex-shrink: 0;
            background: linear-gradient(135deg, #eef1ff 0%, #dde4ff 100%);
            border-radius: 16px;
            display: flex; align-items: center; justify-content: center;
            box-shadow: 0 4px 16px rgba(79,110,247,0.22), 0 1px 4px rgba(79,110,247,0.12);
            border: 1px solid rgba(79,110,247,0.15);
        }
        .welcome-banner-text { flex: 1; min-width: 0; padding-top: 2px; }
        .welcome-banner-title {
            font-size: 1rem; font-weight: 700; color: var(--text);
            margin-bottom: 5px; line-height: 1.3;
        }
        .welcome-banner-sub {
            font-size: 0.78rem; color: var(--text-sub);
            line-height: 1.6;
        }
        .welcome-chips {
            display: flex; flex-wrap: wrap; gap: 6px;
            padding: 12px 16px 4px;
        }
        .welcome-chip {
            display: inline-flex; align-items: center; gap: 5px;
            padding: 4px 10px;
            background: var(--primary-light);
            border: 1px solid rgba(79,110,247,0.15);
            border-radius: 20px;
            font-size: 0.72rem; font-weight: 600; color: var(--primary-dark);
        }
        .welcome-divider {
            margin: 10px 16px 0;
            border: none; border-top: 1px solid var(--border);
        }
        .welcome-suggest-label {
            padding: 10px 16px 6px;
            font-size: 0.68rem; font-weight: 700; color: var(--text-hint);
            letter-spacing: 0.08em; text-transform: uppercase;
        }
        .welcome-suggest-list {
            padding: 0 12px 12px;
            display: flex; flex-direction: column; gap: 7px;
        }

        /* ── Compact welcome card on short screens ── */
        @media (max-height: 720px) {
            .welcome-banner { padding: 14px 14px 12px; gap: 10px; }
            .welcome-avatar { width: 38px; height: 38px; border-radius: 11px; }
            .welcome-avatar svg { width: 22px; height: 22px; }
            .welcome-banner-title { font-size: 0.9rem; margin-bottom: 3px; }
            .welcome-banner-sub { font-size: 0.74rem; }
            .welcome-chips { padding: 8px 14px 2px; gap: 5px; }
            .welcome-chip { padding: 3px 8px; font-size: 0.68rem; }
            .welcome-suggest-label { padding: 8px 14px 4px; font-size: 0.65rem; }
            .welcome-suggest-list { padding: 0 10px 10px; gap: 5px; }
            .suggestion-btn { padding: 9px 12px; font-size: 0.8rem; }
        }
        @media (max-height: 620px) {
            .welcome-chips { display: none; }
            .welcome-divider { margin: 6px 14px 0; }
            .welcome-banner { padding: 10px 14px 10px; }
        }

        /* ══════════ Post-report suggestions ══════════ */
        /* 出现在助手消息气泡下方（.message.assistant 内），紧凑横向滚动，不抢占报告视野 */
        .post-report-sugg {
            margin-top: 8px;
            display: flex; flex-direction: column; gap: 5px;
            width: 100%;
        }
        .post-report-sugg-label {
            font-size: 0.62rem; font-weight: 700; color: var(--text-hint);
            letter-spacing: 0.08em; text-transform: uppercase;
            padding: 0 2px;
        }
        .post-report-sugg-scroll {
            display: flex; gap: 7px;
            flex-wrap: wrap;
            padding-bottom: 4px;
        }
        .post-report-sugg-chip {
            display: inline-flex; align-items: center; white-space: normal; word-break: break-all;
            padding: 6px 12px;
            background: var(--surface2);
            border: 1px solid rgba(79,110,247,0.18);
            border-radius: 20px;
            font-size: 0.78rem; font-weight: 500; color: var(--primary-dark);
            cursor: pointer; flex-shrink: 0;
            transition: all 0.16s;
            font-family: inherit;
            -webkit-appearance: none;
            box-shadow: 0 1px 4px rgba(79,110,247,0.07);
        }
        .post-report-sugg-chip:active {
            background: var(--primary-light);
            border-color: var(--border-active);
            transform: scale(0.96);
        }

        /* ══════════ Quick suggestions ══════════ */
        .suggestions-wrap {
            display: flex; flex-direction: column; gap: 8px;
            margin-top: 14px;
        }
        .suggestion-btn {
            display: flex; align-items: center; gap: 10px;
            width: 100%; text-align: left;
            background: linear-gradient(135deg, rgba(79,110,247,0.06) 0%, rgba(79,110,247,0.02) 100%);
            border: 1px solid rgba(79,110,247,0.14);
            border-radius: var(--radius-md);
            padding: 11px 14px;
            font-size: 0.85rem; color: var(--primary-dark);
            font-family: inherit; line-height: 1.4;
            cursor: pointer; font-weight: 500;
            transition: all 0.18s;
            -webkit-appearance: none;
            box-shadow: 0 1px 6px rgba(79,110,247,0.06);
        }
        .suggestion-btn:active {
            background: var(--primary-light);
            border-color: var(--border-active);
            transform: scale(0.98);
        }

        /* ══════════ Chat area ══════════ */
        .chat-area {
            flex: 1; min-height: 0; display: flex; flex-direction: column; overflow: hidden;
            position: relative;
            background: var(--bg);
        }
        .chat-messages {
            flex: 1; min-height: 0; overflow-y: auto; -webkit-overflow-scrolling: touch;
            padding: 16px 14px 14px;
            display: flex; flex-direction: column; gap: 16px;
        }
        .message { display: flex; flex-direction: column; }
        .message.user { align-items: flex-end; }
        .message.assistant { align-items: flex-start; }
        .message-label {
            font-size: 0.62rem; color: var(--text-hint); margin-bottom: 5px;
            font-weight: 700; letter-spacing: 0.08em; text-transform: uppercase;
        }
        .message.user .message-content {
            max-width: 80%;
            padding: 11px 16px;
            border-radius: var(--radius-lg); border-bottom-right-radius: 5px;
            background: var(--bubble-user-bg);
            color: #fff;
            line-height: 1.6; white-space: pre-wrap; word-break: break-word;
            font-size: 0.9rem;
            box-shadow: 0 4px 16px rgba(79,110,247,0.3);
        }
        .message.assistant .message-content {
            width: 100%;
            padding: 14px 16px;
            border-radius: var(--radius-lg); border-bottom-left-radius: 5px;
            background: linear-gradient(160deg, #ffffff 0%, #f8faff 100%);
            color: var(--text);
            line-height: 1.75; white-space: pre-wrap; word-break: break-word;
            font-size: 0.9rem;
            border: 1px solid rgba(79,110,247,0.10);
            box-shadow: 0 3px 16px rgba(79,110,247,0.09), 0 1px 3px rgba(79,110,247,0.05);
        }

        .loading-indicator {
            display: inline-flex; gap: 8px; align-items: center;
            padding: 10px 16px;
            background: var(--bubble-ai-bg);
            border: 1px solid var(--border);
            border-radius: var(--radius-lg); border-bottom-left-radius: 5px;
            color: var(--text-sub); font-size: 0.82rem;
            box-shadow: var(--shadow-sm);
        }
        .loading-spinner {
            width: 15px; height: 15px; flex-shrink: 0;
            border: 2px solid var(--border);
            border-top-color: var(--primary);
            border-radius: 50%;
            animation: spinLoader 0.7s linear infinite;
        }
        .typing-indicator {
            display: inline-flex; gap: 5px; align-items: center;
            padding: 12px 16px;
            background: var(--bubble-ai-bg);
            border: 1px solid var(--border);
            border-radius: var(--radius-lg); border-bottom-left-radius: 5px;
            box-shadow: var(--shadow-sm);
        }
        .typing-dot {
            width: 6px; height: 6px; border-radius: 50%;
            background: var(--primary);
            animation: typingBounce 1.2s infinite;
        }
        .typing-dot:nth-child(2) { animation-delay: 0.2s; }
        .typing-dot:nth-child(3) { animation-delay: 0.4s; }
        @keyframes typingBounce {
            0%, 60%, 100% { transform: translateY(0); opacity: 0.5; }
            30% { transform: translateY(-6px); opacity: 1; }
        }

        /* chat input */
        .chat-input-container {
            padding: 10px 14px;
            padding-bottom: calc(10px + var(--safe-bottom));
            border-top: 1px solid rgba(79,110,247,0.09);
            background: linear-gradient(180deg, #f8faff 0%, #ffffff 100%);
            flex-shrink: 0;
            box-shadow: 0 -4px 20px rgba(79,110,247,0.07);
        }
        .chat-input-row { display: flex; gap: 9px; align-items: flex-end; }
        .chat-textarea {
            flex: 1;
            padding: 11px 16px;
            border: 1.5px solid rgba(79,110,247,0.15);
            border-radius: 22px;
            background: #ffffff;
            font-size: 1rem;
            resize: none; min-height: 44px; max-height: 110px;
            outline: none; line-height: 1.5;
            transition: border-color 0.2s, box-shadow 0.2s;
            font-family: inherit;
            -webkit-appearance: none; color: var(--text);
            box-shadow: 0 1px 6px rgba(79,110,247,0.06);
        }
        .chat-textarea:focus {
            border-color: var(--border-active);
            box-shadow: 0 0 0 3px rgba(79,110,247,0.1);
            background: #fff;
        }
        .chat-textarea::placeholder { color: var(--text-hint); }

        .send-btn {
            width: 46px; height: 46px; flex-shrink: 0;
            background: linear-gradient(135deg, var(--primary) 0%, var(--primary-dark) 100%);
            color: #fff; border: none; border-radius: 16px;
            font-size: 1rem; cursor: pointer;
            display: flex; align-items: center; justify-content: center;
            transition: opacity 0.2s, transform 0.15s, box-shadow 0.2s;
            box-shadow: 0 4px 18px var(--primary-glow), 0 1px 4px rgba(52,81,209,0.2);
            -webkit-appearance: none;
        }
        .send-btn:active { opacity: 0.85; transform: scale(0.90); }
        .send-btn:disabled { opacity: 0.3; cursor: not-allowed; box-shadow: none; }
        .hint-text { font-size: 0.68rem; color: var(--text-hint); margin-top: 5px; text-align: center; }

        /* ══════════ Bottom Drawer ══════════ */
        .drawer-overlay {
            position: fixed; inset: 0;
            background: rgba(0,0,0,0.55);
            z-index: 98;
            opacity: 0; pointer-events: none;
            transition: opacity 0.3s ease;
        }
        .drawer-overlay.active { opacity: 1; pointer-events: auto; }

        .plan-drawer {
            position: fixed;
            left: 0; right: 0; bottom: 0;
            z-index: 99;
            background: var(--surface);
            border-radius: 20px 20px 0 0;
            border-top: 1px solid var(--border);
            box-shadow: 0 -4px 24px rgba(99,102,241,0.12);
            display: flex; flex-direction: column;
            transform: translateY(100%);
            transition: transform 0.35s cubic-bezier(0.32, 0.72, 0, 1);
            max-height: 80vh;
            padding-bottom: var(--safe-bottom);
        }
        .plan-drawer.has-plan {
            transform: translateY(calc(100% - var(--drawer-hint-h)));
        }
        .plan-drawer.expanded { transform: translateY(0); }

        .drawer-hint {
            height: var(--drawer-hint-h);
            flex-shrink: 0;
            display: flex; align-items: center; justify-content: center;
            gap: 7px;
            cursor: pointer; user-select: none;
            font-size: 0.78rem; font-weight: 600;
            border-radius: 20px 20px 0 0;
            transition: all 0.4s ease;
            background: linear-gradient(90deg, rgba(99,102,241,0.07), rgba(129,140,248,0.04));
            border-top: 1px solid rgba(99,102,241,0.2);
            color: var(--primary);
            letter-spacing: 0.02em;
            position: relative;
        }
        .drawer-hint:active { filter: brightness(1.2); }
        /* 向上箭头：展开提示 */
        .drawer-hint-arrow {
            display: flex; align-items: center; justify-content: center;
            width: 18px; height: 18px; flex-shrink: 0;
            opacity: 0.7;
            transition: transform 0.25s ease;
        }
        .drawer-hint-arrow svg { width: 14px; height: 14px; }
        /* 收起时 drawer-handle 的「收起」按钮提示文字颜色淡化 */
        .drawer-handle-collapse-tip {
            font-size: 0.68rem; color: var(--text-hint); margin-left: 4px; font-weight: 400;
        }

        .drawer-hint.hint-running {
            background: linear-gradient(90deg, rgba(251,146,60,0.12), rgba(251,191,36,0.08));
            border-top-color: rgba(251,146,60,0.4);
            color: #fb923c;
            animation: hintStripBlink 1.2s ease-in-out infinite;
        }
        @keyframes hintStripBlink {
            0%,100% { opacity: 1; }
            50%      { opacity: 0.5; }
        }
        .drawer-hint.hint-done {
            background: linear-gradient(90deg, rgba(52,211,153,0.1), rgba(16,185,129,0.06));
            border-top-color: rgba(52,211,153,0.4);
            color: #34d399;
            animation: none;
        }
        .drawer-hint.hint-generating {
            background: linear-gradient(90deg, rgba(99,102,241,0.08), rgba(129,140,248,0.05));
            border-top-color: var(--border-active);
            color: var(--primary);
            animation: hintStripBlink 1s ease-in-out infinite;
        }
        .plan-generating-wrap {
            display: flex; flex-direction: column; align-items: center;
            justify-content: center; gap: 14px;
            padding: 40px 20px;
            color: var(--text-sub); font-size: 0.84rem;
        }
        .plan-generating-spinner {
            width: 34px; height: 34px;
            border: 3px solid var(--border);
            border-top-color: var(--primary);
            border-radius: 50%;
            animation: spinLoader 0.8s linear infinite;
        }
        .plan-generating-wrap p { line-height: 1.6; text-align: center; }
        .drawer-hint-dot {
            width: 5px; height: 5px; border-radius: 50%;
            background: currentColor;
            animation: hintDotPulse 1.6s ease-in-out infinite;
        }
        .hint-running .drawer-hint-dot, .hint-done .drawer-hint-dot { animation: none; }
        @keyframes hintDotPulse {
            0%,100% { opacity: 1; transform: scale(1); }
            50%      { opacity: 0.25; transform: scale(0.6); }
        }

        .drawer-handle {
            height: var(--drawer-handle-h);
            flex-shrink: 0;
            padding: 0 16px;
            display: flex; align-items: center; justify-content: space-between;
            user-select: none;
            border-bottom: 1px solid var(--border);
        }
        .drawer-handle-left { display: flex; align-items: center; gap: 10px; }
        .drawer-pill {
            width: 36px; height: 4px; border-radius: 2px;
            background: var(--border);
            position: absolute; top: 8px; left: 50%; transform: translateX(-50%);
        }
        .drawer-icon { font-size: 1.05rem; }
        .drawer-title { font-size: 0.88rem; font-weight: 600; color: var(--text); }
        .drawer-progress-wrap { display: flex; align-items: center; gap: 8px; }
        .drawer-progress-bar {
            width: 80px; height: 4px; background: var(--border); border-radius: 2px; overflow: hidden;
        }
        .drawer-progress-fill {
            height: 100%; border-radius: 2px;
            background: linear-gradient(90deg, var(--primary), #818cf8);
            transition: width 0.5s ease;
        }
        .drawer-progress-text { font-size: 0.73rem; color: var(--text-sub); white-space: nowrap; }
        .drawer-close-btn {
            display: flex; align-items: center; gap: 4px;
            padding: 4px 10px;
            border-radius: 20px;
            background: var(--surface2); border: 1px solid var(--border);
            color: var(--text-sub); font-size: 0.72rem; font-weight: 600;
            cursor: pointer; flex-shrink: 0;
            letter-spacing: 0.02em;
            transition: all 0.18s;
            font-family: inherit;
            -webkit-appearance: none;
        }
        .drawer-close-btn svg { width: 13px; height: 13px; flex-shrink: 0; }
        .drawer-close-btn:active { background: var(--primary-light); color: var(--primary); border-color: var(--border-active); }

        .drawer-body {
            flex: 1; overflow-y: auto; -webkit-overflow-scrolling: touch;
            padding: 14px 14px 14px;
            display: flex; flex-direction: column; gap: 0;
        }

        .plan-done-banner {
            display: flex; align-items: center; gap: 8px;
            background: rgba(52,211,153,0.08);
            border: 1px solid rgba(52,211,153,0.2);
            border-radius: var(--radius-md);
            padding: 10px 14px; margin-bottom: 10px;
            font-size: 0.83rem; font-weight: 600; color: #34d399;
        }
        .plan-done-check {
            display: flex; align-items: center; justify-content: center;
            width: 20px; height: 20px; flex-shrink: 0;
            background: #34d399; color: #ffffff;
            border-radius: 50%; font-size: 0.72rem;
        }

        .empty-plan { text-align: center; padding: 36px 20px; color: var(--text-hint); }
        .empty-plan-icon { font-size: 2rem; margin-bottom: 10px; opacity: 0.5; }
        .empty-plan p { font-size: 0.8rem; line-height: 1.7; }

        .plan-card {
            background: var(--surface2);
            border-radius: 10px;
            padding: 12px 14px; margin-bottom: 12px;
            border: 1px solid var(--border);
        }
        .plan-card-title { font-weight: 600; color: var(--text); margin-bottom: 4px; font-size: 0.88rem; }
        .plan-card-desc { font-size: 0.76rem; color: var(--text-sub); margin-bottom: 8px; }
        .plan-badge {
            display: inline-block; padding: 2px 9px;
            border-radius: 10px; font-size: 0.67rem; font-weight: 600;
        }
        .plan-badge.todo { background: rgba(0,0,0,0.04); color: var(--text-sub); }
        .plan-badge.in_progress { background: rgba(99,102,241,0.1); color: var(--primary); }
        .plan-badge.done { background: rgba(52,211,153,0.12); color: #34d399; }
        .plan-badge.abandoned { background: rgba(248,113,113,0.12); color: #f87171; }

        .progress-bar-wrap { background: var(--border); border-radius: 2px; height: 4px; margin: 10px 0 3px; }
        .progress-bar-fill {
            height: 100%; border-radius: 2px;
            background: linear-gradient(90deg, var(--primary), #818cf8);
            transition: width 0.5s ease;
        }
        .progress-text { font-size: 0.7rem; color: var(--text-hint); text-align: right; }

        .subtasks-label {
            font-size: 0.67rem; font-weight: 700; color: var(--text-hint);
            text-transform: uppercase; letter-spacing: 0.08em;
            margin-bottom: 8px;
        }
        .subtask-item {
            background: var(--surface);
            border-radius: 8px; padding: 10px 12px; margin-bottom: 7px;
            border: 1px solid var(--border);
            display: flex; align-items: flex-start; gap: 9px;
        }
        .subtask-num {
            width: 20px; height: 20px; flex-shrink: 0;
            display: flex; align-items: center; justify-content: center;
            font-size: 0.66rem; font-weight: 700;
            background: var(--surface2); color: var(--text-sub); border-radius: 4px;
            border: 1px solid var(--border);
        }
        .subtask-icon {
            width: 20px; height: 20px; flex-shrink: 0;
            display: flex; align-items: center; justify-content: center;
            border-radius: 50%; font-size: 0.76rem;
        }
        .subtask-icon.todo { background: rgba(0,0,0,0.04); color: var(--text-hint); }
        .subtask-icon.in_progress { background: rgba(99,102,241,0.1); position: relative; overflow: visible; }
        .subtask-icon.done { background: rgba(52,211,153,0.12); color: #34d399; }
        .subtask-icon.abandoned { background: rgba(248,113,113,0.1); color: #f87171; }
        .subtask-icon.in_progress::after {
            content: ''; position: absolute; inset: -3px; border-radius: 50%;
            border: 2px solid transparent;
            border-top-color: var(--primary); border-right-color: var(--primary);
            animation: spinLoader 0.8s linear infinite;
        }
        @keyframes spinLoader { to { transform: rotate(360deg); } }
        .subtask-body { flex: 1; min-width: 0; }
        .subtask-name { font-weight: 500; color: var(--text); font-size: 0.83rem; margin-bottom: 2px; }
        .subtask-desc { font-size: 0.72rem; color: var(--text-sub); }
        .subtask-outcome { font-size: 0.72rem; color: #34d399; margin-top: 3px; font-style: italic; }

        /* ══════════ Confirm Plan Actions ══════════ */
        @keyframes confirmFadeIn {
            from { opacity: 0; transform: translateY(8px); }
            to   { opacity: 1; transform: translateY(0); }
        }
        @keyframes confirmShimmer {
            0%   { left: -80%; }
            100% { left: 130%; }
        }
        @keyframes iconPulse {
            0%, 100% { box-shadow: 0 3px 12px rgba(79,110,247,0.38); }
            50%       { box-shadow: 0 4px 20px rgba(79,110,247,0.65); }
        }
        /* 卡片：融入气泡，去掉强烈的阴影层次，改为轻量内嵌感 */
        .confirm-actions-wrap {
            margin-top: 14px;
            position: relative;
            background: linear-gradient(155deg, #f4f6ff 0%, #eef1ff 100%);
            border: 1px solid rgba(79,110,247,0.18);
            border-radius: 16px;
            padding: 16px 16px 14px;
            display: flex; flex-direction: column; gap: 14px;
            box-shadow: 0 2px 12px rgba(79,110,247,0.10), inset 0 1px 0 rgba(255,255,255,0.85);
            overflow: hidden;
            animation: confirmFadeIn 0.3s ease both;
        }
        /* 顶部渐变线（细腻） */
        .confirm-actions-wrap::before {
            content: '';
            position: absolute;
            top: 0; left: 0; right: 0;
            height: 3px;
            background: linear-gradient(90deg, #4f6ef7 0%, #818cf8 60%, #06b6d4 100%);
            border-radius: 16px 16px 0 0;
        }
        .confirm-actions-wrap::after { display: none; }
        /* 标签区：水平居中，图标+文字紧凑排列 */
        .confirm-actions-label {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            text-align: left;
        }
        /* 图标圆形容器：适中大小 */
        .confirm-actions-label-icon-wrap {
            flex-shrink: 0;
            width: 34px; height: 34px;
            border-radius: 50%;
            background: linear-gradient(135deg, #4f6ef7 0%, #6366f1 100%);
            display: flex; align-items: center; justify-content: center;
            animation: iconPulse 2.5s ease-in-out infinite;
        }
        .confirm-actions-label-icon {
            width: 18px; height: 18px; flex-shrink: 0;
            color: #fff;
        }
        /* 标题文字区 */
        .confirm-actions-label-text {
            display: flex; flex-direction: column; gap: 1px;
        }
        .confirm-actions-label-title {
            font-size: 0.88rem; font-weight: 700;
            color: #2a3a9a;
            letter-spacing: 0.015em;
            line-height: 1.3;
        }
        .confirm-actions-label-sub {
            font-size: 0.69rem; color: #7b84c4; font-weight: 400;
        }
        /* 按钮行：两个按钮等宽 */
        .confirm-actions {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
        }
        .confirm-btn {
            min-height: 46px;
            padding: 0 12px;
            border-radius: 12px;
            font-size: 0.88rem; font-weight: 700;
            cursor: pointer; border: none;
            font-family: inherit;
            transition: transform 0.14s ease, box-shadow 0.14s ease;
            -webkit-appearance: none;
            display: flex; align-items: center; justify-content: center; gap: 6px;
            white-space: nowrap;
            -webkit-touch-callout: none;
            user-select: none;
            position: relative; overflow: hidden;
            letter-spacing: 0.02em;
        }
        /* 立即执行：主色按钮 + 光泽流动 */
        .confirm-btn.confirm-yes {
            background: linear-gradient(125deg, #4f6ef7 0%, #3d5be0 100%);
            color: #fff;
            box-shadow: 0 4px 16px rgba(79,110,247,0.40), inset 0 1px 0 rgba(255,255,255,0.18);
        }
        .confirm-btn.confirm-yes::before {
            content: '';
            position: absolute;
            top: 0; left: -80%;
            width: 50%; height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.25), transparent);
            transform: skewX(-20deg);
            animation: confirmShimmer 3s ease-in-out 0.8s infinite;
        }
        .confirm-btn.confirm-yes:active { transform: scale(0.97); box-shadow: 0 2px 8px rgba(79,110,247,0.28); }
        /* 暂不执行：同色系描边，与主按钮协调 */
        .confirm-btn.confirm-no {
            background: rgba(255,255,255,0.6);
            color: #5a67ba;
            border: 1.5px solid rgba(79,110,247,0.25);
            font-weight: 600;
        }
        .confirm-btn.confirm-no:active { transform: scale(0.97); background: rgba(79,110,247,0.06); }
        .confirm-btn:disabled {
            opacity: 0.3; cursor: not-allowed; transform: none !important; box-shadow: none; animation: none;
        }
        .confirm-btn:disabled::before { animation: none; }


        /* ══════════ Chart ══════════ */
        .chart-wrapper {
            margin-top: 10px;
            background: linear-gradient(160deg, #ffffff 0%, #f8faff 100%);
            border: 1px solid rgba(79,110,247,0.14);
            border-radius: var(--radius-md); padding: 16px;
            overflow: hidden;
            box-shadow: 0 4px 20px rgba(79,110,247,0.10), 0 1px 4px rgba(79,110,247,0.06);
            position: relative;
            /* Fade-in so the chart doesn't hard-pop into view */
            animation: chartFadeIn 0.4s ease both;
        }
        /* 顶部装饰彩条 */
        .chart-wrapper::before {
            content: '';
            position: absolute;
            top: 0; left: 0; right: 0;
            height: 3px;
            background: linear-gradient(90deg, #4f6ef7 0%, #818cf8 55%, #06b6d4 100%);
            border-radius: var(--radius-md) var(--radius-md) 0 0;
        }
        @keyframes chartFadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to   { opacity: 1; transform: translateY(0); }
        }
        .chart-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 12px;
            padding-bottom: 10px;
            border-bottom: 1px solid rgba(79,110,247,0.08);
        }
        .chart-title { 
            font-size: 0.85rem; font-weight: 700; color: var(--text);
            letter-spacing: 0.01em;
        }
        .chart-toolbar {
            display: flex;
            gap: 5px;
        }
        .chart-tool-btn {
            width: 32px;
            height: 32px;
            border: 1px solid rgba(79,110,247,0.15);
            background: var(--surface2);
            border-radius: 8px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.18s;
            color: var(--text-sub);
        }
        .chart-tool-btn:hover {
            background: var(--surface3);
            border-color: rgba(79,110,247,0.3);
        }
        .chart-tool-btn.active {
            background: var(--primary-light);
            border-color: var(--primary);
            color: var(--primary);
        }
        .chart-tool-btn svg {
            width: 16px;
            height: 16px;
        }
        .chart-container {
            width: 100%;
            height: 300px;
        }
        .chart-wrapper svg { width: 100%; height: auto; display: block; }
        .chart-legend { display: flex; flex-wrap: wrap; gap: 6px; margin-top: 8px; justify-content: center; }
        .legend-item { display: flex; align-items: center; gap: 4px; font-size: 0.7rem; color: var(--text-sub); }
        .legend-dot { width: 9px; height: 9px; border-radius: 2px; flex-shrink: 0; }
        .message.assistant .message-content.has-chart {
            background: transparent; padding: 0; border-radius: 0;
            border: none; box-shadow: none; width: 100%;
        }
        .message.assistant .message-content.has-chart .text-part {
            background: var(--bubble-ai-bg);
            border: 1px solid var(--border);
            padding: 13px 16px;
            border-radius: var(--radius-lg); border-bottom-left-radius: 5px;
            word-break: break-word;
            font-size: 0.9rem; line-height: 1.75;
            box-shadow: var(--shadow-sm);
        }
        .message.assistant .message-content.has-chart .text-part p { margin: 0 0 8px; }
        .message.assistant .message-content.has-chart .text-part p:last-child { margin-bottom: 0; }
        .message.assistant .message-content.has-chart .text-part strong {
            font-weight: 600;
            background: linear-gradient(180deg, transparent 60%, rgba(79,110,247,0.12) 60%);
            padding: 0 2px;
        }
        /* 表格样式 */
        .data-table-container {
            max-height: 400px;
            overflow: auto;
            border-radius: 6px;
            border: 1px solid var(--border);
        }
        .data-table {
            width: 100%;
            border-collapse: collapse;
            font-size: 0.78rem;
        }
        .data-table th {
            background: var(--surface3);
            padding: 10px 12px;
            text-align: left;
            font-weight: 600;
            color: var(--text);
            border-bottom: 2px solid var(--border);
            position: sticky;
            top: 0;
            z-index: 1;
        }
        .data-table td {
            padding: 8px 12px;
            border-bottom: 1px solid var(--border);
            color: var(--text-sub);
        }
        .data-table tr:hover td {
            background: var(--primary-light);
        }

        /* ══════════ Report block ══════════ */
        /* ══════════ Report Block – GitHub-style Markdown ══════════ */
        .report-block {
            background: linear-gradient(170deg, #ffffff 0%, #f9fbff 100%);
            border: 1px solid rgba(79,110,247,0.13);
            border-radius: var(--radius-md);
            padding: 22px 20px 18px 24px;
            font-size: 0.88rem;
            line-height: 1.75;
            color: #1f2933;
            word-break: break-word;
            box-shadow: 0 4px 24px rgba(79,110,247,0.09), 0 1px 4px rgba(79,110,247,0.05);
            margin-top: 6px;
            position: relative;
            overflow: hidden;
            /* 隔离重绘范围，防止移动端流式输出时整个气泡闪烁 */
            /* layout paint: 隔离重绘(paint)，比 layout style 多一层绘制层隔离，移动端 WebView 效果更好 */
            contain: layout paint;
            will-change: contents;
            -webkit-transform: translateZ(0);
            transform: translateZ(0);
        }
        /* 左侧装饰蓝边 */
        .report-block::before {
            content: '';
            position: absolute;
            left: 0; top: 0; bottom: 0;
            width: 4px;
            background: linear-gradient(180deg, #4f6ef7 0%, #06b6d4 100%);
            border-radius: 4px 0 0 4px;
        }
        
        /* 标题 – 仿 GitHub 风格 */
        .report-block h1 {
            font-size: 1.5em; font-weight: 700; color: #1a2340;
            margin: 0 0 16px; padding-bottom: 0.35em;
            border-bottom: 2px solid rgba(79,110,247,0.18);
            line-height: 1.25;
        }
        .report-block h2 {
            font-size: 1.2em; font-weight: 700; color: #1f2933;
            margin: 22px 0 10px; padding-bottom: 0.28em;
            border-bottom: 1px solid rgba(79,110,247,0.12);
            line-height: 1.25;
            display: flex; align-items: center; gap: 6px;
        }
        .report-block h3 {
            font-size: 1.05em; font-weight: 600; color: #2d3a52;
            margin: 18px 0 8px;
            line-height: 1.25;
        }
        .report-block h4 {
            font-size: 0.95em; font-weight: 600; color: #3b4a66;
            margin: 14px 0 6px;
            line-height: 1.25;
        }
        .report-block h5 {
            font-size: 0.875em; font-weight: 600; color: #4a5568;
            margin: 12px 0 4px;
        }
        .report-block h6 {
            font-size: 0.85em; font-weight: 600; color: #6a737d;
            margin: 10px 0 4px;
        }
        
        /* 段落 */
        .report-block p {
            margin: 0 0 12px; color: #24292e; line-height: 1.7;
        }
        .report-block p:last-child { margin-bottom: 0; }
        
        /* 强调 – 彩色高亮 */
        .report-block strong { 
            color: #1f2933; font-weight: 600; 
            background: linear-gradient(180deg, transparent 60%, rgba(79,110,247,0.15) 60%);
            padding: 0 2px;
        }
        .report-block em { font-style: italic; color: #6a737d; }
        .report-block del { text-decoration: line-through; color: #6a737d; }
        
        /* 列表 – 更紧凑 */
        .report-block ul, .report-block ol {
            margin: 8px 0 12px; padding-left: 1.6em;
        }
        .report-block li {
            margin-bottom: 4px; color: #24292e; line-height: 1.7;
        }
        .report-block li > p { margin-top: 8px; margin-bottom: 8px; }
        .report-block li + li { margin-top: 2px; }
        
        /* 任务列表 */
        .report-block input[type="checkbox"] {
            margin-right: 6px; vertical-align: middle;
        }
        
        /* 表格 – GitHub 风格，用外层容器处理横向滚动，避免 display:block 破坏列宽对齐 */
        .report-block .table-wrapper {
            width: 100%; overflow-x: auto; margin: 12px 0;
            border-radius: 8px;
            box-shadow: 0 1px 6px rgba(79,110,247,0.07);
        }
        .report-block table {
            width: 100%; border-collapse: collapse;
            font-size: 0.82rem;
            table-layout: auto;
        }
        .report-block tr { border-top: 1px solid #dee2ee; }
        .report-block tr:nth-child(2n) { background-color: #f5f7ff; }
        .report-block th, .report-block td {
            padding: 8px 12px; border: 1px solid #dee2ee;
        }
        .report-block th {
            background: linear-gradient(135deg, #eef1ff 0%, #e6eaff 100%);
            font-weight: 700; color: #2d3a8c;
            text-align: left; white-space: nowrap;
        }
        .report-block td { color: #24292e; }
        
        /* 行内代码 – 粉色高亮 */
        .report-block code {
            background: #f6f8fa; color: #e83e8c;
            padding: 2px 6px; border-radius: 3px; font-size: 85%;
            font-family: 'SFMono-Regular', 'Menlo', 'Monaco', 'Consolas', monospace;
            border: 1px solid #e1e4e8;
        }
        
        /* 代码块 – 带标题栏 */
        .report-block pre {
            background: #f6f8fa; color: #24292e;
            padding: 14px 16px; border-radius: 6px;
            overflow-x: auto; margin: 12px 0;
            font-size: 0.8rem; line-height: 1.6;
            border: 1px solid #e1e4e8;
        }
        .report-block pre code {
            background: transparent; color: inherit;
            padding: 0; font-size: inherit; border: none;
        }
        
        /* 引用块 – 灰色边框 */
        .report-block blockquote {
            border-left: 0.25em solid #dfe2e5;
            margin: 12px 0; padding: 0 1em;
            color: #6a737d;
        }
        .report-block blockquote > :first-child { margin-top: 0; }
        .report-block blockquote > :last-child { margin-bottom: 0; }
        
        /* 分隔线 */
        .report-block hr {
            height: 0; margin: 20px 0;
            border: 0; border-top: 1px dashed #e1e4e8;
            background: transparent;
        }
        
        /* 链接 */
        .report-block a {
            color: #0366d6; text-decoration: none;
        }
        .report-block a:hover { text-decoration: underline; }
        
        /* 图片 */
        .report-block img {
            max-width: 100%; height: auto;
            margin: 12px 0; border-style: none;
        }
        /* 报告下载按钮区域 */
        .report-actions {
            display: flex;
            gap: 8px;
            margin-top: 14px;
            padding-top: 12px;
            border-top: 1px solid var(--border);
            justify-content: flex-end;
        }
        .report-download-btn {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            padding: 8px 14px;
            border-radius: 6px;
            font-size: 0.8rem;
            font-weight: 600;
            cursor: pointer;
            border: 1px solid var(--border);
            background: var(--surface);
            color: var(--text-sub);
            transition: all 0.15s;
            font-family: inherit;
        }
        .report-download-btn:hover {
            background: var(--surface3);
        }
        .report-download-btn.primary {
            background: linear-gradient(135deg, var(--primary) 0%, var(--primary-dark) 100%);
            color: #fff;
            border: none;
        }
        .report-download-btn.primary:hover {
            opacity: 0.9;
        }
        .report-download-btn svg {
            width: 14px;
            height: 14px;
        }

        /* ══════════ Message Content Markdown Styles ══════════ */
        .message-content {
            line-height: 1.7;
        }
        .message-content h1 {
            font-size: 1.3em; font-weight: 600;
            margin: 16px 0 10px; padding-bottom: 0.3em;
            border-bottom: 1px solid var(--border);
        }
        .message-content h2 {
            font-size: 1.15em; font-weight: 600;
            margin: 14px 0 8px; padding-bottom: 0.2em;
            border-bottom: 1px solid var(--border);
        }
        .message-content h3 {
            font-size: 1em; font-weight: 600;
            margin: 12px 0 6px;
        }
        .message-content h4 {
            font-size: 0.95em; font-weight: 600;
            margin: 10px 0 4px;
            color: var(--text-sub);
        }
        .message-content p {
            margin: 0 0 10px;
        }
        .message-content strong {
            font-weight: 600;
            background: linear-gradient(180deg, transparent 60%, rgba(79,110,247,0.12) 60%);
            padding: 0 2px;
        }
        /* 单数据展示样式：纯数字粗体单独一行且放大 */
        .message-content p.single-number {
            text-align: center;
            margin: 16px 0;
        }
        .message-content p.single-number > strong:only-child {
            font-size: 2em;
            font-weight: 700;
            color: var(--primary);
            background: none;
            padding: 0;
        }
        .message-content em {
            font-style: italic;
            color: var(--text-sub);
        }
        .message-content code {
            background: var(--surface3);
            color: var(--primary-dark);
            padding: 1px 5px;
            border-radius: 3px;
            font-size: 0.85em;
            font-family: 'Menlo', 'Monaco', monospace;
        }
        .message-content pre {
            background: #1e293b;
            color: #e2e8f0;
            padding: 12px 14px;
            border-radius: 6px;
            overflow-x: auto;
            margin: 10px 0;
            font-size: 0.8rem;
        }
        .message-content pre code {
            background: transparent;
            color: inherit;
            padding: 0;
        }
        .message-content ul, .message-content ol {
            margin: 8px 0 10px;
            padding-left: 1.5em;
        }
        .message-content li {
            margin-bottom: 4px;
        }
        .message-content blockquote {
            border-left: 3px solid var(--primary);
            margin: 8px 0;
            padding: 4px 12px;
            background: var(--primary-light);
            border-radius: 0 4px 4px 0;
        }
        .message-content hr {
            border: none;
            border-top: 1px dashed var(--border);
            margin: 14px 0;
        }
        .message-content a {
            color: var(--primary);
            text-decoration: none;
        }
        .message-content a:hover {
            text-decoration: underline;
        }
        .message-content table {
            width: 100%;
            border-collapse: collapse;
            margin: 10px 0;
            font-size: 0.85rem;
        }
        .message-content th, .message-content td {
            padding: 6px 10px;
            border: 1px solid var(--border);
            text-align: left;
        }
        .message-content th {
            background: var(--surface3);
            font-weight: 600;
        }

        ::-webkit-scrollbar { width: 3px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: rgba(99,102,241,0.2); border-radius: 2px; }

        /* ══════════ History Sidebar – RIGHT side ══════════ */
        .history-overlay {
            position: fixed; inset: 0;
            background: rgba(0,0,0,0.55);
            z-index: 200;
            opacity: 0; pointer-events: none;
            transition: opacity 0.28s ease;
        }
        .history-overlay.active { opacity: 1; pointer-events: auto; }

        .history-sidebar {
            position: fixed;
            top: 0; right: 0; bottom: 0;
            width: min(320px, 88vw);
            background: var(--surface);
            border-left: 1px solid var(--border);
            z-index: 201;
            display: flex; flex-direction: column;
            transform: translateX(100%);
            transition: transform 0.3s cubic-bezier(0.32,0.72,0,1);
            box-shadow: -4px 0 24px rgba(99,102,241,0.12);
        }
        .history-sidebar.open { transform: translateX(0); }

        .history-header {
            padding: 14px 16px;
            padding-top: calc(14px + env(safe-area-inset-top, 0px));
            border-bottom: 1px solid rgba(79,110,247,0.1);
            display: flex; align-items: center; justify-content: space-between;
            flex-shrink: 0;
            background: linear-gradient(135deg, #4f6ef7 0%, #3451d1 100%);
        }
        .history-header-title {
            font-size: 0.88rem; font-weight: 700; color: #ffffff;
            letter-spacing: 0.02em;
        }
        .history-close-btn {
            width: 30px; height: 30px; border-radius: 9px;
            background: rgba(255,255,255,0.15); border: 1px solid rgba(255,255,255,0.25);
            color: rgba(255,255,255,0.9); font-size: 0.9rem;
            display: flex; align-items: center; justify-content: center;
            cursor: pointer; transition: all 0.2s;
        }
        .history-close-btn:active { background: rgba(255,255,255,0.28); }

        /* New session button embedded in sidebar */
        .history-new-btn {
            margin: 12px 14px 8px;
            padding: 11px 16px;
            background: linear-gradient(135deg, var(--primary), var(--primary-dark));
            color: #fff; border: none; border-radius: var(--radius-md);
            font-size: 0.86rem; font-weight: 600; font-family: inherit;
            cursor: pointer; display: flex; align-items: center; gap: 9px;
            box-shadow: 0 4px 16px var(--primary-glow);
            transition: opacity 0.2s, transform 0.15s;
            -webkit-appearance: none;
        }
        .history-new-btn:active { opacity: 0.85; transform: scale(0.97); }

        .history-divider {
            height: 1px; margin: 0 14px 6px;
            background: var(--border);
        }

        .history-list {
            flex: 1; overflow-y: auto; -webkit-overflow-scrolling: touch;
            padding: 0 8px 16px;
        }
        .history-day-label {
            font-size: 0.65rem; font-weight: 700; color: var(--text-hint);
            text-transform: uppercase; letter-spacing: 0.08em;
            padding: 10px 8px 4px;
        }
        .history-item {
            display: flex; align-items: center; gap: 10px;
            padding: 10px 10px;
            border-radius: var(--radius-md);
            cursor: pointer;
            transition: background 0.15s;
            position: relative;
        }
        .history-item:active { background: var(--primary-light); }
        .history-item.active { background: var(--primary-light); border: 1px solid var(--border-active); }
        .history-item-icon { font-size: 0.95rem; flex-shrink: 0; opacity: 0.6; }
        .history-item-body { flex: 1; min-width: 0; }
        .history-item-title {
            font-size: 0.83rem; font-weight: 500; color: var(--text);
            overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
        }
        .history-item.active .history-item-title { color: var(--primary); font-weight: 600; }
        .history-item-meta { font-size: 0.66rem; color: var(--text-hint); margin-top: 2px; }
        .history-item-del {
            opacity: 0; width: 24px; height: 24px; flex-shrink: 0;
            border-radius: 7px; background: transparent; border: none;
            color: var(--text-hint); font-size: 0.8rem;
            display: flex; align-items: center; justify-content: center;
            cursor: pointer; transition: all 0.15s;
        }
        .history-item:hover .history-item-del,
        .history-item:active .history-item-del { opacity: 1; }
        .history-item-del:active { background: rgba(248,113,113,0.15); color: #f87171; }
        .history-empty {
            text-align: center; padding: 40px 20px;
            color: var(--text-hint); font-size: 0.8rem; line-height: 1.7;
        }
    </style>
</head>

<script>
    /* ─── Base path auto-detection (supports local dev and nginx sub-path proxy) ───
     * 本地直接访问时 pathname='/'，BASE_PATH=''，请求路径为 /api/xxx
     * nginx 代理时 pathname='/dify/dataAnalyse/'，BASE_PATH='/dify/dataAnalyse'，请求路径为 /dify/dataAnalyse/api/xxx
     */
    const BASE_PATH = (() => {
        const p = window.location.pathname;
        // 去掉末尾的 index.html 或 /，保留目录前缀
        const dir = p.replace(/\/index\.html$/, '').replace(/\/$/, '');
        return dir || '';
    })();

    /* ═══════════════════════ State ═══════════════════════ */
    let datasets = [];
    let selectedDataset = null;
    let planEventSource = null;
    let isProcessing = false;
    let drawerOpen = false;
    let hasPlan = false;
    let userCollapsed = false;
    let planPending = false;
    let confirmDecided = false;  // true after user clicks 执行/不执行; prevents re-injection
    let confirmExecuted = false; // true only when user clicks 执行（not 不执行）; gates drawer auto-expand
    let streamingUserScrolledUp = false; // true when user scrolls up during streaming, disables auto-scroll

    // ─── Streaming state for visibility handling ───
    // When app goes to background on mobile, SSE connection may be interrupted.
    // We track the current EventSource and streaming state to handle recovery.
    let currentEventSource = null;
    let currentResumeEventSource = null;
    let streamingContext = null;  // { messageDiv, assistantText, finalized, ... }
    let visibilityHiddenTime = null;  // timestamp when page became hidden
    // Resume 流的状态快照，供多次切换时复用（避免每次重连都从空白开始）
    let resumeSnapshot = null;  // { text: string, el: HTMLElement }


    // ─── User identity from URL param ───
    const urlParams = new URLSearchParams(window.location.search);
    const currentUserName = urlParams.get('account') || urlParams.get('userName') || '';

    // ─── Session management with localStorage persistence ───
    // Key format: dataAnalysis_activeSession_<userName>
    // Value: JSON { sessionId, lastActiveAt, lastHiddenAt, hasActiveStream }
    // Recovery logic: only restore if lastHiddenAt is within 10 minutes (user briefly left)
    const SESSION_STORAGE_KEY = 'dataAnalysis_activeSession_' + currentUserName;
    const SESSION_RECOVERY_THRESHOLD_MS = 10 * 60 * 1000; // 10 minutes

    // Check if localStorage is available (handles iOS private mode)
    function isLocalStorageAvailable() {
        try {
            const test = '__storage_test__';
            localStorage.setItem(test, test);
            localStorage.removeItem(test);
            return true;
        } catch (e) {
            return false;
        }
    }

    // Get storage instance (localStorage preferred, sessionStorage fallback)
    function getStorage() {
        if (isLocalStorageAvailable()) {
            return localStorage;
        }
        console.warn('[Session] localStorage not available, using sessionStorage');
        return sessionStorage;
    }

    // Get or create sessionId with localStorage persistence
    // Recovery logic: only restore if user left within threshold time (briefly left)
    function getOrCreateSessionId() {
        const storage = getStorage();
        const stored = storage.getItem(SESSION_STORAGE_KEY);

        if (stored) {
            try {
                const data = JSON.parse(stored);
                // Key: check lastHiddenAt to determine if user briefly left
                // Only restore session if user left within threshold time
                if (data.sessionId && data.lastHiddenAt) {
                    const thresholdAgo = Date.now() - SESSION_RECOVERY_THRESHOLD_MS;
                    if (data.lastHiddenAt > thresholdAgo) {
                        console.log('[Session] Restored sessionId (user briefly left):', data.sessionId);
                        return data.sessionId;
                    } else {
                        console.log('[Session] Previous session expired (left too long ago)');
                    }
                }
            } catch (e) {
                console.warn('[Session] Failed to parse stored session:', e);
            }
        }

        // Create new session
        const newId = generateUUID();
        console.log('[Session] Created new sessionId:', newId);
        persistActiveSession(newId, false);
        return newId;
    }

    // Persist session info to storage
    function persistActiveSession(sessionId, hasActiveStream) {
        const storage = getStorage();
        // Preserve lastHiddenAt if exists
        let lastHiddenAt = null;
        const stored = storage.getItem(SESSION_STORAGE_KEY);
        if (stored) {
            try {
                const data = JSON.parse(stored);
                lastHiddenAt = data.lastHiddenAt;
            } catch (e) {}
        }
        const data = {
            sessionId: sessionId,
            lastActiveAt: Date.now(),
            lastHiddenAt: lastHiddenAt,
            hasActiveStream: hasActiveStream
        };
        storage.setItem(SESSION_STORAGE_KEY, JSON.stringify(data));
    }

    // Clear session from storage (when user explicitly starts new session)
    function clearActiveSession() {
        const storage = getStorage();
        storage.removeItem(SESSION_STORAGE_KEY);
    }

    // Update session activity timestamp
    function touchSessionActivity() {
        const storage = getStorage();
        const stored = storage.getItem(SESSION_STORAGE_KEY);
        if (stored) {
            try {
                const data = JSON.parse(stored);
                data.lastActiveAt = Date.now();
                storage.setItem(SESSION_STORAGE_KEY, JSON.stringify(data));
            } catch (e) {
                // ignore
            }
        }
    }

    // Record when user leaves (goes to background) - used for recovery decision
    function recordUserLeft() {
        const storage = getStorage();
        const stored = storage.getItem(SESSION_STORAGE_KEY);
        if (stored) {
            try {
                const data = JSON.parse(stored);
                data.lastHiddenAt = Date.now();
                storage.setItem(SESSION_STORAGE_KEY, JSON.stringify(data));
                console.log('[Session] Recorded user left at:', data.lastHiddenAt);
            } catch (e) {
                // ignore
            }
        }
    }

    let currentSessionId = getOrCreateSessionId();

    function generateUUID() {
        return 'xxxxxxxx-xxxx-4xxx-yxxx-xxxxxxxxxxxx'.replace(/[xy]/g, c => {
            const r = Math.random() * 16 | 0;
            return (c === 'x' ? r : (r & 0x3 | 0x8)).toString(16);
        });
    }

    /* ═══════════════════════ Init ═══════════════════════ */
    // Cache suggested questions loaded from backend
    let suggestedQuestions = [];

    async function loadSuggestedQuestions() {
        try {
            const res = await fetch(BASE_PATH + '/api/suggested-questions');
            if (res.ok) {
                suggestedQuestions = await res.json();
            }
        } catch (e) {
            console.warn('Failed to load suggested questions', e);
        }
        // Refresh the welcome screen with the loaded questions
        clearChatUI();
    }

    // Check streaming status on page load and resume if needed (critical for mobile WebView recovery)
    async function checkAndResumeOnPageLoad() {
        if (!currentSessionId) return;

        try {
            const res = await fetch(BASE_PATH + '/api/streaming-status/' + encodeURIComponent(currentSessionId));
            if (res.ok) {
                const data = await res.json();
                console.log('[Session] Streaming status:', data.status);

                if (data.status === 'RUNNING') {
                    // Session has active stream, try to resume
                    console.log('[Session] Resuming active stream...');
                    persistActiveSession(currentSessionId, true);
                    tryResumeSessionStream(currentSessionId, true);
                } else if (data.status === 'DONE') {
                    // Session exists but no active stream, load history
                    console.log('[Session] Loading historical messages...');
                    await loadSessionHistoryOnResume(currentSessionId);
                    persistActiveSession(currentSessionId, false);
                } else {
                    // Session not found in backend, will create new on first message
                    console.log('[Session] Session not found, will create new on first message');
                }
            }
        } catch (e) {
            console.warn('[Session] Failed to check streaming status:', e);
        }
    }

    // Load session history when resuming a completed session
    async function loadSessionHistoryOnResume(sessionId) {
        try {
            const messages = await fetch(BASE_PATH + '/api/sessions/' + sessionId + '/messages').then(r => r.json());
            if (Array.isArray(messages) && messages.length > 0) {
                // 找到最后一条 assistant 消息的索引，只有它才注入推荐问题
                let lastAssistantIdx = -1;
                for (let i = messages.length - 1; i >= 0; i--) {
                    if (messages[i].role !== 'user') { lastAssistantIdx = i; break; }
                }
                messages.forEach((msg, idx) => {
                    const msgEl = appendMessage(msg.role === 'user' ? 'user' : 'assistant', '');
                    finalizeMessage(msgEl, msg.content, idx === lastAssistantIdx);
                });
                requestAnimationFrame(() => initAllCharts());
            }
        } catch (e) {
            console.warn('[Session] Failed to load history:', e);
        }
    }

    // ─── Visibility change handler for mobile SSE recovery ───
    // DeepSeek-style: rely solely on localStorage hasActiveStream flag.
    // Memory variables (currentEventSource, streamingContext, etc.) are fragile;
    // localStorage survives background/foreground cycles reliably.
    document.addEventListener('visibilitychange', () => {
        if (document.visibilityState === 'hidden') {
            visibilityHiddenTime = Date.now();
            console.log('[Visibility] Page hidden at', visibilityHiddenTime);
            recordUserLeft();
            // Do NOT close connections here: closing triggers onerror which may fire
            // before visibilityState is fully updated, causing doFinalize() to run
            // and clearing hasActiveStream=false prematurely.
            // Let onerror's own 'hidden' branch handle cleanup, and
            // let the visible branch close connections before resuming.
        } else if (document.visibilityState === 'visible') {
            const hiddenDuration = visibilityHiddenTime ? Date.now() - visibilityHiddenTime : 0;
            console.log('[Visibility] Page visible again, was hidden for', hiddenDuration, 'ms');
            visibilityHiddenTime = null;

            // DeepSeek approach: only check localStorage hasActiveStream.
            // If true, call resume regardless of in-memory state.
            const storage = getStorage();
            const stored = storage.getItem(SESSION_STORAGE_KEY);
            if (!stored) return;
            let data;
            try { data = JSON.parse(stored); } catch (e) { return; }

            if (!data.hasActiveStream) {
                console.log('[Visibility] No active stream in localStorage, nothing to resume');
                return;
            }

            console.log('[Visibility] hasActiveStream=true, triggering resume...');

            // Mark streamingContext finalized FIRST, so that any onerror triggered
            // by closing the EventSource below won't run doFinalize() again and
            // won't clear hasActiveStream.
            if (streamingContext && !streamingContext.finalized) {
                streamingContext.finalized = true;
                if (streamingContext.clearTimers) streamingContext.clearTimers();
            }
            // Close any lingering connections before resuming
            if (currentEventSource) {
                currentEventSource.close();
                currentEventSource = null;
            }

            // Use resumeSnapshot if available (avoids blank flash before SNAPSHOT frame arrives)
            const savedText = resumeSnapshot ? resumeSnapshot.text : '';
            const savedEl   = resumeSnapshot ? resumeSnapshot.el   : null;
            tryResumeSessionStream(currentSessionId, true, savedText, savedEl);
        }
    });

    function renderHistoryList(sessions) {
        const container = document.getElementById('historyList');
        if (!sessions || sessions.length === 0) {
            container.innerHTML = '<div class="history-empty">暂无历史对话<br>开始提问后会自动保存</div>';
            return;
        }
        const today = new Date().toISOString().split('T')[0];
        const yesterday = new Date(Date.now() - 86400000).toISOString().split('T')[0];
        const groups = {};
        sessions.forEach(s => {
            const date = s.updatedAt ? s.updatedAt.split(' ')[0] : '更早';
            if (!groups[date]) groups[date] = [];
            groups[date].push(s);
        });
        let html = '';
        Object.entries(groups).forEach(([date, items]) => {
            let label = date === today ? '今天' : date === yesterday ? '昨天' : date;
            html += `<div class="history-day-label">${label}</div>`;
            items.forEach(s => {
                const isActive = s.id === currentSessionId ? ' active' : '';
                html += `<div class="history-item${isActive}" onclick="switchSession('${s.id}', this)">
                    <span class="history-item-icon">💬</span>

            });
        });
