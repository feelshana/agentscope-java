<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>红海App智能助手</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

        :root {
            /* Brand */
            --primary: #4f6ef7;
            --primary-dark: #3451d1;
            --primary-light: rgba(79,110,247,0.09);
            --primary-glow: rgba(79,110,247,0.22);
            --accent: #06b6d4;
            /* Surfaces */
            --bg: #f0f4ff;
            --surface: #ffffff;
            --surface2: #f5f7ff;
            --surface3: #e8eeff;
            /* Border */
            --border: rgba(79,110,247,0.12);
            --border-active: rgba(79,110,247,0.5);
            /* Text */
            --text: #1b2040;
            --text-sub: #5c6484;
            --text-hint: #9ba3c4;
            /* Bubbles */
            --bubble-user-bg: linear-gradient(135deg, #4f6ef7 0%, #3451d1 100%);
            --bubble-ai-bg: #ffffff;
            /* Sizes */
            --drawer-handle-h: 52px;
            --drawer-hint-h: 40px;
            --safe-bottom: env(safe-area-inset-bottom, 0px);
            --radius-lg: 18px;
            --radius-md: 12px;
            --radius-sm: 8px;
            /* Shadows */
            --shadow-sm: 0 2px 12px rgba(79,110,247,0.10);
            --shadow-md: 0 8px 32px rgba(79,110,247,0.15);
            --shadow-header: 0 2px 16px rgba(79,110,247,0.18);
        }

        html, body {
            height: 100%; overflow: hidden;
            font-family: -apple-system, BlinkMacSystemFont, 'PingFang SC', 'Noto Sans SC', 'Helvetica Neue', sans-serif;
            background: var(--bg);
            color: var(--text);
            -webkit-font-smoothing: antialiased;
        }

        /* ══════════ Layout shell ══════════ */
        /* Use position:fixed inset:0 — the most reliable way to fill the visible viewport
           on all mobile browsers regardless of address bar / DevTools quirks. */
        .app-shell {
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            display: flex; flex-direction: column;
            overflow: hidden;
        }

        /* ══════════ Header ══════════ */
        .header {
            background: linear-gradient(135deg, #4f6ef7 0%, #3d5ce8 50%, #2e4fd4 100%);
            color: #fff;
            padding: 13px 16px;
            padding-top: calc(13px + env(safe-area-inset-top, 0px));
            display: flex; align-items: center; justify-content: space-between;
            flex-shrink: 0;
            z-index: 10;
            position: relative;
            box-shadow: var(--shadow-header);
        }
        .header::before {
            content: '';
            position: absolute; inset: 0;
            background: url("data:image/svg+xml,%3Csvg width='120' height='56' viewBox='0 0 120 56' xmlns='http://www.w3.org/2000/svg'%3E%3Ccircle cx='100' cy='10' r='40' fill='rgba(255,255,255,0.04)'/%3E%3Ccircle cx='10' cy='50' r='30' fill='rgba(255,255,255,0.03)'/%3E%3C/svg%3E") no-repeat right top;
            pointer-events: none;
        }
        .header::after {
            content: '';
            position: absolute; bottom: 0; left: 0; right: 0; height: 1px;
            background: rgba(255,255,255,0.2);
        }
        .header h1 {
            font-size: 0.97rem; font-weight: 700; letter-spacing: 0.02em;
            display: flex; align-items: center; gap: 10px;
            color: #ffffff;
        }
        .header-logo {
            width: 30px; height: 30px; flex-shrink: 0;
            background: rgba(255,255,255,0.2);
            border-radius: 9px;
            display: flex; align-items: center; justify-content: center;
            border: 1px solid rgba(255,255,255,0.3);
            backdrop-filter: blur(4px);
        }
        .header-right { display: flex; align-items: center; gap: 8px; }
        .status-dot {
            width: 7px; height: 7px; border-radius: 50%;
            background: #6ee7b7;
            box-shadow: 0 0 0 2px rgba(110,231,183,0.3);
            transition: all 0.3s; flex-shrink: 0;
        }
        .status-dot.disconnected { background: #fca5a5; box-shadow: 0 0 0 2px rgba(252,165,165,0.3); }
        .header-icon-btn {
            width: 36px; height: 36px;
            background: rgba(255,255,255,0.15);
            border: 1px solid rgba(255,255,255,0.25);
            border-radius: 10px; color: rgba(255,255,255,0.9);
            cursor: pointer; transition: all 0.2s;
            display: flex; align-items: center; justify-content: center;
            -webkit-appearance: none; font-family: inherit;
            backdrop-filter: blur(4px);
        }
        .header-icon-btn:active { background: rgba(255,255,255,0.28); border-color: rgba(255,255,255,0.5); }
        .header-icon-btn svg { width: 18px; height: 18px; }
        /* 历史对话按钮：带文字，更醒目 */
        .header-history-btn {
            height: 36px; padding: 0 12px; gap: 6px;
            background: rgba(255,255,255,0.18);
            border: 1px solid rgba(255,255,255,0.38);
            border-radius: 10px; color: rgba(255,255,255,0.95);
            cursor: pointer; transition: all 0.2s;
            display: flex; align-items: center; justify-content: center;
            -webkit-appearance: none; font-family: inherit;
            backdrop-filter: blur(4px);
            font-size: 0.82rem; font-weight: 600; white-space: nowrap;
        }
        .header-history-btn svg { width: 16px; height: 16px; flex-shrink: 0; }
        .header-history-btn:active { background: rgba(255,255,255,0.32); border-color: rgba(255,255,255,0.6); }
        /* Remove old text-button styles */
        .history-btn, .reset-btn, .status-badge { display: none !important; }

        /* ══════════ Welcome card ══════════ */
        .welcome-card {
            width: 100%;
            background: var(--surface);
            border-radius: var(--radius-lg); border-bottom-left-radius: 5px;
            border: 1px solid rgba(79,110,247,0.12);
            box-shadow: 0 2px 12px rgba(79,110,247,0.08);
            overflow: hidden;
        }
        .welcome-banner {
            background: var(--surface);
            padding: 20px 18px 16px;
            display: flex; align-items: flex-start; gap: 14px;
            border-bottom: 1px solid var(--border);
        }
        .welcome-avatar {
            width: 46px; height: 46px; flex-shrink: 0;
            background: #fff;
            border-radius: 14px;
            display: flex; align-items: center; justify-content: center;
            box-shadow: 0 4px 14px rgba(79,110,247,0.2);
            border: 1px solid rgba(79,110,247,0.12);
        }
        .welcome-banner-text { flex: 1; min-width: 0; padding-top: 2px; }
        .welcome-banner-title {
            font-size: 1rem; font-weight: 700; color: var(--text);
            margin-bottom: 5px; line-height: 1.3;
        }
        .welcome-banner-sub {
            font-size: 0.78rem; color: var(--text-sub);
            line-height: 1.6;
        }
        .welcome-chips {
            display: flex; flex-wrap: wrap; gap: 6px;
            padding: 12px 16px 4px;
        }
        .welcome-chip {
            display: inline-flex; align-items: center; gap: 5px;
            padding: 4px 10px;
            background: var(--primary-light);
            border: 1px solid rgba(79,110,247,0.15);
            border-radius: 20px;
            font-size: 0.72rem; font-weight: 600; color: var(--primary-dark);
        }
        .welcome-divider {
            margin: 10px 16px 0;
            border: none; border-top: 1px solid var(--border);
        }
        .welcome-suggest-label {
            padding: 10px 16px 6px;
            font-size: 0.68rem; font-weight: 700; color: var(--text-hint);
            letter-spacing: 0.08em; text-transform: uppercase;
        }
        .welcome-suggest-list {
            padding: 0 12px 12px;
            display: flex; flex-direction: column; gap: 7px;
        }

        /* ── Compact welcome card on short screens ── */
        @media (max-height: 720px) {
            .welcome-banner { padding: 14px 14px 12px; gap: 10px; }
            .welcome-avatar { width: 38px; height: 38px; border-radius: 11px; }
            .welcome-avatar svg { width: 22px; height: 22px; }
            .welcome-banner-title { font-size: 0.9rem; margin-bottom: 3px; }
            .welcome-banner-sub { font-size: 0.74rem; }
            .welcome-chips { padding: 8px 14px 2px; gap: 5px; }
            .welcome-chip { padding: 3px 8px; font-size: 0.68rem; }
            .welcome-suggest-label { padding: 8px 14px 4px; font-size: 0.65rem; }
            .welcome-suggest-list { padding: 0 10px 10px; gap: 5px; }
            .suggestion-btn { padding: 9px 12px; font-size: 0.8rem; }
        }
        @media (max-height: 620px) {
            .welcome-chips { display: none; }
            .welcome-divider { margin: 6px 14px 0; }
            .welcome-banner { padding: 10px 14px 10px; }
        }

        /* ══════════ Post-report suggestions ══════════ */
        /* 出现在助手消息气泡下方（.message.assistant 内），紧凑横向滚动，不抢占报告视野 */
        .post-report-sugg {
            margin-top: 8px;
            display: flex; flex-direction: column; gap: 5px;
            width: 100%;
        }
        .post-report-sugg-label {
            font-size: 0.62rem; font-weight: 700; color: var(--text-hint);
            letter-spacing: 0.08em; text-transform: uppercase;
            padding: 0 2px;
        }
        .post-report-sugg-scroll {
            display: flex; gap: 7px;
            flex-wrap: wrap;
            padding-bottom: 4px;
        }
        .post-report-sugg-chip {
            display: inline-flex; align-items: center; white-space: normal; word-break: break-all;
            padding: 6px 12px;
            background: var(--surface2);
            border: 1px solid rgba(79,110,247,0.18);
            border-radius: 20px;
            font-size: 0.78rem; font-weight: 500; color: var(--primary-dark);
            cursor: pointer; flex-shrink: 0;
            transition: all 0.16s;
            font-family: inherit;
            -webkit-appearance: none;
            box-shadow: 0 1px 4px rgba(79,110,247,0.07);
        }
        .post-report-sugg-chip:active {
            background: var(--primary-light);
            border-color: var(--border-active);
            transform: scale(0.96);
        }

        /* ══════════ Quick suggestions ══════════ */
        .suggestions-wrap {
            display: flex; flex-direction: column; gap: 8px;
            margin-top: 14px;
        }
        .suggestion-btn {
            display: flex; align-items: center; gap: 10px;
            width: 100%; text-align: left;
            background: linear-gradient(135deg, rgba(79,110,247,0.05) 0%, rgba(79,110,247,0.02) 100%);
            border: 1px solid rgba(79,110,247,0.15);
            border-radius: var(--radius-md);
            padding: 11px 14px;
            font-size: 0.85rem; color: var(--primary-dark);
            font-family: inherit; line-height: 1.4;
            cursor: pointer; font-weight: 500;
            transition: all 0.18s;
            -webkit-appearance: none;
            box-shadow: 0 1px 6px rgba(79,110,247,0.07);
        }
        .suggestion-btn:active {
            background: var(--primary-light);
            border-color: var(--border-active);
            transform: scale(0.98);
        }

        /* ══════════ Chat area ══════════ */
        .chat-area {
            flex: 1; min-height: 0; display: flex; flex-direction: column; overflow: hidden;
            position: relative;
            background: var(--bg);
        }
        .chat-messages {
            flex: 1; min-height: 0; overflow-y: auto; -webkit-overflow-scrolling: touch;
            padding: 16px 14px 14px;
            display: flex; flex-direction: column; gap: 16px;
        }
        .message { display: flex; flex-direction: column; }
        .message.user { align-items: flex-end; }
        .message.assistant { align-items: flex-start; }
        .message-label {
            font-size: 0.62rem; color: var(--text-hint); margin-bottom: 5px;
            font-weight: 700; letter-spacing: 0.08em; text-transform: uppercase;
        }
        .message.user .message-content {
            max-width: 80%;
            padding: 11px 16px;
            border-radius: var(--radius-lg); border-bottom-right-radius: 5px;
            background: var(--bubble-user-bg);
            color: #fff;
            line-height: 1.6; white-space: pre-wrap; word-break: break-word;
            font-size: 0.9rem;
            box-shadow: 0 4px 16px rgba(79,110,247,0.3);
        }
        .message.assistant .message-content {
            width: 100%;
            padding: 13px 16px;
            border-radius: var(--radius-lg); border-bottom-left-radius: 5px;
            background: var(--bubble-ai-bg);
            color: var(--text);
            line-height: 1.75; white-space: pre-wrap; word-break: break-word;
            font-size: 0.9rem;
            border: 1px solid rgba(79,110,247,0.1);
            box-shadow: 0 2px 12px rgba(79,110,247,0.08);
        }

        .loading-indicator {
            display: inline-flex; gap: 8px; align-items: center;
            padding: 10px 16px;
            background: var(--bubble-ai-bg);
            border: 1px solid var(--border);
            border-radius: var(--radius-lg); border-bottom-left-radius: 5px;
            color: var(--text-sub); font-size: 0.82rem;
            box-shadow: var(--shadow-sm);
        }
        .loading-spinner {
            width: 15px; height: 15px; flex-shrink: 0;
            border: 2px solid var(--border);
            border-top-color: var(--primary);
            border-radius: 50%;
            animation: spinLoader 0.7s linear infinite;
        }
        .typing-indicator {
            display: inline-flex; gap: 5px; align-items: center;
            padding: 12px 16px;
            background: var(--bubble-ai-bg);
            border: 1px solid var(--border);
            border-radius: var(--radius-lg); border-bottom-left-radius: 5px;
            box-shadow: var(--shadow-sm);
        }
        .typing-dot {
            width: 6px; height: 6px; border-radius: 50%;
            background: var(--primary);
            animation: typingBounce 1.2s infinite;
        }
        .typing-dot:nth-child(2) { animation-delay: 0.2s; }
        .typing-dot:nth-child(3) { animation-delay: 0.4s; }
        @keyframes typingBounce {
            0%, 60%, 100% { transform: translateY(0); opacity: 0.5; }
            30% { transform: translateY(-6px); opacity: 1; }
        }

        /* chat input */
        .chat-input-container {
            padding: 10px 14px;
            padding-bottom: calc(10px + var(--safe-bottom));
            border-top: 1px solid rgba(79,110,247,0.1);
            background: #ffffff;
            flex-shrink: 0;
            box-shadow: 0 -3px 16px rgba(79,110,247,0.08);
        }
        .chat-input-row { display: flex; gap: 9px; align-items: flex-end; }
        .chat-textarea {
            flex: 1;
            padding: 11px 16px;
            border: 1.5px solid rgba(79,110,247,0.15);
            border-radius: 22px;
            background: var(--surface2);
            font-size: 1rem;
            resize: none; min-height: 44px; max-height: 110px;
            outline: none; line-height: 1.5;
            transition: border-color 0.2s, box-shadow 0.2s;
            font-family: inherit;
            -webkit-appearance: none; color: var(--text);
        }
        .chat-textarea:focus {
            border-color: var(--border-active);
            box-shadow: 0 0 0 3px rgba(79,110,247,0.1);
            background: #fff;
        }
        .chat-textarea::placeholder { color: var(--text-hint); }

        .send-btn {
            width: 44px; height: 44px; flex-shrink: 0;
            background: linear-gradient(135deg, var(--primary) 0%, var(--primary-dark) 100%);
            color: #fff; border: none; border-radius: 14px;
            font-size: 1rem; cursor: pointer;
            display: flex; align-items: center; justify-content: center;
            transition: opacity 0.2s, transform 0.15s, box-shadow 0.2s;
            box-shadow: 0 4px 16px var(--primary-glow);
            -webkit-appearance: none;
        }
        .send-btn:active { opacity: 0.85; transform: scale(0.92); }
        .send-btn:disabled { opacity: 0.3; cursor: not-allowed; box-shadow: none; }
        .hint-text { font-size: 0.68rem; color: var(--text-hint); margin-top: 5px; text-align: center; }

        /* ══════════ Bottom Drawer ══════════ */
        .drawer-overlay {
            position: fixed; inset: 0;
            background: rgba(0,0,0,0.55);
            z-index: 98;
            opacity: 0; pointer-events: none;
            transition: opacity 0.3s ease;
        }
        .drawer-overlay.active { opacity: 1; pointer-events: auto; }

        .plan-drawer {
            position: fixed;
            left: 0; right: 0; bottom: 0;
            z-index: 99;
            background: var(--surface);
            border-radius: 20px 20px 0 0;
            border-top: 1px solid var(--border);
            box-shadow: 0 -4px 24px rgba(99,102,241,0.12);
            display: flex; flex-direction: column;
            transform: translateY(100%);
            transition: transform 0.35s cubic-bezier(0.32, 0.72, 0, 1);
            max-height: 80vh;
            padding-bottom: var(--safe-bottom);
        }
        .plan-drawer.has-plan {
            transform: translateY(calc(100% - var(--drawer-hint-h)));
        }
        .plan-drawer.expanded { transform: translateY(0); }

        .drawer-hint {
            height: var(--drawer-hint-h);
            flex-shrink: 0;
            display: flex; align-items: center; justify-content: center;
            gap: 7px;
            cursor: pointer; user-select: none;
            font-size: 0.78rem; font-weight: 600;
            border-radius: 20px 20px 0 0;
            transition: all 0.4s ease;
            background: linear-gradient(90deg, rgba(99,102,241,0.07), rgba(129,140,248,0.04));
            border-top: 1px solid rgba(99,102,241,0.2);
            color: var(--primary);
            letter-spacing: 0.02em;
            position: relative;
        }
        .drawer-hint:active { filter: brightness(1.2); }
        /* 向上箭头：展开提示 */
        .drawer-hint-arrow {
            display: flex; align-items: center; justify-content: center;
            width: 18px; height: 18px; flex-shrink: 0;
            opacity: 0.7;
            transition: transform 0.25s ease;
        }
        .drawer-hint-arrow svg { width: 14px; height: 14px; }
        /* 收起时 drawer-handle 的「收起」按钮提示文字颜色淡化 */
        .drawer-handle-collapse-tip {
            font-size: 0.68rem; color: var(--text-hint); margin-left: 4px; font-weight: 400;
        }

        .drawer-hint.hint-running {
            background: linear-gradient(90deg, rgba(251,146,60,0.12), rgba(251,191,36,0.08));
            border-top-color: rgba(251,146,60,0.4);
            color: #fb923c;
            animation: hintStripBlink 1.2s ease-in-out infinite;
        }
        @keyframes hintStripBlink {
            0%,100% { opacity: 1; }
            50%      { opacity: 0.5; }
        }
        .drawer-hint.hint-done {
            background: linear-gradient(90deg, rgba(52,211,153,0.1), rgba(16,185,129,0.06));
            border-top-color: rgba(52,211,153,0.4);
            color: #34d399;
            animation: none;
        }
        .drawer-hint.hint-generating {
            background: linear-gradient(90deg, rgba(99,102,241,0.08), rgba(129,140,248,0.05));
            border-top-color: var(--border-active);
            color: var(--primary);
            animation: hintStripBlink 1s ease-in-out infinite;
        }
        .plan-generating-wrap {
            display: flex; flex-direction: column; align-items: center;
            justify-content: center; gap: 14px;
            padding: 40px 20px;
            color: var(--text-sub); font-size: 0.84rem;
        }
        .plan-generating-spinner {
            width: 34px; height: 34px;
            border: 3px solid var(--border);
            border-top-color: var(--primary);
            border-radius: 50%;
            animation: spinLoader 0.8s linear infinite;
        }
        .plan-generating-wrap p { line-height: 1.6; text-align: center; }
        .drawer-hint-dot {
            width: 5px; height: 5px; border-radius: 50%;
            background: currentColor;
            animation: hintDotPulse 1.6s ease-in-out infinite;
        }
        .hint-running .drawer-hint-dot, .hint-done .drawer-hint-dot { animation: none; }
        @keyframes hintDotPulse {
            0%,100% { opacity: 1; transform: scale(1); }
            50%      { opacity: 0.25; transform: scale(0.6); }
        }

        .drawer-handle {
            height: var(--drawer-handle-h);
            flex-shrink: 0;
            padding: 0 16px;
            display: flex; align-items: center; justify-content: space-between;
            user-select: none;
            border-bottom: 1px solid var(--border);
        }
        .drawer-handle-left { display: flex; align-items: center; gap: 10px; }
        .drawer-pill {
            width: 36px; height: 4px; border-radius: 2px;
            background: var(--border);
            position: absolute; top: 8px; left: 50%; transform: translateX(-50%);
        }
        .drawer-icon { font-size: 1.05rem; }
        .drawer-title { font-size: 0.88rem; font-weight: 600; color: var(--text); }
        .drawer-progress-wrap { display: flex; align-items: center; gap: 8px; }
        .drawer-progress-bar {
            width: 80px; height: 4px; background: var(--border); border-radius: 2px; overflow: hidden;
        }
        .drawer-progress-fill {
            height: 100%; border-radius: 2px;
            background: linear-gradient(90deg, var(--primary), #818cf8);
            transition: width 0.5s ease;
        }
        .drawer-progress-text { font-size: 0.73rem; color: var(--text-sub); white-space: nowrap; }
        .drawer-close-btn {
            display: flex; align-items: center; gap: 4px;
            padding: 4px 10px;
            border-radius: 20px;
            background: var(--surface2); border: 1px solid var(--border);
            color: var(--text-sub); font-size: 0.72rem; font-weight: 600;
            cursor: pointer; flex-shrink: 0;
            letter-spacing: 0.02em;
            transition: all 0.18s;
            font-family: inherit;
            -webkit-appearance: none;
        }
        .drawer-close-btn svg { width: 13px; height: 13px; flex-shrink: 0; }
        .drawer-close-btn:active { background: var(--primary-light); color: var(--primary); border-color: var(--border-active); }

        .drawer-body {
            flex: 1; overflow-y: auto; -webkit-overflow-scrolling: touch;
            padding: 14px 14px 14px;
            display: flex; flex-direction: column; gap: 0;
        }

        .plan-done-banner {
            display: flex; align-items: center; gap: 8px;
            background: rgba(52,211,153,0.08);
            border: 1px solid rgba(52,211,153,0.2);
            border-radius: var(--radius-md);
            padding: 10px 14px; margin-bottom: 10px;
            font-size: 0.83rem; font-weight: 600; color: #34d399;
        }
        .plan-done-check {
            display: flex; align-items: center; justify-content: center;
            width: 20px; height: 20px; flex-shrink: 0;
            background: #34d399; color: #ffffff;
            border-radius: 50%; font-size: 0.72rem;
        }

        .empty-plan { text-align: center; padding: 36px 20px; color: var(--text-hint); }
        .empty-plan-icon { font-size: 2rem; margin-bottom: 10px; opacity: 0.5; }
        .empty-plan p { font-size: 0.8rem; line-height: 1.7; }

        .plan-card {
            background: var(--surface2);
            border-radius: 10px;
            padding: 12px 14px; margin-bottom: 12px;
            border: 1px solid var(--border);
        }
        .plan-card-title { font-weight: 600; color: var(--text); margin-bottom: 4px; font-size: 0.88rem; }
        .plan-card-desc { font-size: 0.76rem; color: var(--text-sub); margin-bottom: 8px; }
        .plan-badge {
            display: inline-block; padding: 2px 9px;
            border-radius: 10px; font-size: 0.67rem; font-weight: 600;
        }
        .plan-badge.todo { background: rgba(0,0,0,0.04); color: var(--text-sub); }
        .plan-badge.in_progress { background: rgba(99,102,241,0.1); color: var(--primary); }
        .plan-badge.done { background: rgba(52,211,153,0.12); color: #34d399; }
        .plan-badge.abandoned { background: rgba(248,113,113,0.12); color: #f87171; }

        .progress-bar-wrap { background: var(--border); border-radius: 2px; height: 4px; margin: 10px 0 3px; }
        .progress-bar-fill {
            height: 100%; border-radius: 2px;
            background: linear-gradient(90deg, var(--primary), #818cf8);
            transition: width 0.5s ease;
        }
        .progress-text { font-size: 0.7rem; color: var(--text-hint); text-align: right; }

        .subtasks-label {
            font-size: 0.67rem; font-weight: 700; color: var(--text-hint);
            text-transform: uppercase; letter-spacing: 0.08em;
            margin-bottom: 8px;
        }
        .subtask-item {
            background: var(--surface);
            border-radius: 8px; padding: 10px 12px; margin-bottom: 7px;
            border: 1px solid var(--border);
            display: flex; align-items: flex-start; gap: 9px;
        }
        .subtask-num {
            width: 20px; height: 20px; flex-shrink: 0;
            display: flex; align-items: center; justify-content: center;
            font-size: 0.66rem; font-weight: 700;
            background: var(--surface2); color: var(--text-sub); border-radius: 4px;
            border: 1px solid var(--border);
        }
        .subtask-icon {
            width: 20px; height: 20px; flex-shrink: 0;
            display: flex; align-items: center; justify-content: center;
            border-radius: 50%; font-size: 0.76rem;
        }
        .subtask-icon.todo { background: rgba(0,0,0,0.04); color: var(--text-hint); }
        .subtask-icon.in_progress { background: rgba(99,102,241,0.1); position: relative; overflow: visible; }
        .subtask-icon.done { background: rgba(52,211,153,0.12); color: #34d399; }
        .subtask-icon.abandoned { background: rgba(248,113,113,0.1); color: #f87171; }
        .subtask-icon.in_progress::after {
            content: ''; position: absolute; inset: -3px; border-radius: 50%;
            border: 2px solid transparent;
            border-top-color: var(--primary); border-right-color: var(--primary);
            animation: spinLoader 0.8s linear infinite;
        }
        @keyframes spinLoader { to { transform: rotate(360deg); } }
        .subtask-body { flex: 1; min-width: 0; }
        .subtask-name { font-weight: 500; color: var(--text); font-size: 0.83rem; margin-bottom: 2px; }
        .subtask-desc { font-size: 0.72rem; color: var(--text-sub); }
        .subtask-outcome { font-size: 0.72rem; color: #34d399; margin-top: 3px; font-style: italic; }

        /* ══════════ Confirm Plan Actions ══════════ */
        .confirm-actions {
            display: flex; flex-direction: column; gap: 8px; margin-top: 14px;
        }
        .confirm-btn {
            width: 100%; padding: 13px 0;
            border-radius: var(--radius-md);
            font-size: 1rem; font-weight: 600;
            cursor: pointer; border: none;
            font-family: inherit; transition: all 0.18s;
            -webkit-appearance: none;
            display: flex; align-items: center; justify-content: center; gap: 7px;
        }
        .confirm-btn.confirm-yes {
            background: linear-gradient(135deg, var(--primary) 0%, var(--primary-dark) 100%);
            color: #fff;
            box-shadow: 0 4px 14px var(--primary-glow);
        }
        .confirm-btn.confirm-yes:active { opacity: 0.85; transform: scale(0.98); }
        .confirm-btn.confirm-no {
            background: var(--surface2);
            color: var(--text-sub);
            border: 1px solid var(--border);
        }
        .confirm-btn.confirm-no:active { background: var(--surface3); }
        .confirm-btn:disabled { opacity: 0.4; cursor: not-allowed; transform: none; }


        /* ══════════ Chart ══════════ */
        .chart-wrapper {
            margin-top: 8px;
            background: var(--surface2);
            border: 1px solid var(--border);
            border-radius: var(--radius-md); padding: 14px;
            overflow: hidden; box-shadow: var(--shadow-sm);
        }
        .chart-title { font-size: 0.82rem; font-weight: 600; color: var(--text); margin-bottom: 10px; text-align: center; }
        .chart-wrapper svg { width: 100%; height: auto; display: block; }
        .chart-legend { display: flex; flex-wrap: wrap; gap: 6px; margin-top: 8px; justify-content: center; }
        .legend-item { display: flex; align-items: center; gap: 4px; font-size: 0.7rem; color: var(--text-sub); }
        .legend-dot { width: 9px; height: 9px; border-radius: 2px; flex-shrink: 0; }
        .message.assistant .message-content.has-chart {
            background: transparent; padding: 0; border-radius: 0;
            border: none; box-shadow: none; width: 100%;
        }
        .message.assistant .message-content.has-chart .text-part {
            background: var(--bubble-ai-bg);
            border: 1px solid var(--border);
            padding: 13px 16px;
            border-radius: var(--radius-lg); border-bottom-left-radius: 5px;
            white-space: pre-wrap; word-break: break-word;
            font-size: 0.9rem; line-height: 1.75;
            box-shadow: var(--shadow-sm);
        }

        /* ══════════ Report block ══════════ */
        .report-block {
            background: var(--surface2);
            border: 1px solid var(--border);
            border-top: 2px solid var(--primary);
            border-radius: var(--radius-md);
            padding: 16px;
            font-size: 0.88rem;
            line-height: 1.78;
            color: var(--text);
            word-break: break-word;
            box-shadow: var(--shadow-sm);
            margin-top: 4px;
        }
        .report-block h3 {
            text-align: center; font-weight: 700; font-size: 0.96rem;
            margin: 0 0 14px; color: var(--text);
            padding-bottom: 10px; border-bottom: 1px solid var(--border);
        }
        .report-block h4 {
            font-weight: 600; font-size: 0.86rem;
            margin: 12px 0 5px; color: var(--primary-dark);
            display: flex; align-items: center; gap: 6px;
        }
        .report-block h4::before {
            content: ''; display: inline-block; width: 3px; height: 12px;
            background: var(--primary); border-radius: 2px; flex-shrink: 0;
        }
        .report-block p { margin: 0 0 8px; color: var(--text-sub); }
        .report-block strong { color: var(--text); font-weight: 600; }

        ::-webkit-scrollbar { width: 3px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: rgba(99,102,241,0.2); border-radius: 2px; }

        /* ══════════ History Sidebar – RIGHT side ══════════ */
        .history-overlay {
            position: fixed; inset: 0;
            background: rgba(0,0,0,0.55);
            z-index: 200;
            opacity: 0; pointer-events: none;
            transition: opacity 0.28s ease;
        }
        .history-overlay.active { opacity: 1; pointer-events: auto; }

        .history-sidebar {
            position: fixed;
            top: 0; right: 0; bottom: 0;
            width: min(320px, 88vw);
            background: var(--surface);
            border-left: 1px solid var(--border);
            z-index: 201;
            display: flex; flex-direction: column;
            transform: translateX(100%);
            transition: transform 0.3s cubic-bezier(0.32,0.72,0,1);
            box-shadow: -4px 0 24px rgba(99,102,241,0.12);
        }
        .history-sidebar.open { transform: translateX(0); }

        .history-header {
            padding: 14px 16px;
            padding-top: calc(14px + env(safe-area-inset-top, 0px));
            border-bottom: 1px solid rgba(79,110,247,0.1);
            display: flex; align-items: center; justify-content: space-between;
            flex-shrink: 0;
            background: linear-gradient(135deg, #4f6ef7 0%, #3451d1 100%);
        }
        .history-header-title {
            font-size: 0.88rem; font-weight: 700; color: #ffffff;
            letter-spacing: 0.02em;
        }
        .history-close-btn {
            width: 30px; height: 30px; border-radius: 9px;
            background: rgba(255,255,255,0.15); border: 1px solid rgba(255,255,255,0.25);
            color: rgba(255,255,255,0.9); font-size: 0.9rem;
            display: flex; align-items: center; justify-content: center;
            cursor: pointer; transition: all 0.2s;
        }
        .history-close-btn:active { background: rgba(255,255,255,0.28); }

        /* New session button embedded in sidebar */
        .history-new-btn {
            margin: 12px 14px 8px;
            padding: 11px 16px;
            background: linear-gradient(135deg, var(--primary), var(--primary-dark));
            color: #fff; border: none; border-radius: var(--radius-md);
            font-size: 0.86rem; font-weight: 600; font-family: inherit;
            cursor: pointer; display: flex; align-items: center; gap: 9px;
            box-shadow: 0 4px 16px var(--primary-glow);
            transition: opacity 0.2s, transform 0.15s;
            -webkit-appearance: none;
        }
        .history-new-btn:active { opacity: 0.85; transform: scale(0.97); }

        .history-divider {
            height: 1px; margin: 0 14px 6px;
            background: var(--border);
        }

        .history-list {
            flex: 1; overflow-y: auto; -webkit-overflow-scrolling: touch;
            padding: 0 8px 16px;
        }
        .history-day-label {
            font-size: 0.65rem; font-weight: 700; color: var(--text-hint);
            text-transform: uppercase; letter-spacing: 0.08em;
            padding: 10px 8px 4px;
        }
        .history-item {
            display: flex; align-items: center; gap: 10px;
            padding: 10px 10px;
            border-radius: var(--radius-md);
            cursor: pointer;
            transition: background 0.15s;
            position: relative;
        }
        .history-item:active { background: var(--primary-light); }
        .history-item.active { background: var(--primary-light); border: 1px solid var(--border-active); }
        .history-item-icon { font-size: 0.95rem; flex-shrink: 0; opacity: 0.6; }
        .history-item-body { flex: 1; min-width: 0; }
        .history-item-title {
            font-size: 0.83rem; font-weight: 500; color: var(--text);
            overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
        }
        .history-item.active .history-item-title { color: var(--primary); font-weight: 600; }
        .history-item-meta { font-size: 0.66rem; color: var(--text-hint); margin-top: 2px; }
        .history-item-del {
            opacity: 0; width: 24px; height: 24px; flex-shrink: 0;
            border-radius: 7px; background: transparent; border: none;
            color: var(--text-hint); font-size: 0.8rem;
            display: flex; align-items: center; justify-content: center;
            cursor: pointer; transition: all 0.15s;
        }
        .history-item:hover .history-item-del,
        .history-item:active .history-item-del { opacity: 1; }
        .history-item-del:active { background: rgba(248,113,113,0.15); color: #f87171; }
        .history-empty {
            text-align: center; padding: 40px 20px;
            color: var(--text-hint); font-size: 0.8rem; line-height: 1.7;
        }
    </style>
</head>
<body>

<div class="app-shell">

    <!-- Header -->
    <div class="header">
        <h1>
            <div class="header-logo">
                <svg width="18" height="18" viewBox="0 0 22 22" xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink"><defs><linearGradient x1="50%" y1="76.9577359%" x2="31.5960253%" y2="0%" id="lg1"><stop stop-color="#2E58F7" offset="0%"></stop><stop stop-color="#00CBFC" offset="100%"></stop></linearGradient></defs><g stroke="none" stroke-width="1" fill="none" fill-rule="evenodd"><rect stroke="#FFFFFF" fill="#FFFFFF" x="0.5" y="0.5" width="21" height="21" rx="4"></rect><g transform="translate(5, 3)" fill="url(#lg1)"><path d="M1,5.96733911 L4.99803067,9.49317142 L4.7053422,13.8950576 L3.21049157,14.7972052 C2.98746288,14.9255039 2.73408116,15 2.48069944,15 C2.22731772,15 1.97261632,14.9351608 1.74034972,14.7972052 C1.28332302,14.5220301 1.00118988,14.0131305 1,13.4617944 L1,5.96733911 Z M9.06715829,4.73782976 L12.2596503,6.6647187 C12.7162652,6.94063005 13,7.44830686 13,8.00012956 C13,8.55195227 12.7162652,9.06100861 12.26097,9.33691996 L6.34815097,12.9037135 L6.59139638,9.24400805 L9.06715829,4.73782976 Z M3.21049157,1.20305396 L7.70296295,3.91449084 L5.62743719,7.69252048 L1.0252031,3.6343975 L1,3.66532747 L1,2.53846475 C1.00225816,1.98906035 1.28343214,1.48223378 1.73847879,1.20732922 C2.19352544,0.932424663 2.75399068,0.930796866 3.21049157,1.20305396 Z"></path></g></g></svg>
            </div>
            <span>红海App智能助手</span>
        </h1>
        <div class="header-right">
            <div class="status-dot" id="statusDot"></div>
            <button class="header-icon-btn" onclick="resetAll()" title="新建对话">
                <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg"><path d="M12 5v14M5 12h14" stroke="currentColor" stroke-width="2.2" stroke-linecap="round"/></svg>
            </button>
            <button class="header-history-btn" onclick="openHistorySidebar()" title="历史对话">
                <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg"><circle cx="12" cy="12" r="9" stroke="currentColor" stroke-width="1.8"/><path d="M12 7v5l3 3" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/></svg>
                历史对话
            </button>
        </div>
    </div>

    <!-- Chat area -->
    <div class="chat-area">
        <div class="chat-messages" id="chatMessages">
            <div class="message assistant">
                <div class="welcome-card">
                    <div class="welcome-banner">
                        <div class="welcome-avatar">
                            <svg width="26" height="26" viewBox="0 0 22 22" xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink"><defs><linearGradient x1="50%" y1="76.9577359%" x2="31.5960253%" y2="0%" id="lg2"><stop stop-color="#2E58F7" offset="0%"></stop><stop stop-color="#00CBFC" offset="100%"></stop></linearGradient></defs><g stroke="none" stroke-width="1" fill="none" fill-rule="evenodd"><rect stroke="#FFFFFF" fill="#FFFFFF" x="0.5" y="0.5" width="21" height="21" rx="4"></rect><g transform="translate(5, 3)" fill="url(#lg2)"><path d="M1,5.96733911 L4.99803067,9.49317142 L4.7053422,13.8950576 L3.21049157,14.7972052 C2.98746288,14.9255039 2.73408116,15 2.48069944,15 C2.22731772,15 1.97261632,14.9351608 1.74034972,14.7972052 C1.28332302,14.5220301 1.00118988,14.0131305 1,13.4617944 L1,5.96733911 Z M9.06715829,4.73782976 L12.2596503,6.6647187 C12.7162652,6.94063005 13,7.44830686 13,8.00012956 C13,8.55195227 12.7162652,9.06100861 12.26097,9.33691996 L6.34815097,12.9037135 L6.59139638,9.24400805 L9.06715829,4.73782976 Z M3.21049157,1.20305396 L7.70296295,3.91449084 L5.62743719,7.69252048 L1.0252031,3.6343975 L1,3.66532747 L1,2.53846475 C1.00225816,1.98906035 1.28343214,1.48223378 1.73847879,1.20732922 C2.19352544,0.932424663 2.75399068,0.930796866 3.21049157,1.20305396 Z"></path></g></g></svg>
                        </div>
                        <div class="welcome-banner-text">
                            <div class="welcome-banner-title">你好！有什么可以帮你？</div>
                            <div class="welcome-banner-sub">专注业务数据分析，快速洞察关键指标与趋势</div>
                        </div>
                    </div>
                    <div class="welcome-chips">
                        <span class="welcome-chip">📊 数据分析</span>
                        <span class="welcome-chip">🎯 指标追踪</span>
                        <span class="welcome-chip">💡 智能洞察</span>
                    </div>
                    <hr class="welcome-divider">
                    <div class="welcome-suggest-label">快速开始 · 点击直接提问</div>
                    <div class="welcome-suggest-list" id="staticSuggestList">
                        <!-- 推荐问题由 loadSuggestedQuestions() 动态渲染 -->
                    </div>
                </div>
            </div>
        </div>

        <div class="chat-input-container" id="chatInputContainer">
            <div class="chat-input-row">
                <textarea
                    class="chat-textarea"
                    id="chatInput"
                    placeholder="输入分析问题…"
                    rows="1"
                    onkeydown="handleInputKey(event)"
                    oninput="autoResize(this)"
                ></textarea>
                <button class="send-btn" id="sendBtn" onclick="sendMessage()" title="发送">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none"><path d="M22 2L11 13" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/><path d="M22 2L15 22l-4-9-9-4 20-7z" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>
                </button>
            </div>
            <p class="hint-text" id="hintText">输入问题或点击上方推荐</p>
        </div>
    </div>

</div><!-- /app-shell -->

<!-- History Sidebar Overlay -->
<div class="history-overlay" id="historyOverlay" onclick="closeHistorySidebar()"></div>

<!-- History Sidebar -->
<div class="history-sidebar" id="historySidebar">
    <div class="history-header">
        <span class="history-header-title">💬 历史对话</span>
        <button class="history-close-btn" onclick="closeHistorySidebar()">✕</button>
    </div>
    <button class="history-new-btn" onclick="startNewSession(); closeHistorySidebar();">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none"><path d="M12 5v14M5 12h14" stroke="currentColor" stroke-width="2.2" stroke-linecap="round"/></svg>
        新建对话
    </button>
    <div class="history-list" id="historyList">
        <div class="history-empty">暂无历史对话<br>开始提问后会自动保存</div>
    </div>
</div>

<!-- Drawer overlay -->
<div class="drawer-overlay" id="drawerOverlay" onclick="collapseDrawer()"></div>

<!-- Bottom drawer: task plan -->
<div class="plan-drawer" id="planDrawer">

    <!-- Hint strip (visible when has-plan & not expanded) -->
    <div class="drawer-hint" id="drawerHint" onclick="expandDrawer()">
        <span class="drawer-hint-arrow" id="drawerHintArrow">
            <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg"><path d="M6 15l6-6 6 6" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"/></svg>
        </span>
        <span class="drawer-hint-dot"></span>
        <span id="drawerHintText">📋 任务计划已生成，点击查看</span>
        <span class="drawer-hint-dot"></span>
    </div>

    <!-- Full handle (visible when expanded) -->
    <div class="drawer-handle" id="drawerHandle" onclick="collapseDrawer()" style="cursor:pointer" title="点击收起面板">
        <div class="drawer-handle-left">
            <span class="drawer-icon">📋</span>
            <span class="drawer-title">任务计划面板</span>
            <span class="drawer-handle-collapse-tip">（点击收起）</span>
        </div>
        <div class="drawer-progress-wrap" id="drawerProgressWrap" style="display:none">
            <div class="drawer-progress-bar">
                <div class="drawer-progress-fill" id="drawerProgressFill" style="width:0%"></div>
            </div>
            <span class="drawer-progress-text" id="drawerProgressText">0/0</span>
        </div>
        <button class="drawer-close-btn" onclick="event.stopPropagation();collapseDrawer()" title="收起面板">
            <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg"><path d="M18 9l-6 6-6-6" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>
            收起
        </button>
    </div>

    <!-- Scrollable body -->
    <div class="drawer-body" id="drawerBody">
        <div class="empty-plan" id="emptyPlan">
            <div class="empty-plan-icon">📋</div>
            <p>提交问题后，智能体将自动创建分析计划<br>并在此实时展示任务进度</p>
        </div>
        <div id="planContent" style="display:none"></div>
    </div>
</div>

<script>
    /* ─── Base path auto-detection (supports local dev and nginx sub-path proxy) ───
     * 本地直接访问时 pathname='/'，BASE_PATH=''，请求路径为 /api/xxx
     * nginx 代理时 pathname='/dify/dataAnalyse/'，BASE_PATH='/dify/dataAnalyse'，请求路径为 /dify/dataAnalyse/api/xxx
     */
    const BASE_PATH = (() => {
        const p = window.location.pathname;
        // 去掉末尾的 index.html 或 /，保留目录前缀
        const dir = p.replace(/\/index\.html$/, '').replace(/\/$/, '');
        return dir || '';
    })();

    /* ═══════════════════════ State ═══════════════════════ */
    let datasets = [];
    let selectedDataset = null;
    let planEventSource = null;
    let isProcessing = false;
    let drawerOpen = false;
    let hasPlan = false;
    let userCollapsed = false;
    let planPending = false;
    let confirmDecided = false;  // true after user clicks 执行/不执行; prevents re-injection
    let confirmExecuted = false; // true only when user clicks 执行（not 不执行）; gates drawer auto-expand
    let streamingUserScrolledUp = false; // true when user scrolls up during streaming, disables auto-scroll

    // ─── User identity from URL param ───
    const urlParams = new URLSearchParams(window.location.search);
    const currentUserName = urlParams.get('account') || urlParams.get('userName') || '';

    // ─── Session management ───
    let currentSessionId = generateUUID();

    function generateUUID() {
        return 'xxxxxxxx-xxxx-4xxx-yxxx-xxxxxxxxxxxx'.replace(/[xy]/g, c => {
            const r = Math.random() * 16 | 0;
            return (c === 'x' ? r : (r & 0x3 | 0x8)).toString(16);
        });
    }

    /* ═══════════════════════ Init ═══════════════════════ */
    // Cache suggested questions loaded from backend
    let suggestedQuestions = [];

    async function loadSuggestedQuestions() {
        try {
            const res = await fetch(BASE_PATH + '/api/suggested-questions');
            if (res.ok) {
                suggestedQuestions = await res.json();
            }
        } catch (e) {
            console.warn('Failed to load suggested questions', e);
        }
        // Refresh the welcome screen with the loaded questions
        clearChatUI();
    }

        connectPlanStream();

    function openHistorySidebar() {

        document.getElementById('historySidebar').classList.add('open');
        document.getElementById('historyOverlay').classList.add('active');
    }

    function closeHistorySidebar() {
        document.getElementById('historySidebar').classList.remove('open');
        document.getElementById('historyOverlay').classList.remove('active');
    }

    async function loadSessionHistory() {
        try {
            const sessions = await fetch(BASE_PATH + '/api/sessions?userName=' + encodeURIComponent(currentUserName)).then(r => r.json());
            renderHistoryList(sessions);
        } catch(e) {
            document.getElementById('historyList').innerHTML =
                '<div class="history-empty">加载失败，请重试</div>';
        }
    }

    function renderHistoryList(sessions) {
        const container = document.getElementById('historyList');
        if (!sessions || sessions.length === 0) {
            container.innerHTML = '<div class="history-empty">暂无历史对话<br>开始提问后会自动保存</div>';
            return;
        }
        const today = new Date().toISOString().split('T')[0];
        const yesterday = new Date(Date.now() - 86400000).toISOString().split('T')[0];
        const groups = {};
        sessions.forEach(s => {
            const date = s.updatedAt ? s.updatedAt.split(' ')[0] : '更早';
            if (!groups[date]) groups[date] = [];
            groups[date].push(s);
        });
        let html = '';
        Object.entries(groups).forEach(([date, items]) => {
            let label = date === today ? '今天' : date === yesterday ? '昨天' : date;
            html += `<div class="history-day-label">${label}</div>`;
            items.forEach(s => {
                const isActive = s.id === currentSessionId ? ' active' : '';
                html += `<div class="history-item${isActive}" onclick="switchSession('${s.id}', this)">
                    <span class="history-item-icon">💬</span>
                    <div class="history-item-body">
                        <div class="history-item-title">${escapeHtml(s.title || '新对话')}</div>
                        <div class="history-item-meta">${s.messageCount || 0}条消息 &middot; ${s.updatedAt || ''}</div>
                    </div>
                    <button class="history-item-del" onclick="deleteSession(event,'${s.id}')" title="删除">✕</button>
                </div>`;
            });
        });
        container.innerHTML = html;
    }

    async function switchSession(sessionId, el) {
        if (sessionId === currentSessionId) { closeHistorySidebar(); return; }
        currentSessionId = sessionId;
        closeHistorySidebar();
        clearChatUI();
        renderPlan(null);
        setDrawerHasPlan(false);
        setProcessing(false);
        // Load historical messages from backend into UI
        try {
            const messages = await fetch(BASE_PATH + '/api/sessions/' + sessionId + '/messages').then(r => r.json());
            if (Array.isArray(messages) && messages.length > 0) {
                messages.forEach(msg => {
                    const msgEl = appendMessage(msg.role === 'user' ? 'user' : 'assistant', '');
                    finalizeMessage(msgEl, msg.content);
                });
            }
        } catch(e) {
            appendMessage('assistant', '历史对话加载失败，可直接继续提问');
        }
    }

    function startNewSession() {
        currentSessionId = generateUUID();
        clearChatUI();
        // 强制清空任务计划面板内容
        const emptyEl   = document.getElementById('emptyPlan');
        const contentEl = document.getElementById('planContent');
        const hintEl    = document.getElementById('drawerHint');
        const progressWrap = document.getElementById('drawerProgressWrap');
        if (emptyEl)   { emptyEl.style.display = 'block'; }
        if (contentEl) { contentEl.style.display = 'none'; contentEl.innerHTML = ''; }
        if (hintEl)    { hintEl.className = 'drawer-hint'; const _t = hintEl.querySelector('#drawerHintText'); if (_t) _t.textContent = '📋 任务计划已生成，点击查看'; }
        if (progressWrap) { progressWrap.style.display = 'none'; }
        planPending = false;
        confirmDecided = false;
        confirmExecuted = false;
        setDrawerHasPlan(false);
        setProcessing(false);
    }

    async function deleteSession(event, sessionId) {
        event.stopPropagation();
        if (!confirm('确定删除这个对话记录？')) return;
        try {
            await fetch(BASE_PATH + '/api/sessions/' + sessionId, { method: 'DELETE' });
            if (sessionId === currentSessionId) startNewSession();
            await loadSessionHistory();
        } catch(e) { alert('删除失败'); }
    }

    // Sync chat input bottom padding with drawer state
    function syncDrawerPadding() {
        const inputContainer = document.getElementById('chatInputContainer');
        if (!inputContainer) return;
        if (hasPlan && !drawerOpen) {
            // hint strip visible: --drawer-hint-h = 40px
            inputContainer.style.paddingBottom = 'calc(10px + var(--drawer-hint-h) + var(--safe-bottom))';

    /* ═══════════════════════ Drawer ═══════════════════════ */
    function expandDrawer() {
        drawerOpen = true;
        userCollapsed = false;
        const drawer = document.getElementById('planDrawer');
        drawer.classList.add('expanded');
        document.getElementById('drawerOverlay').classList.add('active');

    function collapseDrawer() {

        const drawer = document.getElementById('planDrawer');

        document.getElementById('drawerOverlay').classList.remove('active');

    function setDrawerHasPlan(has) {
        hasPlan = has;
        const drawer = document.getElementById('planDrawer');
        if (has) {
            drawer.classList.add('has-plan');
        } else {
            drawer.classList.remove('has-plan', 'expanded');
