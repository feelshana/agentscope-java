    /* ═══════════════════════ Datasets (background, for agent context) ═══════════════════════ */
    async function loadDatasets() {
        try {
            const res = await fetch(BASE_PATH + '/api/datasets');
            datasets = await res.json();
        } catch (e) {}
    }

    /* ═══════════════════════ Chat ═══════════════════════ */
    // Click a suggestion chip: fill & send immediately
    function sendSuggestion(btn) {
        if (isProcessing) return;
        const text = btn.textContent.replace(/^[\p{Emoji}\s]+/u, '').trim();
        document.getElementById('chatInput').value = text;
        sendMessage();
    }
    // Post-report inline chip: send full text as-is
    function sendSuggestionText(btn) {
        if (isProcessing) return;
        const text = btn.textContent.trim();
        document.getElementById('chatInput').value = text;
        sendMessage();
    }
    // Called when user clicks 执行 / 不执行 confirm buttons
    function sendConfirm(btn, text) {
        // Disable both buttons and mark decision taken (prevents re-injection on next plan SSE)
        confirmDecided = true;
        // 只有点「执行」才允许面板在子任务开始时自动展开
        confirmExecuted = (text === '执行');
        const actions = btn.closest('.confirm-actions');
        if (actions) {
            actions.querySelectorAll('.confirm-btn').forEach(b => b.disabled = true);
        }

        // Notify backend to suppress further needConfirm=true broadcasts for this plan
        fetch(BASE_PATH + '/api/plan/confirm', { method: 'POST' }).catch(() => {});

        // 重置 userCollapsed，后续子任务开始执行时面板可自动展开
        userCollapsed = false;

        document.getElementById('chatInput').value = text;
        sendMessage(true);  // fromConfirm=true: skip confirmDecided reset
    }

    function handleInputKey(e) {
        if (e.key === 'Enter' && !e.shiftKey) {
            e.preventDefault();
            sendMessage();
        }
    }

    function autoResize(el) {
        el.style.height = 'auto';
        el.style.height = Math.min(el.scrollHeight, 110) + 'px';
    }

    async function sendMessage(fromConfirm) {
        const input = document.getElementById('chatInput');
        const message = input.value.trim();
        if (!message || isProcessing) return;

        let fullMessage = message;

        appendMessage('user', message);
        input.value = '';
        input.style.height = 'auto';
        setProcessing(true);
        streamingUserScrolledUp = false;  // reset auto-scroll lock for new message
        // Only reset confirmDecided when user sends a fresh message (not from confirm buttons)
        if (!fromConfirm) confirmDecided = false;
        // Mark that a plan may arrive (for clearPlanPendingIfNeeded), but do NOT show drawer yet
        planPending = true;

        const typingEl = appendTyping();
        const url = BASE_PATH + '/api/chat?message=' + encodeURIComponent(fullMessage) + '&sessionId=' + encodeURIComponent(currentSessionId) + '&account=' + encodeURIComponent(currentUserName);
        const eventSource = new EventSource(url);
        let assistantText = '';
        let assistantEl = null;
        let finalized = false;
        let inSpecialBlock = false;  // true once <report> or <chart> tag detected
        let inReportStream = false;   // true when streaming report content (not chart)

        // Detect user scroll: if user scrolls up (away from bottom), stop auto-scroll
        const chatMsgsEl = document.getElementById('chatMessages');
        function onUserScroll() {
            const atBottom = chatMsgsEl.scrollHeight - chatMsgsEl.scrollTop - chatMsgsEl.clientHeight < 60;
            streamingUserScrolledUp = !atBottom;
        }
        chatMsgsEl.addEventListener('scroll', onUserScroll, { passive: true });

        function doFinalize() {
            if (finalized) return;
            finalized = true;
            chatMsgsEl.removeEventListener('scroll', onUserScroll);
            removeTyping(typingEl);
            if (assistantEl) finalizeMessage(assistantEl, assistantText);
            // If LLM answered directly (no plan was ever pushed), clear pending state
            planPending = false;
            clearPlanPendingIfNeeded();
            setProcessing(false);
        }

        // Sanitise and render report HTML incrementally (same rules as finalizeMessage)
        function renderReportStream(rawContent) {
            const content = assistantEl.querySelector('.message-content');
            if (!content) return;
            let reportBlock = content.querySelector('#streamingReportBlock');
            if (!reportBlock) {
                // Remove loading indicator and create report block
                const loadingEl = content.querySelector('#msgLoadingIndicator');
                if (loadingEl) loadingEl.remove();
                reportBlock = document.createElement('div');
                reportBlock.className = 'report-block';
                reportBlock.id = 'streamingReportBlock';
                content.classList.add('has-chart');
                content.appendChild(reportBlock);
                // Scroll to the report block start
                requestAnimationFrame(() => {
                    reportBlock.scrollIntoView({ behavior: 'smooth', block: 'start' });
                });
            }
            // Sanitise: only allow h3/h4/p/strong/br tags
            const allowed = rawContent.replace(/<(?!\/?(?:h3|h4|p|strong|br)(\s[^>]*)?\s*\/?)[^>]+>/gi, '');
            reportBlock.innerHTML = allowed;
            // Auto-scroll to bottom only if user hasn't scrolled up
            if (!streamingUserScrolledUp) {
                const chatMessages = document.getElementById('chatMessages');
                chatMessages.scrollTop = chatMessages.scrollHeight;
            }
        }

        eventSource.onmessage = (event) => {
            const chunk = event.data;
            if (chunk === '[STOPPED]') { eventSource.close(); doFinalize(); return; }

            assistantText += chunk;

            // Once we see a special-block opening tag, switch to streaming report / loading
            if (!inSpecialBlock && /<report>|<chart>/i.test(assistantText)) {
                inSpecialBlock = true;
                // Determine if this is a report block (stream it) or chart block (show spinner)
                inReportStream = /<report>/i.test(assistantText);
                // Ensure we have a bubble
                if (!assistantEl) { removeTyping(typingEl); assistantEl = appendMessage('assistant', ''); }
                const beforeTag = assistantText
                    .replace(/<report>[\s\S]*/i, '')
                    .replace(/<chart>[\s\S]*/i, '')
                    .trim();
                const content = assistantEl.querySelector('.message-content');
                const textNode = beforeTag
                    ? `<div class="text-part" id="msgTextPart">${escapeHtml(beforeTag)}</div>`
                    : '';
                if (inReportStream) {
                    // Start with text part only; report block will be created on first content chunk
                    content.innerHTML = textNode +
                        `<div class="loading-indicator" id="msgLoadingIndicator">
                            <div class="loading-spinner"></div>生成分析报告中…
                        </div>`;
                    // Scroll to show the conclusion text
                    const textPartEl = content.querySelector('#msgTextPart');
                    if (textPartEl) {
                        textPartEl.scrollIntoView({ behavior: 'smooth', block: 'start' });
                    } else {
                        document.getElementById('chatMessages').scrollTop = 99999;
                    }
                    // Immediately try to render any report content already buffered
                    const reportInner = assistantText.match(/<report>([\s\S]*)/i);
                    if (reportInner && reportInner[1].trim()) {
                        // Strip closing tag if already present
                        const rawSoFar = reportInner[1].replace(/<\/report>[\s\S]*/i, '');
                        renderReportStream(rawSoFar);
                    }
                } else {
                    // Chart block: keep spinner as before
                    content.innerHTML = textNode +
                        `<div class="loading-indicator" id="msgLoadingIndicator">
                            <div class="loading-spinner"></div>生成分析报告中…
                        </div>`;
                    const textPartEl = content.querySelector('#msgTextPart');
                    if (textPartEl) {
                        textPartEl.scrollIntoView({ behavior: 'smooth', block: 'start' });
                    } else {
                        document.getElementById('chatMessages').scrollTop = 99999;
                    }
                }
                return;
            }

            if (inSpecialBlock) {
                // For report blocks: stream the inner content in real time
                if (inReportStream) {
                    const reportInner = assistantText.match(/<report>([\s\S]*)/i);
                    if (reportInner) {
                        // Strip closing tag if already received
                        const rawSoFar = reportInner[1].replace(/<\/report>[\s\S]*/i, '');
                        if (rawSoFar.trim()) renderReportStream(rawSoFar);
                    }
                }
                // Chart blocks continue to accumulate silently
                return;
            }

            // Normal streaming: show plain text
            if (!assistantEl) { removeTyping(typingEl); assistantEl = appendMessage('assistant', ''); }
            updateLastMessage(assistantEl, assistantText);
        };

        eventSource.onerror = () => {
            eventSource.close();
            if (!assistantEl && assistantText === '') {
                removeTyping(typingEl);
                appendMessage('assistant', '（请求出错，请重试）');
                setProcessing(false);
            } else {
                doFinalize();
            }
        };

        const checkDone = setInterval(() => {
            if (eventSource.readyState === EventSource.CLOSED) {
                clearInterval(checkDone); doFinalize();
            }
        }, 300);
    }

    function setProcessing(flag) {
        isProcessing = flag;
        document.getElementById('sendBtn').disabled = flag;
        document.getElementById('chatInput').disabled = flag;
    }

    /* ═══════════════════════ Message helpers ═══════════════════════ */
    function appendMessage(role, text) {
        const container = document.getElementById('chatMessages');
        const div = document.createElement('div');
        div.className = 'message ' + role;
        const label = role === 'user' ? '你' : '助手';
        div.innerHTML = `<span class="message-label">${label}</span><div class="message-content">${escapeHtml(text)}</div>`;
        container.appendChild(div);
        container.scrollTop = container.scrollHeight;
        return div;
    }

    function updateLastMessage(el, text) {
        el.querySelector('.message-content').textContent = text;
        if (!streamingUserScrolledUp) {
            document.getElementById('chatMessages').scrollTop = 99999;
        }
    }

    function finalizeMessage(el, fullText) {
        const chartRegex   = /<chart>\s*([\s\S]*?)\s*<\/chart>/i;
        const reportRegex  = /<report>\s*([\s\S]*?)\s*<\/report>/i;
        const confirmRegex = /\[CONFIRM_PLAN\]/;

        const hasConfirm  = confirmRegex.test(fullText);
        const chartMatch  = fullText.match(chartRegex);
        const reportMatch = fullText.match(reportRegex);

        // Strip all special tokens/blocks from plain text
        let textPart = fullText
            .replace(chartRegex, '')
            .replace(reportRegex, '')
            .replace(confirmRegex, '')
            .trim();

        let chartHtml = '';
        if (chartMatch) {
            try { chartHtml = buildChartHtml(JSON.parse(chartMatch[1].trim())); } catch (e) {}
        }

        let reportHtml = '';
        if (reportMatch) {
            // Sanitise: only allow h3/h4/p/strong/br tags with inline style attr
            const raw = reportMatch[1].trim();
            const allowed = raw.replace(/<(?!\/?(?:h3|h4|p|strong|br)(\s[^>]*)?\s*\/?)[^>]+>/gi, '');
            reportHtml = `<div class="report-block">${allowed}</div>`;
        }

        const content = el.querySelector('.message-content');

        if (reportHtml || chartHtml) {
            content.classList.add('has-chart');
            const textHtml = textPart ? `<div class="text-part">${escapeHtml(textPart)}</div>` : '';
            content.innerHTML = textHtml + reportHtml + chartHtml;
            // Scroll to the start of the report block (not the very bottom),
            // so the user sees the beginning of the report right after the conclusion.
            requestAnimationFrame(() => {
                const reportBlock = content.querySelector('.report-block, .chart-wrapper');
                if (reportBlock) {
                    reportBlock.scrollIntoView({ behavior: 'smooth', block: 'start' });
                } else {
                    document.getElementById('chatMessages').scrollTop = 99999;
                }
            });
        } else {
            content.textContent = textPart || fullText;
        }

        // Render confirm-plan action buttons (fallback: triggered by LLM token)
        // Primary injection happens via plan SSE (renderPlan); this is the backup path.
        // Skip if user already made a decision (confirmDecided) to avoid re-injection.
        if (hasConfirm && !confirmDecided && !content.querySelector('.confirm-actions')) {
            const actionsDiv = document.createElement('div');
            actionsDiv.className = 'confirm-actions';
            actionsDiv.innerHTML = `
                <button class="confirm-btn confirm-yes" onclick="sendConfirm(this, '\u6267\u884c')">✅ 执行计划</button>
                <button class="confirm-btn confirm-no"  onclick="sendConfirm(this, '\u4e0d\u6267\u884c')">❌ 不执行</button>
            `;
            content.appendChild(actionsDiv);
        }

        // 在消息气泡下方追加推荐问题（仅非确认类回复）
        // 插入到 el（.message.assistant）内部、消息气泡之后，避免撑高内容区
        if (!hasConfirm && suggestedQuestions.length > 0 && !el.querySelector('.post-report-sugg')) {
            const chips = suggestedQuestions.map(q =>
                `<button class="post-report-sugg-chip" onclick="sendSuggestionText(this)">${escapeHtml(q)}</button>`
            ).join('');
            const suggDiv = document.createElement('div');
            suggDiv.className = 'post-report-sugg';
            suggDiv.innerHTML = `
                <div class="post-report-sugg-label">继续提问</div>
                <div class="post-report-sugg-scroll">${chips}</div>`;
            el.appendChild(suggDiv);
        }

        // Scroll to bottom only when there is no report/chart block;
        // report/chart scrolling is handled above with scrollIntoView.
        if (!reportHtml && !chartHtml) {
            document.getElementById('chatMessages').scrollTop = 99999;
        }
    }

    function appendTyping() {
        const container = document.getElementById('chatMessages');
        const div = document.createElement('div');
        div.className = 'message assistant';
        div.innerHTML = `<span class="message-label">助手</span>
            <div class="typing-indicator">
                <span class="typing-dot"></span><span class="typing-dot"></span><span class="typing-dot"></span>
            </div>`;
        container.appendChild(div);
        container.scrollTop = container.scrollHeight;
        return div;
    }

    function removeTyping(el) { if (el && el.parentNode) el.parentNode.removeChild(el); }
    function escapeHtml(t) { return t.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

    /* ═══════════════════════ SVG Chart Engine ═══════════════════════ */
    const CHART_COLORS = [
        '#1a73e8','#ea4335','#fbbc04','#34a853','#9c27b0',
        '#ff6d00','#00bcd4','#795548','#607d8b','#e91e63'
    ];

    function buildChartHtml(def) {
        if (!def || !Array.isArray(def.data) || def.data.length === 0) return '';
        let svgHtml = '';
        switch ((def.type || 'bar').toLowerCase()) {
            case 'bar':  svgHtml = buildBarChart(def);  break;
            case 'line': svgHtml = buildLineChart(def); break;
            case 'pie':  svgHtml = buildPieChart(def);  break;
            default:     svgHtml = buildBarChart(def);
        }
        const legendHtml = buildLegend(def);
        return `<div class="chart-wrapper">
            ${def.title ? `<div class="chart-title">${escapeHtml(def.title)}</div>` : ''}
            ${svgHtml}${legendHtml}</div>`;
    }

    function buildBarChart(def) {
        const data = def.data;
        const W = 460, H = 200;
        const padL = 50, padR = 16, padT = 10, padB = 50;
        const chartW = W - padL - padR, chartH = H - padT - padB;
        const maxVal = Math.max(...data.map(d => d.value));
        const barW = Math.min(chartW / data.length * 0.6, 40);
        const gap = chartW / data.length;
        let gridLines = '', bars = '';
        for (let i = 0; i <= 4; i++) {
            const y = padT + chartH - (i / 4) * chartH;
            const val = Math.round((i / 4) * maxVal);
            gridLines += `<line x1="${padL}" y1="${y}" x2="${W-padR}" y2="${y}" stroke="#e8eaed" stroke-width="1"/>`;
            gridLines += `<text x="${padL-6}" y="${y+4}" text-anchor="end" font-size="10" fill="#9e9e9e">${fmtNum(val)}</text>`;
        }
        data.forEach((d, i) => {
            const color = CHART_COLORS[i % CHART_COLORS.length];
            const barH = (d.value / maxVal) * chartH;
            const x = padL + gap * i + gap / 2 - barW / 2;
            const y = padT + chartH - barH;
            const sl = String(d.label||''); const sl2 = sl.length>5?sl.slice(0,4)+'…':sl;
            bars += `<rect x="${x}" y="${y}" width="${barW}" height="${barH}" fill="${color}" rx="3"/>`;
            bars += `<text x="${x+barW/2}" y="${y-4}" text-anchor="middle" font-size="10" fill="#5f6368">${fmtNum(d.value)}</text>`;
            bars += `<text x="${x+barW/2}" y="${H-padB+16}" text-anchor="middle" font-size="10" fill="#5f6368">${escapeHtml(sl2)}</text>`;
        });
        const axes = `<line x1="${padL}" y1="${padT}" x2="${padL}" y2="${padT+chartH}" stroke="#bdbdbd" stroke-width="1"/>
            <line x1="${padL}" y1="${padT+chartH}" x2="${W-padR}" y2="${padT+chartH}" stroke="#bdbdbd" stroke-width="1"/>`;
        const yLabel = def.yLabel ? `<text x="14" y="${H/2}" text-anchor="middle" font-size="11" fill="#757575" transform="rotate(-90,14,${H/2})">${escapeHtml(def.yLabel)}</text>` : '';
        return `<svg viewBox="0 0 ${W} ${H}" xmlns="http://www.w3.org/2000/svg">${gridLines}${axes}${bars}${yLabel}</svg>`;
    }

    function buildLineChart(def) {
        const data = def.data;
        const W = 460, H = 200;
        const padL = 50, padR = 16, padT = 10, padB = 50;
        const chartW = W - padL - padR, chartH = H - padT - padB;
        const maxVal = Math.max(...data.map(d => d.value));
        const minVal = Math.min(0, Math.min(...data.map(d => d.value)));
        const range = maxVal - minVal || 1;
        const color = CHART_COLORS[0];
        let grid = '';
        for (let i = 0; i <= 4; i++) {
            const val = minVal + (range * i / 4);
            const y = padT + chartH - ((val - minVal) / range) * chartH;
            grid += `<line x1="${padL}" y1="${y}" x2="${W-padR}" y2="${y}" stroke="#e8eaed" stroke-width="1"/>`;
            grid += `<text x="${padL-6}" y="${y+4}" text-anchor="end" font-size="10" fill="#9e9e9e">${fmtNum(Math.round(val))}</text>`;
        }
        const pts = data.map((d, i) => ({
            x: padL + (i / (data.length-1||1)) * chartW,
            y: padT + chartH - ((d.value-minVal)/range)*chartH, d
        }));
        let polyline = '';
        if (pts.length > 1) {
            const coords = pts.map(p=>`${p.x},${p.y}`).join(' ');
            polyline += `<polygon points="${padL},${padT+chartH} ${coords} ${pts[pts.length-1].x},${padT+chartH}" fill="${color}" fill-opacity="0.1"/>`;
            polyline += `<polyline points="${coords}" fill="none" stroke="${color}" stroke-width="2" stroke-linejoin="round"/>`;
        }
        let circles = '';
        pts.forEach(p => {
            const sl = String(p.d.label||''); const sl2 = sl.length>5?sl.slice(0,4)+'…':sl;
            circles += `<circle cx="${p.x}" cy="${p.y}" r="4" fill="${color}" stroke="white" stroke-width="1.5"/>`;
            circles += `<text x="${p.x}" y="${p.y-8}" text-anchor="middle" font-size="10" fill="#5f6368">${fmtNum(p.d.value)}</text>`;
            circles += `<text x="${p.x}" y="${H-padB+16}" text-anchor="middle" font-size="10" fill="#5f6368">${escapeHtml(sl2)}</text>`;
        });
        const axes = `<line x1="${padL}" y1="${padT}" x2="${padL}" y2="${padT+chartH}" stroke="#bdbdbd" stroke-width="1"/>
            <line x1="${padL}" y1="${padT+chartH}" x2="${W-padR}" y2="${padT+chartH}" stroke="#bdbdbd" stroke-width="1"/>`;
        return `<svg viewBox="0 0 ${W} ${H}" xmlns="http://www.w3.org/2000/svg">${grid}${axes}${polyline}${circles}</svg>`;
    }

    function buildPieChart(def) {
        const data = def.data;
        const W = 300, H = 200, cx = 100, cy = H/2, r = 80;
        const total = data.reduce((s,d) => s+d.value, 0) || 1;
        let slices = '', currentAngle = -Math.PI/2;
        data.forEach((d, i) => {
            const color = CHART_COLORS[i%CHART_COLORS.length];
            const angle = (d.value/total)*2*Math.PI;
            const endAngle = currentAngle+angle;
            const x1=cx+r*Math.cos(currentAngle), y1=cy+r*Math.sin(currentAngle);
            const x2=cx+r*Math.cos(endAngle),   y2=cy+r*Math.sin(endAngle);
            const largeArc = angle>Math.PI?1:0;
            const mid = currentAngle+angle/2;
            const lx=cx+r*0.65*Math.cos(mid), ly=cy+r*0.65*Math.sin(mid);
            const pct = Math.round(d.value/total*100);
            slices += `<path d="M${cx},${cy} L${x1},${y1} A${r},${r} 0 ${largeArc},1 ${x2},${y2} Z" fill="${color}"/>`;
            if (pct>=5) slices += `<text x="${lx}" y="${ly+4}" text-anchor="middle" font-size="10" fill="white" font-weight="600">${pct}%</text>`;
            currentAngle = endAngle;
        });
        let legend = '';
        data.forEach((d,i) => {
            const color = CHART_COLORS[i%CHART_COLORS.length];
            const lx = cx+r+16, ly = 20+i*22;
            const sl = String(d.label||''); const sl2 = sl.length>8?sl.slice(0,7)+'…':sl;
            legend += `<rect x="${lx}" y="${ly}" width="12" height="12" fill="${color}" rx="2"/>`;
            legend += `<text x="${lx+16}" y="${ly+10}" font-size="11" fill="#5f6368">${escapeHtml(sl2)}</text>`;
        });
        return `<svg viewBox="0 0 ${W} ${H}" xmlns="http://www.w3.org/2000/svg">${slices}${legend}</svg>`;
    }

    function buildLegend(def) {
        if ((def.type||'bar')==='pie') return '';
        if (!def.data||def.data.length<=1) return '';
        return `<div class="chart-legend">${def.data.map((d,i)=>`<div class="legend-item"><span class="legend-dot" style="background:${CHART_COLORS[i%CHART_COLORS.length]}"></span><span>${escapeHtml(String(d.label||''))}</span></div>`).join('')}</div>`;
    }

    function fmtNum(n) {
        if (Math.abs(n)>=1e8) return (n/1e8).toFixed(1)+'亿';
        if (Math.abs(n)>=1e4) return (n/1e4).toFixed(1)+'万';
        return String(n);
    }

    /* ═══════════════════════ Plan SSE ═══════════════════════ */
    function connectPlanStream() {
        if (planEventSource) planEventSource.close();
        planEventSource = new EventSource(BASE_PATH + '/api/plan/stream');
        planEventSource.onmessage = (e) => { try { renderPlan(JSON.parse(e.data)); } catch(_) {} };
        planEventSource.onopen = () => updateConnStatus(true);
        planEventSource.onerror = () => { updateConnStatus(false); setTimeout(connectPlanStream, 3000); };
    }

    async function fetchCurrentPlan() {
        try { renderPlan(await (await fetch(BASE_PATH + '/api/plan')).json()); } catch(_) {}
    }

    /* ═══════════════════════ Plan render ═══════════════════════ */

    // Show pending state immediately after sendMessage (before any plan SSE arrives)
    // NOTE: No longer called directly – drawer is only shown when plan data arrives.
    function showPlanPending() {
        const hintEl    = document.getElementById('drawerHint');
        const emptyEl   = document.getElementById('emptyPlan');
        const contentEl = document.getElementById('planContent');
        const progressWrap = document.getElementById('drawerProgressWrap');

        hintEl.classList.add('hint-generating');
        hintEl.classList.remove('hint-running', 'hint-done');
        const _hintTxtPending = hintEl.querySelector('#drawerHintText');
        if (_hintTxtPending) _hintTxtPending.textContent = '🔄 正在生成任务计划…';

        emptyEl.style.display = 'none';
        contentEl.style.display = 'block';
        progressWrap.style.display = 'none';
        contentEl.innerHTML = `
            <div class="plan-generating-wrap">
                <div class="plan-generating-spinner"></div>
                <p>智能体正在分析数据集<br>并生成任务计划，请稍候…</p>
            </div>`;

        // 不再主动展开面板：setDrawerHasPlan / expandDrawer 由 renderPlan 控制
        setPlanGenerating(true);
    }

    // Called when doFinalize fires and no plan was ever pushed (Case A: direct answer)
    function clearPlanPendingIfNeeded() {
        if (!planPending) return;
        planPending = false;
        setPlanGenerating(false);
        // Restore drawer to previous state (empty or existing plan)
        if (!hasPlan) {
            const emptyEl   = document.getElementById('emptyPlan');
            const contentEl = document.getElementById('planContent');
            const hintEl    = document.getElementById('drawerHint');
            hintEl.classList.remove('hint-generating', 'hint-running', 'hint-done');
            emptyEl.style.display = 'block';
            contentEl.style.display = 'none';
            setDrawerHasPlan(false);
        }
    }

    function renderPlan(plan) {
        const emptyEl      = document.getElementById('emptyPlan');
        const contentEl    = document.getElementById('planContent');
        const progressWrap = document.getElementById('drawerProgressWrap');
        const progressFill = document.getElementById('drawerProgressFill');
        const progressText = document.getElementById('drawerProgressText');
        const hintEl       = document.getElementById('drawerHint');

        if (!plan || !plan.name) {
            // Backend pushed empty/null plan – keep existing content intact
            if (!hasPlan) {
                emptyEl.style.display = 'block';
                contentEl.style.display = 'none';
                progressWrap.style.display = 'none';
            }
            return;
        }

        const subtasks  = plan.subtasks || [];
        const doneCount = subtasks.filter(s => s.state === 'done').length;
        const total     = subtasks.length;
        const pct       = total > 0 ? Math.round(doneCount / total * 100) : 0;
        const isRunning = subtasks.some(s => s.state === 'in_progress');
        const allDone   = total > 0 && doneCount === total;

        // Once real subtasks arrive, clear the pending flag
        if (planPending && total > 0) {
            planPending = false;
            setPlanGenerating(false);
        }

        // ── Confirm buttons: injected by plan SSE, not by LLM token (reliable) ──
        // When the plan is freshly created (all subtasks TODO) and confirmation is needed,
        // inject the action buttons into the last assistant bubble.
        const needConfirm = plan.needConfirm === true;
        if (needConfirm && !confirmDecided) {
            const msgs = document.getElementById('chatMessages');
            // Find the last assistant message bubble
            const allBubbles = msgs ? msgs.querySelectorAll('.message.assistant .message-content') : [];
            const lastBubble = allBubbles.length > 0 ? allBubbles[allBubbles.length - 1] : null;
            if (lastBubble && !lastBubble.querySelector('.confirm-actions')) {
                const actionsDiv = document.createElement('div');
                actionsDiv.className = 'confirm-actions';
                actionsDiv.innerHTML = `
                    <button class="confirm-btn confirm-yes" onclick="sendConfirm(this, '\u6267\u884c')">✅ 执行计划</button>
                    <button class="confirm-btn confirm-no"  onclick="sendConfirm(this, '\u4e0d\u6267\u884c')">❌ 不执行</button>
                `;
                lastBubble.appendChild(actionsDiv);
                if (msgs) msgs.scrollTop = 99999;
            }
        }

        // ── Hint strip ──
        hintEl.classList.toggle('hint-generating', planPending && total === 0);
        hintEl.classList.toggle('hint-running',    isRunning && !allDone && !planPending);
        hintEl.classList.toggle('hint-done',       allDone);
        const hintTextEl = document.getElementById('drawerHintText');
        if (allDone) {
            if (hintTextEl) hintTextEl.textContent = '✅ 任务查询已完成，点击查看';
        } else if (planPending && total === 0) {
            if (hintTextEl) hintTextEl.textContent = '🔄 正在生成任务计划…';
        } else if (isRunning) {
            if (hintTextEl) hintTextEl.textContent = `⚙️ 子任务执行中（${doneCount}/${total}）`;
        } else {
            if (hintTextEl) hintTextEl.textContent = '📋 任务计划已生成，点击查看';
        }

        // ── Show drawer ──
        setDrawerHasPlan(true);
        // 展开策略：
        // · needConfirm=true（计划完整生成，等待用户确认）→ 强制收起面板（无论当前是否展开），让用户看气泡按钮
        // · allDone（所有子任务完成）→ 若面板展开则静默收起，用户回到主界面等待分析报告
        // · 子任务执行中 → 仅当用户已点「执行」（confirmExecuted=true）且未手动收起时才展开
        // · 用户手动收起过（userCollapsed=true）→ 不强制展开
        if (needConfirm) {
            // 强制收起，不受 drawerOpen 状态限制
            drawerOpen = false;
            const _d = document.getElementById('planDrawer');
            if (_d) _d.classList.remove('expanded');
            document.getElementById('drawerOverlay').classList.remove('active');
            syncDrawerPadding();
        } else if (allDone) {
            // 静默收起（不设 userCollapsed），hint strip 变绿提示完成，用户可随时点开查看
            if (drawerOpen) {
                drawerOpen = false;
                const _d = document.getElementById('planDrawer');
                if (_d) _d.classList.remove('expanded');
                document.getElementById('drawerOverlay').classList.remove('active');
                syncDrawerPadding();
            }
        } else if (!drawerOpen && !userCollapsed && confirmExecuted) {
            expandDrawer();
        }

        // ── Body content ──
        emptyEl.style.display = 'none';
        contentEl.style.display = 'block';

        if (planPending && total === 0) {
            // Still generating – keep spinner
            progressWrap.style.display = 'none';
            contentEl.innerHTML = `
                <div class="plan-generating-wrap">
                    <div class="plan-generating-spinner"></div>
                    <p>智能体正在分析数据集<br>并生成任务计划，请稍候…</p>
                </div>`;
            return;
        }

        // ── Progress bar ──
        progressWrap.style.display = 'flex';
        progressFill.style.width = pct + '%';
        progressText.textContent = `${doneCount}/${total}`;

        // ── Plan card with done banner ──
        let html = `<div class="plan-card">
            <div class="plan-card-title">${escapeHtml(plan.name||'')}</div>
            ${plan.description ? `<div class="plan-card-desc">${escapeHtml(plan.description)}</div>` : ''}
            <span class="plan-badge ${plan.state||'todo'}">${stateLabel(plan.state)}</span>
            ${total>0 ? `<div class="progress-bar-wrap"><div class="progress-bar-fill" style="width:${pct}%"></div></div><div class="progress-text">${pct}%</div>` : ''}
        </div>`;

        if (allDone) {
            html += `<div class="plan-done-banner">
                <span class="plan-done-check">✔</span>
                全部 ${total} 个子任务已完成
            </div>`;
        }

        if (subtasks.length > 0) {
            html += `<div class="subtasks-label">子任务 (${total})</div>`;
            subtasks.forEach((st, i) => {
                const icon = stateIcon(st.state);
                html += `<div class="subtask-item">
                    <div class="subtask-num">${i+1}</div>
                    <div class="subtask-icon ${st.state||'todo'}">${icon}</div>
                    <div class="subtask-body">
                        <div class="subtask-name">${escapeHtml(st.name||'')}</div>
                        ${st.description?`<div class="subtask-desc">${escapeHtml(st.description)}</div>`:''}
                        ${st.outcome?`<div class="subtask-outcome">✓ ${escapeHtml(st.outcome)}</div>`:''}
                    </div>
                </div>`;
            });
        }
        contentEl.innerHTML = html;
    }

    function stateLabel(s) {
        return {todo:'待开始',in_progress:'进行中',done:'已完成',abandoned:'已放弃'}[s]||s||'';
    }
    function stateIcon(s) {
        return {todo:'○', in_progress:'', done:'✓', abandoned:'✕'}[s] || '○';
    }

    // Disable/enable input area during plan generation (separate from chat processing)
    let planGenerating = false;
    function setPlanGenerating(flag) {
        planGenerating = flag;
        // Only disable if not already controlled by isProcessing
        if (!isProcessing) {
            document.getElementById('sendBtn').disabled = flag;
            document.getElementById('chatInput').disabled = flag;
            document.getElementById('hintText').textContent =
                flag ? '正在生成任务计划，请稍候…' : '输入问题或点击上方推荐';
        }
    }

    /* ═══════════════════════ Reset ═══════════════════════ */
    async function resetAll() {
        startNewSession();
        try {
            await fetch(BASE_PATH + '/api/reset?sessionId=' + encodeURIComponent(currentSessionId), { method: 'POST' });
        } catch (e) {}
    }

    /* ═══════════════════════ Connection ═══════════════════════ */
    function updateConnStatus(ok) {
        document.getElementById('statusDot').className = 'status-dot' + (ok ? '' : ' disconnected');
    }
</script>
