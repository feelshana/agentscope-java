    // 构建多系列折线图配置（multi_line）
    function buildMultiLineOption(def) {
        const categories = def.categories || [];
        const series = def.series || [];
        const count = categories.length;
        const ZOOM_THRESHOLD = 15;
        const useZoom = count > ZOOM_THRESHOLD;
        const windowSize = Math.min(count, ZOOM_THRESHOLD);
        const startPct = useZoom ? Math.max(0, Math.round((count - windowSize) / count * 100)) : 0;
        const needsRotate = count > 6 || categories.some(l => l && String(l).length > 4);
        const bottomPad = useZoom ? 60 : (needsRotate ? 90 : 55);
        const interval = useZoom ? 0 : (count <= 8 ? 0 : Math.ceil(count / 8) - 1);

        const option = {
            title: { text: def.title || '', left: 'center', top: 10, textStyle: { fontSize: 14, fontWeight: 600, color: '#1f2937' } },
            tooltip: { trigger: 'axis' },
            legend: { top: 35, type: 'scroll', textStyle: { fontSize: 11, color: '#4b5563' } },
            grid: { left: '3%', right: '4%', top: 70, bottom: bottomPad, containLabel: true },
            xAxis: {
                type: 'category',
                data: categories,
                boundaryGap: false,
                axisLabel: { rotate: needsRotate ? 40 : 0, fontSize: 11, color: '#4b5563', interval, overflow: 'truncate', width: needsRotate ? 70 : undefined },
                axisLine: { lineStyle: { color: '#e5e7eb' } }
            },
            yAxis: {
                type: 'value',
                axisLabel: { color: '#6b7280', formatter: val => formatNumber(val) },
                splitLine: { lineStyle: { color: '#f3f4f6', type: 'dashed' } }
            },
            series: series.map((s, i) => ({
                name: s.name,
                type: 'line',
                data: s.data,
                smooth: true,
                symbol: 'circle',
                symbolSize: count > 20 ? 4 : 6,
                lineStyle: { color: CHART_COLORS[i % CHART_COLORS.length], width: 2 },
                itemStyle: { color: CHART_COLORS[i % CHART_COLORS.length], borderWidth: 2, borderColor: '#fff' }
            }))
        };
        if (useZoom) {
            option.dataZoom = [
                { type: 'slider', xAxisIndex: 0, start: startPct, end: 100, height: 20, bottom: 8, borderColor: 'rgba(79,110,247,0.2)', fillerColor: 'rgba(79,110,247,0.12)', handleStyle: { color: '#4f6ef7' }, textStyle: { color: '#9ba3c4', fontSize: 10 } },
                { type: 'inside', xAxisIndex: 0 }
            ];
        }
        return option;
    }

    // 构建多系列柱状图配置（multi_bar）
    function buildMultiBarOption(def) {
        const categories = def.categories || [];
        const series = def.series || [];
        const count = categories.length;
        const ZOOM_THRESHOLD = 12;
        const useZoom = count > ZOOM_THRESHOLD;
        const windowSize = Math.min(count, ZOOM_THRESHOLD);
        const startPct = useZoom ? Math.max(0, Math.round((count - windowSize) / count * 100)) : 0;
        const needsRotate = count > 5 || categories.some(l => l && String(l).length > 4);
        const bottomPad = useZoom ? 60 : (needsRotate ? 90 : 55);
        const interval = useZoom ? 0 : (count <= 8 ? 0 : Math.ceil(count / 8) - 1);

        const option = {
            title: { text: def.title || '', left: 'center', top: 10, textStyle: { fontSize: 14, fontWeight: 600, color: '#1f2937' } },
            tooltip: { trigger: 'axis', axisPointer: { type: 'shadow' } },
            legend: { top: 35, type: 'scroll', textStyle: { fontSize: 11, color: '#4b5563' } },
            grid: { left: '3%', right: '4%', top: 70, bottom: bottomPad, containLabel: true },
            xAxis: {
                type: 'category',
                data: categories,
                axisLabel: { rotate: needsRotate ? 40 : 0, fontSize: 11, color: '#4b5563', interval, overflow: 'truncate', width: needsRotate ? 70 : undefined },
                axisLine: { lineStyle: { color: '#e5e7eb' } }
            },
            yAxis: {
                type: 'value',
                axisLabel: { color: '#6b7280', formatter: val => formatNumber(val) },
                splitLine: { lineStyle: { color: '#f3f4f6', type: 'dashed' } }
            },
            series: series.map((s, i) => ({
                name: s.name,
                type: 'bar',
                data: s.data,
                barMaxWidth: 30,
                itemStyle: { color: CHART_COLORS[i % CHART_COLORS.length], borderRadius: [4, 4, 0, 0] },
                label: { show: count <= 8, position: 'top', fontSize: 10, color: '#4b5563', formatter: p => formatNumber(p.value) }
            }))
        };
        if (useZoom) {
            option.dataZoom = [
                { type: 'slider', xAxisIndex: 0, start: startPct, end: 100, height: 20, bottom: 8, borderColor: 'rgba(79,110,247,0.2)', fillerColor: 'rgba(79,110,247,0.12)', handleStyle: { color: '#4f6ef7' }, textStyle: { color: '#9ba3c4', fontSize: 10 } },
                { type: 'inside', xAxisIndex: 0 }
            ];
        }
        return option;
    }

    // 构建双轴图配置（dual_axes）
    function buildDualAxesOption(def) {
        const categories = def.categories || [];
        const series = def.series || [];
        const yAxisDef = def.yAxis || [{}, {}];
        const count = categories.length;
        const ZOOM_THRESHOLD = 15;
        const useZoom = count > ZOOM_THRESHOLD;
        const windowSize = Math.min(count, ZOOM_THRESHOLD);
        const startPct = useZoom ? Math.max(0, Math.round((count - windowSize) / count * 100)) : 0;
        const needsRotate = count > 6 || categories.some(l => l && String(l).length > 4);
        const bottomPad = useZoom ? 60 : (needsRotate ? 90 : 55);
        const interval = useZoom ? 0 : (count <= 8 ? 0 : Math.ceil(count / 8) - 1);

        const option = {
            title: { text: def.title || '', left: 'center', top: 10, textStyle: { fontSize: 14, fontWeight: 600, color: '#1f2937' } },
            tooltip: { trigger: 'axis' },
            legend: { top: 35, type: 'scroll', textStyle: { fontSize: 11, color: '#4b5563' } },
            grid: { left: '3%', right: '6%', top: 70, bottom: bottomPad, containLabel: true },
            xAxis: {
                type: 'category',
                data: categories,
                axisLabel: { rotate: needsRotate ? 40 : 0, fontSize: 11, color: '#4b5563', interval, overflow: 'truncate', width: needsRotate ? 70 : undefined },
                axisLine: { lineStyle: { color: '#e5e7eb' } }
            },
            yAxis: [
                {
                    type: 'value',
                    name: (yAxisDef[0] && yAxisDef[0].name) || '',
                    nameTextStyle: { color: '#6b7280', padding: [0, 0, 0, 40] },
                    axisLabel: { color: '#6b7280', formatter: val => formatNumber(val) },
                    splitLine: { lineStyle: { color: '#f3f4f6', type: 'dashed' } }
                },
                {
                    type: 'value',
                    name: (yAxisDef[1] && yAxisDef[1].name) || '',
                    nameTextStyle: { color: '#6b7280', padding: [0, 40, 0, 0] },
                    axisLine: { show: true, lineStyle: { color: '#e5e7eb' } },
                    axisLabel: { color: '#6b7280', formatter: val => formatNumber(val) },
                    splitLine: { show: false }
                }
            ],
            series: series.map((s, i) => {
                const yIdx = s.yAxisIndex !== undefined ? s.yAxisIndex : i;
                const color = CHART_COLORS[i % CHART_COLORS.length];
                if ((s.type || 'bar') === 'bar') {
                    return { name: s.name, type: 'bar', yAxisIndex: yIdx, data: s.data, barMaxWidth: 35, itemStyle: { color, borderRadius: [4, 4, 0, 0] } };
                } else {
                    return { name: s.name, type: 'line', yAxisIndex: yIdx, data: s.data, smooth: true, symbol: 'circle', symbolSize: 6, lineStyle: { color, width: 2 }, itemStyle: { color } };
                }
            })
        };
        if (useZoom) {
            option.dataZoom = [
                { type: 'slider', xAxisIndex: 0, start: startPct, end: 100, height: 20, bottom: 8, borderColor: 'rgba(79,110,247,0.2)', fillerColor: 'rgba(79,110,247,0.12)', handleStyle: { color: '#4f6ef7' }, textStyle: { color: '#9ba3c4', fontSize: 10 } },
                { type: 'inside', xAxisIndex: 0 }
            ];
        }
        return option;
    }

    // 初始化页面中的所有图表
    function initAllCharts() {
        document.querySelectorAll('.chart-container[data-chart-def]').forEach(el => {
            renderEChart(el.id);
        });
    }

    // 下载HTML报告
    async function downloadHtmlReport(content) {
        try {
            const response = await fetch(BASE_PATH + '/api/reports/html', {
                method: 'POST',
                headers: { 'Content-Type': 'text/plain;charset=utf-8' },
                body: content
            });
            
            if (!response.ok) throw new Error('下载失败');
            
            const blob = await response.blob();
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = `report_${new Date().getTime()}.html`;
            document.body.appendChild(a);
            a.click();
            document.body.removeChild(a);
            URL.revokeObjectURL(url);
        } catch (e) {
            console.error('下载HTML报告失败:', e);
            alert('下载失败，请重试');
        }
    }

    // 下载Markdown报告
    function downloadMarkdownReport(content) {
        const blob = new Blob([content], { type: 'text/markdown' });
        const url = URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = url;
        a.download = `report_${new Date().getTime()}.md`;
        document.body.appendChild(a);
        a.click();
        document.body.removeChild(a);
        URL.revokeObjectURL(url);
    }

    // 简化版数字格式化（用于表格等场景）
    function fmtNum(n) {
        return formatNumber(n);
    }

    /* ═══════════════════════ Plan SSE ═══════════════════════ */
    function connectPlanStream() {
        if (planEventSource) planEventSource.close();
        const url = BASE_PATH + '/api/plan/stream?sessionId=' + encodeURIComponent(currentSessionId);
        planEventSource = new EventSource(url);
        planEventSource.onmessage = (e) => { try { renderPlan(JSON.parse(e.data)); } catch(_) {} };
        planEventSource.onopen = () => updateConnStatus(true);
        planEventSource.onerror = () => { updateConnStatus(false); setTimeout(connectPlanStream, 3000); };
    }

    async function fetchCurrentPlan() {
        const url = BASE_PATH + '/api/plan?sessionId=' + encodeURIComponent(currentSessionId);
        try { renderPlan(await (await fetch(url)).json()); } catch(_) {}
    }

    /* ═══════════════════════ Plan render ═══════════════════════ */

    // Show pending state immediately after sendMessage (before any plan SSE arrives)
    // NOTE: No longer called directly – drawer is only shown when plan data arrives.
    function showPlanPending() {
        const hintEl    = document.getElementById('drawerHint');
        const emptyEl   = document.getElementById('emptyPlan');
        const contentEl = document.getElementById('planContent');
        const progressWrap = document.getElementById('drawerProgressWrap');

        hintEl.classList.add('hint-generating');
        hintEl.classList.remove('hint-running', 'hint-done');
        const _hintTxtPending = hintEl.querySelector('#drawerHintText');
        if (_hintTxtPending) _hintTxtPending.textContent = '🔄 正在生成任务计划…';

        emptyEl.style.display = 'none';
        contentEl.style.display = 'block';
        progressWrap.style.display = 'none';
        contentEl.innerHTML = `
            <div class="plan-generating-wrap">
                <div class="plan-generating-spinner"></div>
                <p>智能体正在分析数据集<br>并生成任务计划，请稍候…</p>
            </div>`;

        // 不再主动展开面板：setDrawerHasPlan / expandDrawer 由 renderPlan 控制
        setPlanGenerating(true);
    }

    // Called when doFinalize fires and no plan was ever pushed (Case A: direct answer)
    function clearPlanPendingIfNeeded() {
        if (!planPending) return;
        planPending = false;
        setPlanGenerating(false);
        // Restore drawer to previous state (empty or existing plan)
        if (!hasPlan) {
            const emptyEl   = document.getElementById('emptyPlan');
            const contentEl = document.getElementById('planContent');
            const hintEl    = document.getElementById('drawerHint');
            hintEl.classList.remove('hint-generating', 'hint-running', 'hint-done');
            emptyEl.style.display = 'block';
            contentEl.style.display = 'none';
            setDrawerHasPlan(false);
        }
    }

    function renderPlan(plan) {
        const emptyEl      = document.getElementById('emptyPlan');
        const contentEl    = document.getElementById('planContent');
        const progressWrap = document.getElementById('drawerProgressWrap');
        const progressFill = document.getElementById('drawerProgressFill');
        const progressText = document.getElementById('drawerProgressText');
        const hintEl       = document.getElementById('drawerHint');

        if (plan && plan.state === 'abandoned' && !plan.name) {
            clearPlanPanelUI();
            return;
        }

        if (!plan || !plan.name) {
            // Backend pushed empty/null plan – keep existing content intact
            if (!hasPlan) {
                emptyEl.style.display = 'block';
                contentEl.style.display = 'none';
                progressWrap.style.display = 'none';
            }
            return;
        }


        const subtasks  = plan.subtasks || [];
        const doneCount = subtasks.filter(s => s.state === 'done').length;
        const total     = subtasks.length;
        const pct       = total > 0 ? Math.round(doneCount / total * 100) : 0;
        const isRunning = subtasks.some(s => s.state === 'in_progress');
        const allDone   = total > 0 && doneCount === total;

        // Once real subtasks arrive, clear the pending flag
        if (planPending && total > 0) {
            planPending = false;
            setPlanGenerating(false);
        }

        // ── Confirm buttons: injected by finalizeMessage when LLM outputs [CONFIRM_PLAN] token ──
        // Do NOT inject here via SSE, otherwise the button appears before LLM outputs any text.
        // The SSE-driven needConfirm flag is only used to control the drawer collapse behavior.
        const needConfirm = plan.needConfirm === true;

        // ── Hint strip ──
        hintEl.classList.toggle('hint-generating', planPending && total === 0);
        hintEl.classList.toggle('hint-running',    isRunning && !allDone && !planPending);
        hintEl.classList.toggle('hint-done',       allDone);
        const hintTextEl = document.getElementById('drawerHintText');
        if (allDone) {
            if (hintTextEl) hintTextEl.textContent = '✅ 任务查询已完成，点击查看';
        } else if (planPending && total === 0) {
            if (hintTextEl) hintTextEl.textContent = '🔄 正在生成任务计划…';
        } else if (isRunning) {
            if (hintTextEl) hintTextEl.textContent = `⚙️ 子任务执行中（${doneCount}/${total}）`;
        } else {
            if (hintTextEl) hintTextEl.textContent = '📋 任务计划已生成，点击查看';
        }

        // ── Show drawer ──
        setDrawerHasPlan(true);
        // 展开策略：
        // · needConfirm=true（计划完整生成，等待用户确认）→ 强制收起面板（无论当前是否展开），让用户看气泡按钮
        // · allDone（所有子任务完成）→ 若面板展开则静默收起，用户回到主界面等待分析报告
        // · 子任务执行中 → 仅当用户已点「执行」（confirmExecuted=true）且未手动收起时才展开
        // · 用户手动收起过（userCollapsed=true）→ 不强制展开
        if (needConfirm) {
            // 强制收起，不受 drawerOpen 状态限制
            drawerOpen = false;
            const _d = document.getElementById('planDrawer');
            if (_d) _d.classList.remove('expanded');
            document.getElementById('drawerOverlay').classList.remove('active');
            syncDrawerPadding();
        } else if (allDone) {
            // 静默收起（不设 userCollapsed），hint strip 变绿提示完成，用户可随时点开查看
            if (drawerOpen) {
                drawerOpen = false;
                const _d = document.getElementById('planDrawer');
                if (_d) _d.classList.remove('expanded');
                document.getElementById('drawerOverlay').classList.remove('active');
                syncDrawerPadding();
            }
        } else if (!drawerOpen && !userCollapsed && confirmExecuted) {
            expandDrawer();
        }

        // ── Body content ──
        emptyEl.style.display = 'none';
        contentEl.style.display = 'block';

        if (planPending && total === 0) {
            // Still generating – keep spinner
            progressWrap.style.display = 'none';
            contentEl.innerHTML = `
                <div class="plan-generating-wrap">
                    <div class="plan-generating-spinner"></div>
                    <p>智能体正在分析数据集<br>并生成任务计划，请稍候…</p>
                </div>`;
            return;
        }

        // ── Progress bar ──
        progressWrap.style.display = 'flex';
        progressFill.style.width = pct + '%';
        progressText.textContent = `${doneCount}/${total}`;

        // ── Plan card with done banner ──
        let html = `<div class="plan-card">
            <div class="plan-card-title">${escapeHtml(plan.name||'')}</div>
            ${plan.description ? `<div class="plan-card-desc">${escapeHtml(plan.description)}</div>` : ''}
            <span class="plan-badge ${plan.state||'todo'}">${stateLabel(plan.state)}</span>
            ${total>0 ? `<div class="progress-bar-wrap"><div class="progress-bar-fill" style="width:${pct}%"></div></div><div class="progress-text">${pct}%</div>` : ''}
        </div>`;

        if (allDone) {
            html += `<div class="plan-done-banner">
                <span class="plan-done-check">✔</span>
                全部 ${total} 个子任务已完成
            </div>`;
        }

        if (subtasks.length > 0) {
            html += `<div class="subtasks-label">子任务 (${total})</div>`;
            subtasks.forEach((st, i) => {
                const icon = stateIcon(st.state);
                html += `<div class="subtask-item">
                    <div class="subtask-num">${i+1}</div>
                    <div class="subtask-icon ${st.state||'todo'}">${icon}</div>
                    <div class="subtask-body">
                        <div class="subtask-name">${escapeHtml(st.name||'')}</div>
                        ${st.description?`<div class="subtask-desc">${escapeHtml(st.description)}</div>`:''}
                        ${st.outcome?`<div class="subtask-outcome">✓ ${escapeHtml(st.outcome)}</div>`:''}
                    </div>
                </div>`;
            });
        }
        contentEl.innerHTML = html;
    }

    function stateLabel(s) {
        return {todo:'待开始',in_progress:'进行中',done:'已完成',abandoned:'已放弃'}[s]||s||'';
    }
    function stateIcon(s) {
        return {todo:'○', in_progress:'', done:'✓', abandoned:'✕'}[s] || '○';
    }

    // Disable/enable input area during plan generation (separate from chat processing)
    let planGenerating = false;
    function setPlanGenerating(flag) {
        planGenerating = flag;
        // Only disable if not already controlled by isProcessing
        if (!isProcessing) {
            document.getElementById('sendBtn').disabled = flag;
            document.getElementById('chatInput').disabled = flag;
            document.getElementById('hintText').textContent =
                flag ? '正在生成任务计划，请稍候…' : '输入问题或点击上方推荐';
        }
    }

    /* ═══════════════════════ Reset ═══════════════════════ */
    async function resetAll() {
        startNewSession();
        try {
            await fetch(BASE_PATH + '/api/reset?sessionId=' + encodeURIComponent(currentSessionId), { method: 'POST' });
        } catch (e) {}
    }

    /* ═══════════════════════ Connection ═══════════════════════ */
    function updateConnStatus(ok) {
        document.getElementById('statusDot').className = 'status-dot' + (ok ? '' : ' disconnected');
    }
</script>
