    async function switchSession(sessionId, el) {
        if (sessionId === currentSessionId) { closeHistorySidebar(); return; }
        currentSessionId = sessionId;
        closeHistorySidebar();
        clearChatUI();
        renderPlan(null);
        setDrawerHasPlan(false);
        setProcessing(false);
        connectPlanStream();
        await fetchCurrentPlan();
        // Load historical messages from backend into UI
        try {
            const messages = await fetch(BASE_PATH + '/api/sessions/' + sessionId + '/messages').then(r => r.json());
            if (Array.isArray(messages) && messages.length > 0) {
                let lastAssistantIdx = -1;
                for (let i = messages.length - 1; i >= 0; i--) {
                    if (messages[i].role !== 'user') { lastAssistantIdx = i; break; }
                }
                messages.forEach((msg, idx) => {
                    const msgEl = appendMessage(msg.role === 'user' ? 'user' : 'assistant', '');
                    finalizeMessage(msgEl, msg.content, false);
                });
                requestAnimationFrame(() => initAllCharts());
            }

            // Check streaming status: only call tryResumeSessionStream if backend stream is RUNNING.
            // When DONE/NONE, history is already correctly rendered above; just inject suggestions.
            try {
                const statusRes = await fetch(BASE_PATH + '/api/streaming-status/' + encodeURIComponent(sessionId));
                const statusData = statusRes.ok ? await statusRes.json() : { status: 'NONE' };
                if (statusData.status === 'RUNNING') {
                    // Active stream — resume and let it finalize (injects suggestions on end)
                    persistActiveSession(sessionId, true);
                    tryResumeSessionStream(sessionId, true);
                } else {
                    // Session complete — history already rendered. Just inject suggestions onto last msg.
                    const messagesEl = document.getElementById('chatMessages');
                    const assistantNodes = messagesEl.querySelectorAll('.message.assistant');
                    if (assistantNodes.length > 0) {
                        const lastEl = assistantNodes[assistantNodes.length - 1];
                        if (!lastEl.querySelector('.post-report-sugg') && suggestedQuestions.length > 0) {
                            const hasConfirmBtn = lastEl.querySelector('.confirm-actions');
                            if (!hasConfirmBtn) {
                                const chips = suggestedQuestions.map(q =>
                                    `<button class="post-report-sugg-chip" onclick="sendSuggestionText(this)">${escapeHtml(q)}</button>`
                                ).join('');
                                const suggDiv = document.createElement('div');
                                suggDiv.className = 'post-report-sugg';
                                suggDiv.innerHTML = `
                                    <div class="post-report-sugg-label">继续提问</div>
                                    <div class="post-report-sugg-scroll">${chips}</div>`;
                                lastEl.appendChild(suggDiv);
                            }
                        }
                    }
                }
            } catch(_) {
                // Fallback: if status check fails, try resume (safe, SNAPSHOT only re-renders)
                tryResumeSessionStream(sessionId, true);
            }
        } catch(e) {
            appendMessage('assistant', '历史对话加载失败，可直接继续提问');
        }
    }

    // When user re-enters a session (especially in mobile WebView),
    // re-subscribe to backend active stream and keep appending output.
    function tryResumeSessionStream(sessionId, showSuggAfterFinish, initialText, initialEl, retryCount) {
        if (!sessionId) return;
        const MAX_RESUME_RETRIES = 6;  // max re-connect attempts when stream not finished
        const _retryCount = retryCount || 0;
        if (currentResumeEventSource) {
            currentResumeEventSource.close();
            currentResumeEventSource = null;
        }

        const url = BASE_PATH + '/api/chat/resume?sessionId=' + encodeURIComponent(sessionId);
        const es = new EventSource(url);
        currentResumeEventSource = es;

        // DeepSeek-style resume:
        //   First frame: "[SNAPSHOT]<full text so far>" → replace bubble content entirely
        //   Subsequent frames: incremental chunks → append
        // initialEl: reuse existing bubble element to avoid creating a new one
        let resumedText = initialText || '';
        let resumedAssistantEl = initialEl || null;
        let gotAnyChunk = false;
        let snapshotReceived = false;
        let streamNaturallyEnded = false; // true when [STOPPED] received = stream finished cleanly
        // If backend has no stream (immediate onerror, no chunks), and showSuggAfterFinish=true,
        // inject suggestion chips onto the last message
        let needInjectSuggOnNoStream = !!showSuggAfterFinish;

        // ── scroll control: support user scrolling up to pause auto-scroll during resume ──
        let resumeUserScrolledUp = false;
        const resumeChatMsgsEl = document.getElementById('chatMessages');
        let _resumeUserIsTouching = false;
        function onResumeTouchStart() { _resumeUserIsTouching = true; }
        function onResumeTouchEnd() {
            _resumeUserIsTouching = false;
            const atBottom = resumeChatMsgsEl.scrollHeight - resumeChatMsgsEl.scrollTop - resumeChatMsgsEl.clientHeight < 80;
            if (atBottom) { resumeUserScrolledUp = false; streamingUserScrolledUp = false; }
        }
        function onResumeScroll() {
            if (!_resumeUserIsTouching) return;
            const atBottom = resumeChatMsgsEl.scrollHeight - resumeChatMsgsEl.scrollTop - resumeChatMsgsEl.clientHeight < 80;
            resumeUserScrolledUp = !atBottom;
            streamingUserScrolledUp = resumeUserScrolledUp;
        }
        resumeChatMsgsEl.addEventListener('touchstart', onResumeTouchStart, { passive: true });
        resumeChatMsgsEl.addEventListener('touchend',   onResumeTouchEnd,   { passive: true });
        resumeChatMsgsEl.addEventListener('scroll',     onResumeScroll,     { passive: true });

        es.onmessage = (event) => {
            const chunk = event.data;
            if (chunk === '[STOPPED]') {
                streamNaturallyEnded = true;
                return;
            }
            if (/^\[TOOL:[^\]]+\]$/.test(chunk)) return;

            // Ensure bubble element exists
            if (!resumedAssistantEl) {
                const messagesEl = document.getElementById('chatMessages');
                const assistantNodes = messagesEl.querySelectorAll('.message.assistant');
                resumedAssistantEl = assistantNodes.length
                    ? assistantNodes[assistantNodes.length - 1]
                    : appendMessage('assistant', '');
            }

            // DeepSeek-style: first frame may be [SNAPSHOT]...
            if (!snapshotReceived && chunk.startsWith('[SNAPSHOT]')) {
                snapshotReceived = true;
                gotAnyChunk = true;
                needInjectSuggOnNoStream = false;
                resumedText = chunk.substring('[SNAPSHOT]'.length);
                // Replace bubble content entirely with snapshot
                updateLastMessage(resumedAssistantEl, resumedText);
                resumeSnapshot = { text: resumedText, el: resumedAssistantEl };
                return;
            }

            // Normal incremental chunk
            needInjectSuggOnNoStream = false;
            gotAnyChunk = true;
            resumedText += chunk;
            // Update realtime snapshot for re-reconnect
            resumeSnapshot = { text: resumedText, el: resumedAssistantEl };
            updateLastMessage(resumedAssistantEl, resumedText);
        };

        es.onerror = () => {
            // Always close to prevent EventSource auto-reconnect loop
            es.close();
            resumeChatMsgsEl.removeEventListener('touchstart', onResumeTouchStart);
            resumeChatMsgsEl.removeEventListener('touchend',   onResumeTouchEnd);
            resumeChatMsgsEl.removeEventListener('scroll',     onResumeScroll);
            streamingUserScrolledUp = false;
            if (currentResumeEventSource === es) {
                currentResumeEventSource = null;
            }
            // If page is hidden AND stream did not finish cleanly, this is a background
            // disconnect — do NOT finalize. Keep resumeSnapshot and hasActiveStream so
            // visibility handler can re-resume.
            if (document.visibilityState === 'hidden' && !streamNaturallyEnded) {
                console.log('[Resume SSE] onerror while hidden (stream not finished) - keeping snapshot for re-resume');
                return;
            }
            // If stream did not finish cleanly AND page is visible, the SSE connection
            // dropped mid-stream (common on mobile). Re-connect automatically up to MAX_RESUME_RETRIES.
            if (!streamNaturallyEnded && _retryCount < MAX_RESUME_RETRIES) {
                const delay = Math.min(1000 * (_retryCount + 1), 4000); // 1s, 2s, 3s, 4s, 4s…
                console.log('[Resume SSE] connection dropped (stream not finished), retry', _retryCount + 1, '/', MAX_RESUME_RETRIES, 'in', delay, 'ms');
                // Show a non-blocking hint card so user knows backend is still running
                if (resumedAssistantEl) {
                    const _cnt = resumedAssistantEl.querySelector('.message-content');
                    if (_cnt && !_cnt.querySelector('#resumeRetryCard')) {
                        const _rc = document.createElement('div');
                        _rc.id = 'resumeRetryCard';
                        _rc.style.cssText =
                            'display:flex;align-items:center;gap:8px;margin-top:8px;'
                            + 'padding:8px 12px;background:var(--surface2);border:1px solid var(--border);'
                            + 'border-radius:var(--radius-sm);font-size:0.78rem;color:var(--text-hint);';
                        _rc.innerHTML =
                            '<div style="width:12px;height:12px;flex-shrink:0;border:2px solid var(--border);'
                            + 'border-top-color:var(--primary);border-radius:50%;'
                            + 'animation:spinLoader 0.7s linear infinite;"></div>'
                            + '<span>&#x23F3; 后台仍在执行中，正在重新连接…</span>';
                        _cnt.appendChild(_rc);
                    }
                }
                setTimeout(() => {
                    if (!streamNaturallyEnded) {
                        tryResumeSessionStream(sessionId, showSuggAfterFinish,
                            resumedText, resumedAssistantEl, _retryCount + 1);
                    }
                }, delay);
                return;
            }
            if (gotAnyChunk && resumedAssistantEl) {
                // Stream truly ended — clear snapshot, mark done, finalize
                resumeSnapshot = null;
                persistActiveSession(currentSessionId, false);
                planPending = false;
                clearPlanPendingIfNeeded();
                setProcessing(false);
                finalizeMessage(resumedAssistantEl, resumedText, true);
            } else if (!gotAnyChunk && needInjectSuggOnNoStream) {
                // Backend had no stream at all — clear snapshot, mark done, inject suggestions
                resumeSnapshot = null;
                persistActiveSession(currentSessionId, false);
                planPending = false;
                clearPlanPendingIfNeeded();
                setProcessing(false);
                const messagesEl = document.getElementById('chatMessages');
                const assistantNodes = messagesEl.querySelectorAll('.message.assistant');
                if (assistantNodes.length > 0) {
                    const lastAssistantEl = assistantNodes[assistantNodes.length - 1];
                    if (!lastAssistantEl.querySelector('.post-report-sugg') && suggestedQuestions.length > 0) {
                        const hasConfirmBtn = lastAssistantEl.querySelector('.confirm-actions');
                        if (!hasConfirmBtn) {
                            const chips = suggestedQuestions.map(q =>
                                `<button class="post-report-sugg-chip" onclick="sendSuggestionText(this)">${escapeHtml(q)}</button>`
                            ).join('');
                            const suggDiv = document.createElement('div');
                            suggDiv.className = 'post-report-sugg';
                            suggDiv.innerHTML = `
                                <div class="post-report-sugg-label">继续提问</div>
                                <div class="post-report-sugg-scroll">${chips}</div>`;
                            lastAssistantEl.appendChild(suggDiv);
                        }
                    }
                }
            }
        };
    }
