    </div>

</div><!-- /app-shell -->

<!-- History Sidebar Overlay -->
<div class="history-overlay" id="historyOverlay" onclick="closeHistorySidebar()"></div>

<!-- History Sidebar -->
<div class="history-sidebar" id="historySidebar">
    <div class="history-header">
        <span class="history-header-title">💬 历史对话</span>
        <button class="history-close-btn" onclick="closeHistorySidebar()">✕</button>
    </div>
    <button class="history-new-btn" onclick="startNewSession(); closeHistorySidebar();">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none"><path d="M12 5v14M5 12h14" stroke="currentColor" stroke-width="2.2" stroke-linecap="round"/></svg>
        新建对话
    </button>
    <div class="history-list" id="historyList">
        <div class="history-empty">暂无历史对话<br>开始提问后会自动保存</div>
    </div>
</div>

<!-- Drawer overlay -->
<div class="drawer-overlay" id="drawerOverlay" onclick="collapseDrawer()"></div>

<!-- Bottom drawer: task plan -->
<div class="plan-drawer" id="planDrawer">

    <!-- Hint strip (visible when has-plan & not expanded) -->
    <div class="drawer-hint" id="drawerHint" onclick="expandDrawer()">
        <span class="drawer-hint-arrow" id="drawerHintArrow">
            <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg"><path d="M6 15l6-6 6 6" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"/></svg>
        </span>
        <span class="drawer-hint-dot"></span>
        <span id="drawerHintText">📋 任务计划已生成，点击查看</span>
        <span class="drawer-hint-dot"></span>
    </div>

    <!-- Full handle (visible when expanded) -->
    <div class="drawer-handle" id="drawerHandle" onclick="collapseDrawer()" style="cursor:pointer" title="点击收起面板">
        <div class="drawer-handle-left">
            <span class="drawer-icon">📋</span>
            <span class="drawer-title">任务计划面板</span>
            <span class="drawer-handle-collapse-tip">（点击收起）</span>
        </div>
        <div class="drawer-progress-wrap" id="drawerProgressWrap" style="display:none">
            <div class="drawer-progress-bar">
                <div class="drawer-progress-fill" id="drawerProgressFill" style="width:0%"></div>
            </div>
            <span class="drawer-progress-text" id="drawerProgressText">0/0</span>
        </div>
        <button class="drawer-close-btn" onclick="event.stopPropagation();collapseDrawer()" title="收起面板">
            <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg"><path d="M18 9l-6 6-6-6" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>
            收起
        </button>
    </div>

    <!-- Scrollable body -->
    <div class="drawer-body" id="drawerBody">
        <div class="empty-plan" id="emptyPlan">
            <div class="empty-plan-icon">📋</div>
            <p>提交问题后，智能体将自动创建分析计划<br>并在此实时展示任务进度</p>
        </div>
        <div id="planContent" style="display:none"></div>
    </div>
</div>

<script>
    /* ─── Base path auto-detection (supports local dev and nginx sub-path proxy) ───
     * 本地直接访问时 pathname='/'，BASE_PATH=''，请求路径为 /api/xxx
     * nginx 代理时 pathname='/dify/dataAnalyse/'，BASE_PATH='/dify/dataAnalyse'，请求路径为 /dify/dataAnalyse/api/xxx
     */
    const BASE_PATH = (() => {
        const p = window.location.pathname;
        // 去掉末尾的 index.html 或 /，保留目录前缀
        const dir = p.replace(/\/index\.html$/, '').replace(/\/$/, '');
        return dir || '';
    })();

    /* ═══════════════════════ State ═══════════════════════ */
    let datasets = [];
    let selectedDataset = null;
    let planEventSource = null;
    let isProcessing = false;
    let drawerOpen = false;
    let hasPlan = false;
    let userCollapsed = false;
    let planPending = false;
    let confirmDecided = false;  // true after user clicks 执行/不执行; prevents re-injection
    let confirmExecuted = false; // true only when user clicks 执行（not 不执行）; gates drawer auto-expand
    let streamingUserScrolledUp = false; // true when user scrolls up during streaming, disables auto-scroll

    // ─── User identity from URL param ───
    const urlParams = new URLSearchParams(window.location.search);
    const currentUserName = urlParams.get('account') || urlParams.get('userName') || '';

    // ─── Session management ───
    let currentSessionId = generateUUID();

    function generateUUID() {
        return 'xxxxxxxx-xxxx-4xxx-yxxx-xxxxxxxxxxxx'.replace(/[xy]/g, c => {
            const r = Math.random() * 16 | 0;
            return (c === 'x' ? r : (r & 0x3 | 0x8)).toString(16);
        });
    }

    /* ═══════════════════════ Init ═══════════════════════ */
    // Cache suggested questions loaded from backend
    let suggestedQuestions = [];

    async function loadSuggestedQuestions() {
        try {
            const res = await fetch(BASE_PATH + '/api/suggested-questions');
            if (res.ok) {
                suggestedQuestions = await res.json();
            }
        } catch (e) {
            console.warn('Failed to load suggested questions', e);
        }
        // Refresh the welcome screen with the loaded questions
        clearChatUI();
    }

    document.addEventListener('DOMContentLoaded', () => {
        connectPlanStream();
        fetchCurrentPlan();
        loadSuggestedQuestions();
        syncDrawerPadding();
    });

    /* ═══════════════════════ History Sidebar ═══════════════════════ */
    function openHistorySidebar() {
        loadSessionHistory();
        document.getElementById('historySidebar').classList.add('open');
        document.getElementById('historyOverlay').classList.add('active');
    }

    function closeHistorySidebar() {
        document.getElementById('historySidebar').classList.remove('open');
        document.getElementById('historyOverlay').classList.remove('active');
    }

    async function loadSessionHistory() {
        try {
            const sessions = await fetch(BASE_PATH + '/api/sessions?userName=' + encodeURIComponent(currentUserName)).then(r => r.json());
            renderHistoryList(sessions);
        } catch(e) {
            document.getElementById('historyList').innerHTML =
                '<div class="history-empty">加载失败，请重试</div>';
        }
    }

    function renderHistoryList(sessions) {
        const container = document.getElementById('historyList');
        if (!sessions || sessions.length === 0) {
            container.innerHTML = '<div class="history-empty">暂无历史对话<br>开始提问后会自动保存</div>';
            return;
        }
        const today = new Date().toISOString().split('T')[0];
        const yesterday = new Date(Date.now() - 86400000).toISOString().split('T')[0];
        const groups = {};
        sessions.forEach(s => {
            const date = s.updatedAt ? s.updatedAt.split(' ')[0] : '更早';
            if (!groups[date]) groups[date] = [];
            groups[date].push(s);
        });
        let html = '';
        Object.entries(groups).forEach(([date, items]) => {
            let label = date === today ? '今天' : date === yesterday ? '昨天' : date;
            html += `<div class="history-day-label">${label}</div>`;
            items.forEach(s => {
                const isActive = s.id === currentSessionId ? ' active' : '';
                html += `<div class="history-item${isActive}" onclick="switchSession('${s.id}', this)">
                    <span class="history-item-icon">💬</span>
                    <div class="history-item-body">
                        <div class="history-item-title">${escapeHtml(s.title || '新对话')}</div>
                        <div class="history-item-meta">${s.messageCount || 0}条消息 &middot; ${s.updatedAt || ''}</div>
                    </div>
                    <button class="history-item-del" onclick="deleteSession(event,'${s.id}')" title="删除">✕</button>
                </div>`;
            });
        });
        container.innerHTML = html;
    }

    async function switchSession(sessionId, el) {
        if (sessionId === currentSessionId) { closeHistorySidebar(); return; }
        currentSessionId = sessionId;
        closeHistorySidebar();
        clearChatUI();
        renderPlan(null);
        setDrawerHasPlan(false);
        setProcessing(false);
        // Load historical messages from backend into UI
        try {
            const messages = await fetch(BASE_PATH + '/api/sessions/' + sessionId + '/messages').then(r => r.json());
            if (Array.isArray(messages) && messages.length > 0) {
                messages.forEach(msg => {
                    const msgEl = appendMessage(msg.role === 'user' ? 'user' : 'assistant', '');
                    finalizeMessage(msgEl, msg.content);
                });
                // 历史消息渲染完后初始化所有ECharts图表
                requestAnimationFrame(() => initAllCharts());
            }
        } catch(e) {
            appendMessage('assistant', '历史对话加载失败，可直接继续提问');
        }
    }

    function startNewSession() {
        currentSessionId = generateUUID();
        clearChatUI();
        // 强制清空任务计划面板内容
        const emptyEl   = document.getElementById('emptyPlan');
        const contentEl = document.getElementById('planContent');
        const hintEl    = document.getElementById('drawerHint');
        const progressWrap = document.getElementById('drawerProgressWrap');
        if (emptyEl)   { emptyEl.style.display = 'block'; }
        if (contentEl) { contentEl.style.display = 'none'; contentEl.innerHTML = ''; }
        if (hintEl)    { hintEl.className = 'drawer-hint'; const _t = hintEl.querySelector('#drawerHintText'); if (_t) _t.textContent = '📋 任务计划已生成，点击查看'; }
        if (progressWrap) { progressWrap.style.display = 'none'; }
        planPending = false;
        confirmDecided = false;
        confirmExecuted = false;
        setDrawerHasPlan(false);
        setProcessing(false);
    }

    async function deleteSession(event, sessionId) {
        event.stopPropagation();
        if (!confirm('确定删除这个对话记录？')) return;
        try {
            await fetch(BASE_PATH + '/api/sessions/' + sessionId, { method: 'DELETE' });
            if (sessionId === currentSessionId) startNewSession();
            await loadSessionHistory();
        } catch(e) { alert('删除失败'); }
    }

    function clearChatUI() {
        const btnHtml = suggestedQuestions.length > 0
            ? suggestedQuestions.map(q =>
                `<button class="suggestion-btn" onclick="sendSuggestion(this)">${escapeHtml(q)}</button>`
              ).join('')
            : '';
        document.getElementById('chatMessages').innerHTML = `
            <div class="message assistant">
                <div class="welcome-card">
                    <div class="welcome-banner">
                        <div class="welcome-avatar">
                            <svg width="26" height="26" viewBox="0 0 22 22" xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink"><defs><linearGradient x1="50%" y1="76.9577359%" x2="31.5960253%" y2="0%" id="lg2"><stop stop-color="#2E58F7" offset="0%"></stop><stop stop-color="#00CBFC" offset="100%"></stop></linearGradient></defs><g stroke="none" stroke-width="1" fill="none" fill-rule="evenodd"><rect stroke="#FFFFFF" fill="#FFFFFF" x="0.5" y="0.5" width="21" height="21" rx="4"></rect><g transform="translate(5, 3)" fill="url(#lg2)"><path d="M1,5.96733911 L4.99803067,9.49317142 L4.7053422,13.8950576 L3.21049157,14.7972052 C2.98746288,14.9255039 2.73408116,15 2.48069944,15 C2.22731772,15 1.97261632,14.9351608 1.74034972,14.7972052 C1.28332302,14.5220301 1.00118988,14.0131305 1,13.4617944 L1,5.96733911 Z M9.06715829,4.73782976 L12.2596503,6.6647187 C12.7162652,6.94063005 13,7.44830686 13,8.00012956 C13,8.55195227 12.7162652,9.06100861 12.26097,9.33691996 L6.34815097,12.9037135 L6.59139638,9.24400805 L9.06715829,4.73782976 Z M3.21049157,1.20305396 L7.70296295,3.91449084 L5.62743719,7.69252048 L1.0252031,3.6343975 L1,3.66532747 L1,2.53846475 C1.00225816,1.98906035 1.28343214,1.48223378 1.73847879,1.20732922 C2.19352544,0.932424663 2.75399068,0.930796866 3.21049157,1.20305396 Z"></path></g></g></svg>
                        </div>
                        <div class="welcome-banner-text">
                            <div class="welcome-banner-title">你好！有什么可以帮你？</div>
                            <div class="welcome-banner-sub">专注业务数据分析，快速洞察关键指标与趋势</div>
                        </div>
                    </div>
                    <div class="welcome-chips">
                        <span class="welcome-chip">📊 数据分析</span>
                        <span class="welcome-chip">🎯 指标追踪</span>
                        <span class="welcome-chip">💡 智能洞察</span>

                    </div>
                    <hr class="welcome-divider">
                    <div class="welcome-suggest-label">快速开始 · 点击直接提问</div>
                    <div class="welcome-suggest-list">${btnHtml}</div>
                </div>
            </div>`;
        // Also sync the static welcome card on the page (if visible before JS runs)
        const staticList = document.getElementById('staticSuggestList');
        if (staticList) staticList.innerHTML = btnHtml;
    }

    // Sync chat input bottom padding with drawer state
    function syncDrawerPadding() {
        const inputContainer = document.getElementById('chatInputContainer');
        if (!inputContainer) return;
        if (hasPlan && !drawerOpen) {
            // hint strip visible: --drawer-hint-h = 40px
            inputContainer.style.paddingBottom = 'calc(10px + var(--drawer-hint-h) + var(--safe-bottom))';
        } else {
            inputContainer.style.paddingBottom = 'calc(10px + var(--safe-bottom))';
        }
    }

    /* ═══════════════════════ Drawer ═══════════════════════ */
    function expandDrawer() {
        drawerOpen = true;
        userCollapsed = false;
        const drawer = document.getElementById('planDrawer');
        drawer.classList.add('expanded');
        document.getElementById('drawerOverlay').classList.add('active');
        syncDrawerPadding();
    }

    function collapseDrawer() {
        drawerOpen = false;
        userCollapsed = true;   // remember: user explicitly closed
        const drawer = document.getElementById('planDrawer');
        drawer.classList.remove('expanded');
        document.getElementById('drawerOverlay').classList.remove('active');
        syncDrawerPadding();
    }

    function setDrawerHasPlan(has) {
        hasPlan = has;
        const drawer = document.getElementById('planDrawer');
        if (has) {
            drawer.classList.add('has-plan');
        } else {
            drawer.classList.remove('has-plan', 'expanded');
            document.getElementById('drawerOverlay').classList.remove('active');
            drawerOpen = false;
            userCollapsed = false;
        }
        syncDrawerPadding();
    }

    /* ═══════════════════════ Datasets (background, for agent context) ═══════════════════════ */
    async function loadDatasets() {
        try {
            const res = await fetch(BASE_PATH + '/api/datasets');
            datasets = await res.json();
        } catch (e) {}
    }

    /* ═══════════════════════ Chat ═══════════════════════ */
    // Click a suggestion chip: fill & send immediately
    function sendSuggestion(btn) {
        if (isProcessing) return;
        const text = btn.textContent.replace(/^[\p{Emoji}\s]+/u, '').trim();
        document.getElementById('chatInput').value = text;
        sendMessage();
    }
    // Post-report inline chip: send full text as-is
    function sendSuggestionText(btn) {
        if (isProcessing) return;
        const text = btn.textContent.trim();
        document.getElementById('chatInput').value = text;
        sendMessage();
    }
    // Called when user clicks 执行 / 不执行 confirm buttons
    function sendConfirm(btn, text) {
        // Disable both buttons and mark decision taken (prevents re-injection on next plan SSE)
        confirmDecided = true;
        // 只有点「执行」才允许面板在子任务开始时自动展开
        confirmExecuted = (text === '执行');
        const actions = btn.closest('.confirm-actions');
        if (actions) {
            actions.querySelectorAll('.confirm-btn').forEach(b => b.disabled = true);
        }

        // Notify backend to suppress further needConfirm=true broadcasts for this plan
        fetch(BASE_PATH + '/api/plan/confirm', { method: 'POST' }).catch(() => {});

        // 重置 userCollapsed，后续子任务开始执行时面板可自动展开
        userCollapsed = false;

        document.getElementById('chatInput').value = text;
        sendMessage(true);  // fromConfirm=true: skip confirmDecided reset
    }

    function handleInputKey(e) {
        if (e.key === 'Enter' && !e.shiftKey) {
            e.preventDefault();
            sendMessage();
        }
    }

    function autoResize(el) {
        el.style.height = 'auto';
        el.style.height = Math.min(el.scrollHeight, 110) + 'px';
    }

    async function sendMessage(fromConfirm) {
        const input = document.getElementById('chatInput');
        const message = input.value.trim();
        if (!message || isProcessing) return;

        let fullMessage = message;

        appendMessage('user', message);
        input.value = '';
        input.style.height = 'auto';
        setProcessing(true);
        streamingUserScrolledUp = false;  // reset auto-scroll lock for new message
        // Only reset confirmDecided when user sends a fresh message (not from confirm buttons)
        if (!fromConfirm) confirmDecided = false;
        // Mark that a plan may arrive (for clearPlanPendingIfNeeded), but do NOT show drawer yet
        planPending = true;

        const typingEl = appendTyping();
        const url = BASE_PATH + '/api/chat?message=' + encodeURIComponent(fullMessage) + '&sessionId=' + encodeURIComponent(currentSessionId) + '&account=' + encodeURIComponent(currentUserName);
        const eventSource = new EventSource(url);
        let assistantText = '';
        let assistantEl = null;
        let finalized = false;
        let inSpecialBlock = false;  // true once <report> or <chart> tag detected
        let inReportStream = false;   // true when streaming report content (not chart)
        // Set to true after query_dataset completes so normal-text streaming shows a
        // "generating chart…" pre-indicator before the <chart> tag actually arrives.
        let pendingChartLoading = false;

        // Detect user scroll: if user scrolls up (away from bottom), stop auto-scroll
        const chatMsgsEl = document.getElementById('chatMessages');
        function onUserScroll() {
            const atBottom = chatMsgsEl.scrollHeight - chatMsgsEl.scrollTop - chatMsgsEl.clientHeight < 60;
            streamingUserScrolledUp = !atBottom;
        }
        chatMsgsEl.addEventListener('scroll', onUserScroll, { passive: true });

        function doFinalize() {
            if (finalized) return;
            finalized = true;
            chatMsgsEl.removeEventListener('scroll', onUserScroll);
            removeTyping(typingEl);
            if (assistantEl) finalizeMessage(assistantEl, assistantText);
            // If LLM answered directly (no plan was ever pushed), clear pending state
            planPending = false;
            clearPlanPendingIfNeeded();
            setProcessing(false);
        }

        // Sanitise and render report HTML incrementally (same rules as finalizeMessage)
        function renderReportStream(rawContent) {
            const content = assistantEl.querySelector('.message-content');
            if (!content) return;
            let reportBlock = content.querySelector('#streamingReportBlock');
            // 流式期间用原始 Markdown 文本展示（有打字机效果），doFinalize 后统一用 marked 渲染
            if (!reportBlock) {
                // Remove loading indicator and create report block
                const loadingEl = content.querySelector('#msgLoadingIndicator');
                if (loadingEl) loadingEl.remove();
                reportBlock = document.createElement('div');
                reportBlock.className = 'report-block report-block-streaming';
                reportBlock.id = 'streamingReportBlock';
                content.classList.add('has-chart');
                content.appendChild(reportBlock);
                // Scroll to the report block start
                requestAnimationFrame(() => {
                    reportBlock.scrollIntoView({ behavior: 'smooth', block: 'start' });
                });
            }
            // 修复 Markdown 标题格式：将 `#标题` 替换为 `# 标题`
            let fixedContent = rawContent.replace(/^(#{1,6})([^#\s])/gm, '$1 $2');
            // 修复 Markdown 标题格式：将 `#  标题`（多个空格）替换为 `# 标题`
            fixedContent = fixedContent.replace(/^(#{1,6})\s{2,}/gm, '$1 ');
            // 流式期间：用 marked 实时渲染 Markdown，让用户看到格式化效果；降级到 <pre> 展示
            if (typeof marked !== 'undefined') {
                try {
                    reportBlock.innerHTML = marked.parse(fixedContent);
                } catch(e) {
                    reportBlock.innerHTML = `<pre style="white-space:pre-wrap;word-break:break-word;font-family:inherit;font-size:0.85rem;line-height:1.7;color:var(--text-sub);background:transparent;padding:0;margin:0;">${escapeHtml(fixedContent)}</pre>`;
                }
            } else {
                reportBlock.innerHTML = `<pre style="white-space:pre-wrap;word-break:break-word;font-family:inherit;font-size:0.85rem;line-height:1.7;color:var(--text-sub);background:transparent;padding:0;margin:0;">${escapeHtml(fixedContent)}</pre>`;
            }
            // Auto-scroll to bottom only if user hasn't scrolled up
            if (!streamingUserScrolledUp) {
                const chatMessages = document.getElementById('chatMessages');
                chatMessages.scrollTop = chatMessages.scrollHeight;
            }
        }

        eventSource.onmessage = (event) => {
            const chunk = event.data;
            if (chunk === '[STOPPED]') { eventSource.close(); doFinalize(); return; }

            // ── Tool progress markers: update status line in bubble, never accumulate in text ──
            if (/^\[TOOL:[^\]]+\]$/.test(chunk)) {
                const toolName = chunk.slice(6, -1);
                const label = toolName === 'list_datasets'  ? '⚙️ 正在发现可用数据集…'
                            : toolName === 'query_dataset'  ? '📊 数据查询完成，正在分析…'
                            : `⚙️ 工具执行中（${toolName}）…`;
                // After query_dataset finishes, the LLM will emit conclusion text then
                // a <chart> block. Flag this so we can show a chart pre-loading indicator.
                if (toolName === 'query_dataset') pendingChartLoading = true;
                // Ensure bubble exists
                if (!assistantEl) { removeTyping(typingEl); assistantEl = appendMessage('assistant', ''); }
                const content = assistantEl.querySelector('.message-content');
                let statusEl = content.querySelector('#toolStatusLine');
                if (!statusEl) {
                    statusEl = document.createElement('div');
                    statusEl.id = 'toolStatusLine';
                    statusEl.style.cssText = 'font-size:0.8rem;color:var(--text-hint);margin:4px 0 2px;display:flex;align-items:center;gap:6px;';
                    content.appendChild(statusEl);
                }
                statusEl.textContent = label;
                if (!streamingUserScrolledUp) document.getElementById('chatMessages').scrollTop = 99999;
                return;
            }

            assistantText += chunk;

            // Once we see a special-block opening tag, switch to streaming report / loading
            if (!inSpecialBlock && /<report>|<chart>/i.test(assistantText)) {
                inSpecialBlock = true;
                pendingChartLoading = false; // chart block has arrived; no longer "pending"
                // Determine if this is a report block (stream it) or chart block (show spinner)
                inReportStream = /<report>/i.test(assistantText);
                // Ensure we have a bubble
                if (!assistantEl) { removeTyping(typingEl); assistantEl = appendMessage('assistant', ''); }
                const beforeTag = assistantText
                    .replace(/<report>[\s\S]*/i, '')
                    .replace(/<chart>[\s\S]*/i, '')
                    .trim();
                const content = assistantEl.querySelector('.message-content');
                // Remove tool status line (replaced by report loading indicator)
                const _statusEl = content.querySelector('#toolStatusLine');
                if (_statusEl) _statusEl.remove();
                // Remove pre-chart loading bar if it was shown during normal streaming
                const _preChartEl = content.querySelector('#preChartLoadingBar');
                if (_preChartEl) _preChartEl.remove();
                // 渲染 <report> 之前的普通文本（如果有 Markdown 格式也一并渲染）
                let textNode = '';
                if (beforeTag) {
                    // 过滤裸露的图表 JSON 和修复 Markdown 标题格式
                    const looseChartJsonRegex = /\{[\s]*"type"[\s]*:[\s]*"(bar|line|pie)"[\s]*,[\s]*"title"[\s]*:[\s]*"[^"]*"[\s]*,[\s]*"data"[\s]*:[\s]*\[[\s\S]*?\][\s]*\}/gi;
                    let filteredBefore = beforeTag.replace(looseChartJsonRegex, '').trim();
                    filteredBefore = filteredBefore.replace(/^(#{1,6})([^#\s])/gm, '$1 $2');
                    filteredBefore = filteredBefore.replace(/^(#{1,6})\s{2,}/gm, '$1 ');
                    const parsedBefore = (typeof marked !== 'undefined')
                        ? marked.parse(filteredBefore)
                        : escapeHtml(filteredBefore);
                    textNode = `<div class="text-part" id="msgTextPart">${parsedBefore}</div>`;
                }
                if (inReportStream) {
                    // Start with text part only; report block will be created on first content chunk
                    content.innerHTML = textNode +
                        `<div class="loading-indicator" id="msgLoadingIndicator">
                            <div class="loading-spinner"></div>生成分析报告中…
                        </div>`;
                    // Keep scroll at bottom – smooth scroll to conclusion text is disorienting
                    if (!streamingUserScrolledUp) document.getElementById('chatMessages').scrollTop = 99999;
                    // Immediately try to render any report content already buffered
                    const reportInner = assistantText.match(/<report>([\s\S]*)/i);
                    if (reportInner && reportInner[1].trim()) {
                        // Strip closing tag if already present
                        const rawSoFar = reportInner[1].replace(/<\/report>[\s\S]*/i, '');
                        renderReportStream(rawSoFar);
                    }
                } else {
                    // Chart block: show spinner; the loading text will be updated in real time
                    // (per-chunk KB counter) by the inSpecialBlock branch below.
                    content.innerHTML = textNode +
                        `<div class="loading-indicator" id="msgLoadingIndicator">
                            <div class="loading-spinner"></div><span id="chartLoadingText">正在生成图表…</span>
                        </div>`;
                    if (!streamingUserScrolledUp) document.getElementById('chatMessages').scrollTop = 99999;
                }
                return;
            }

            if (inSpecialBlock) {
                // For report blocks: stream the inner content in real time
                if (inReportStream) {
                    const reportInner = assistantText.match(/<report>([\s\S]*)/i);
                    if (reportInner) {
                        // Strip closing tag if already received
                        const rawSoFar = reportInner[1].replace(/<\/report>[\s\S]*/i, '');
                        if (rawSoFar.trim()) renderReportStream(rawSoFar);
                    }
                } else {
                    // Chart JSON accumulating: update the loading text with received byte count
                    // so the user sees progress rather than a frozen spinner.
                    const chartInner = assistantText.match(/<chart>([\s\S]*)/i);
                    if (chartInner) {
                        const received = chartInner[1].replace(/<\/chart>[\s\S]*/i, '').length;
                        const kb = (received / 1024).toFixed(1);
                        const el = document.getElementById('chartLoadingText');
                        if (el) el.textContent = `正在生成图表… (${kb}KB)`;
                    }
                }
                return;
            }

            // Normal streaming: show plain text
            if (!assistantEl) { removeTyping(typingEl); assistantEl = appendMessage('assistant', ''); }
            // Remove tool status line once real text arrives
            const statusLineEl = assistantEl.querySelector('#toolStatusLine');
            if (statusLineEl) statusLineEl.remove();
            updateLastMessage(assistantEl, assistantText);

            // If query_dataset already finished and the LLM is now outputting conclusion text,
            // show a "generating chart…" bar at the bottom of the bubble so the user knows
            // a chart is coming. This prevents the chart from hard-popping in with no warning.
            if (pendingChartLoading && assistantEl) {
                const content = assistantEl.querySelector('.message-content');
                if (content && !content.querySelector('#preChartLoadingBar')) {
                    const bar = document.createElement('div');
                    bar.id = 'preChartLoadingBar';
                    bar.style.cssText =
                        'display:flex;align-items:center;gap:8px;margin-top:8px;'
                        + 'padding:8px 12px;background:var(--surface2);border:1px solid var(--border);'
                        + 'border-radius:var(--radius-sm);font-size:0.78rem;color:var(--text-hint);';
                    bar.innerHTML =
                        '<div style="width:12px;height:12px;flex-shrink:0;border:2px solid var(--border);'
                        + 'border-top-color:var(--primary);border-radius:50%;'
                        + 'animation:spinLoader 0.7s linear infinite;"></div>'
                        + '<span id="preChartText">📊 正在生成图表…</span>';
                    content.appendChild(bar);
                    // Animate dots
                    let _preDots = 0;
                    window._preChartTimer = setInterval(() => {
                        const el = document.getElementById('preChartText');
                        if (!el) { clearInterval(window._preChartTimer); return; }
                        _preDots = (_preDots + 1) % 4;
                        el.textContent = '📊 正在生成图表' + '．'.repeat(_preDots);
                    }, 400);
                }
            }
        };

        eventSource.onerror = () => {
            eventSource.close();
            if (!assistantEl && assistantText === '') {
                removeTyping(typingEl);
                appendMessage('assistant', '（请求出错，请重试）');
                setProcessing(false);
            } else {
                doFinalize();
            }
        };

        const checkDone = setInterval(() => {
            if (eventSource.readyState === EventSource.CLOSED) {
                clearInterval(checkDone); doFinalize();
            }
        }, 300);
    }

    function setProcessing(flag) {
        isProcessing = flag;
        document.getElementById('sendBtn').disabled = flag;
        document.getElementById('chatInput').disabled = flag;
    }

    /* ═══════════════════════ Message helpers ═══════════════════════ */
    function appendMessage(role, text) {
        const container = document.getElementById('chatMessages');
        const div = document.createElement('div');
        div.className = 'message ' + role;
        const label = role === 'user' ? '你' : '助手';
        div.innerHTML = `<span class="message-label">${label}</span><div class="message-content">${escapeHtml(text)}</div>`;
        container.appendChild(div);
        container.scrollTop = container.scrollHeight;
        return div;
    }

    function updateLastMessage(el, text) {
        const content = el.querySelector('.message-content');
        // 过滤掉裸露的图表 JSON（LLM 有时会在 <report> 之前输出 JSON）
        const looseChartJsonRegex = /\{[\s]*"type"[\s]*:[\s]*"(bar|line|pie)"[\s]*,[\s]*"title"[\s]*:[\s]*"[^"]*"[\s]*,[\s]*"data"[\s]*:[\s]*\[[\s\S]*?\][\s]*\}/gi;
        let filteredText = text.replace(looseChartJsonRegex, '').trim();
        // 修复 Markdown 标题格式
        filteredText = filteredText.replace(/^(#{1,6})([^#\s])/gm, '$1 $2');
        filteredText = filteredText.replace(/^(#{1,6})\s{2,}/gm, '$1 ');
        // 使用 marked 渲染 Markdown，纯文本 fallback
        if (typeof marked !== 'undefined') {
            try {
                content.innerHTML = marked.parse(filteredText);
            } catch(e) {
                content.textContent = filteredText;
            }
        } else {
            content.textContent = filteredText;
        }
        // 高亮单独一行的纯数字粗体（精确取数型结果）
        highlightSingleNumber(content);
        if (!streamingUserScrolledUp) {
            document.getElementById('chatMessages').scrollTop = 99999;
        }
    }

    function finalizeMessage(el, fullText) {
        const chartRegex   = /<chart>\s*([\s\S]*?)\s*<\/chart>/i;
        const reportRegex  = /<report>\s*([\s\S]*?)\s*<\/report>/i;
        const confirmRegex = /\[CONFIRM_PLAN\]/;

        const hasConfirm  = confirmRegex.test(fullText);
        const chartMatch  = fullText.match(chartRegex);
        const reportMatch = fullText.match(reportRegex);

        // Strip all special tokens/blocks from plain text
        let textPart = fullText
            .replace(chartRegex, '')
            .replace(reportRegex, '')
            .replace(confirmRegex, '')
            .trim();

        // 移除不在 <chart> 标签内的裸露图表 JSON（LLM 有时会把 JSON 输出在错误的位置）
        // 匹配类似 {"type":"bar","title":...,"data":[...]} 的 JSON
        const looseChartJsonRegex = /\{[\s]*"type"[\s]*:[\s]*"(bar|line|pie)"[\s]*,[\s]*"title"[\s]*:[\s]*"[^"]*"[\s]*,[\s]*"data"[\s]*:[\s]*\[[\s\S]*?\][\s]*\}/gi;
        textPart = textPart.replace(looseChartJsonRegex, '').trim();

        // 修复 Markdown 标题格式：将 `#标题` 替换为 `# 标题`
        textPart = textPart.replace(/^(#{1,6})([^#\s])/gm, '$1 $2');
        // 修复 Markdown 标题格式：将 `#  标题`（多个空格）替换为 `# 标题`
        textPart = textPart.replace(/^(#{1,6})\s{2,}/gm, '$1 ');

        let chartHtml = '';
        if (chartMatch) {
            try { chartHtml = buildChartHtml(JSON.parse(chartMatch[1].trim())); } catch (e) {}
        }

        let reportHtml = '';
        let reportRawContent = '';
        if (reportMatch) {
            let raw = reportMatch[1].trim();
            // 修复 Markdown 标题格式：将 `#标题` 替换为 `# 标题`
            raw = raw.replace(/^(#{1,6})([^#\s])/gm, '$1 $2');
            // 修复 Markdown 标题格式：将 `#  标题`（多个空格）替换为 `# 标题`
            raw = raw.replace(/^(#{1,6})\s{2,}/gm, '$1 ');
            reportRawContent = raw; // 保存原始 Markdown 内容用于下载
            // 用 marked.js 将 Markdown 转为 HTML
            let parsedHtml = '';
            try {
                parsedHtml = typeof marked !== 'undefined'
                    ? marked.parse(raw)
                    : `<pre style="white-space:pre-wrap">${escapeHtml(raw)}</pre>`;
            } catch(e) {
                parsedHtml = `<pre style="white-space:pre-wrap">${escapeHtml(raw)}</pre>`;
            }
            const reportId = 'report_' + Math.random().toString(36).substr(2, 9);
            const downloadBtnsHtml = `
                <div class="report-actions">
                    <button class="report-download-btn" data-report-id="${reportId}">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
                        Markdown
                    </button>
                    <button class="report-download-btn primary" data-report-id="${reportId}">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
                        HTML报告
                    </button>
                </div>`;
            reportHtml = `<div class="report-block" id="${reportId}" data-raw-content="">${parsedHtml}${downloadBtnsHtml}</div>`;
        }

        const content = el.querySelector('.message-content');

        if (reportHtml || chartHtml) {
            // Clear chart loading timers if running
            if (window._chartLoadingTimer) { clearInterval(window._chartLoadingTimer); window._chartLoadingTimer = null; }
            if (window._preChartTimer) { clearInterval(window._preChartTimer); window._preChartTimer = null; }
            content.classList.add('has-chart');

            // ── Surgical DOM update: avoid full innerHTML replace so CSS animations fire ──
            // 1. Remove the loading indicator (spinner shown while chart JSON was buffering)
            const loadingEl = content.querySelector('#msgLoadingIndicator');
            if (loadingEl) loadingEl.remove();
            // Remove any pre-chart bar that may still be in the DOM
            const preChartEl = content.querySelector('#preChartLoadingBar');
            if (preChartEl) preChartEl.remove();

            // 2. Ensure the text-part div is present (it might not exist yet if LLM had no
            //    preamble text before the <chart>/<report> tag).
            if (textPart) {
                let textPartEl = content.querySelector('.text-part');
                if (!textPartEl) {
                    textPartEl = document.createElement('div');
                    textPartEl.className = 'text-part';
                    content.prepend(textPartEl);
                }
                // 使用 marked 渲染 Markdown 格式的普通文本
                if (typeof marked !== 'undefined') {
                    try {
                        textPartEl.innerHTML = marked.parse(textPart);
                    } catch(e) {
                        textPartEl.textContent = textPart;
                    }
                } else {
                    textPartEl.textContent = textPart;
                }
            }

            // 3. Append report block (replace existing streaming block if present)
            if (reportHtml) {
                const existingReport = content.querySelector('.report-block');
                if (existingReport) existingReport.remove();
                const reportEl = document.createElement('div');
                reportEl.innerHTML = reportHtml;
                const reportBlock = reportEl.firstElementChild;
                // 设置原始内容到data属性
                reportBlock.dataset.rawContent = reportRawContent;
                content.appendChild(reportBlock);
                
                // 为下载按钮添加事件监听
                reportBlock.querySelectorAll('.report-download-btn').forEach(btn => {
                    btn.addEventListener('click', function() {
                        const rawContent = this.closest('.report-block').dataset.rawContent;
                        if (this.classList.contains('primary')) {
                            downloadHtmlReport(rawContent);
                        } else {
                            downloadMarkdownReport(rawContent);
                        }
                    });
                });
            }

            // 4. Append chart wrapper as a NEW element so the CSS fade-in animation triggers.
            //    Using innerHTML on a temp div then moving the child preserves animation.
            if (chartHtml) {
                const tmp = document.createElement('div');
                tmp.innerHTML = chartHtml;
                const chartEl = tmp.firstElementChild;
                content.appendChild(chartEl);
                // Force a reflow so the animation restart is guaranteed
                void chartEl.offsetWidth;
                // 初始化ECharts图表
                requestAnimationFrame(() => {
                    initAllCharts();
                });
            }

            requestAnimationFrame(() => {
                document.getElementById('chatMessages').scrollTop = 99999;
            });
        } else {
            // 没有报告/图表时，也用 marked 渲染 Markdown
            const textToRender = textPart || fullText;
            if (typeof marked !== 'undefined') {
                try {
                    content.innerHTML = marked.parse(textToRender);
                } catch(e) {
                    content.textContent = textToRender;
                }
            } else {
                content.textContent = textToRender;
            }
        }

        // 高亮单独一行的纯数字粗体（精确取数型结果）
        highlightSingleNumber(content);

        // Render confirm-plan action buttons (fallback: triggered by LLM token)
        // Primary injection happens via plan SSE (renderPlan); this is the backup path.
        // Skip if user already made a decision (confirmDecided) to avoid re-injection.
        if (hasConfirm && !confirmDecided && !content.querySelector('.confirm-actions')) {
            const wrapDiv = document.createElement('div');
            wrapDiv.className = 'confirm-actions-wrap';
            wrapDiv.innerHTML = `
                <div class="confirm-actions-label">
                    <svg class="confirm-actions-label-icon" viewBox="0 0 16 16" fill="none" xmlns="http://www.w3.org/2000/svg">
                        <circle cx="8" cy="8" r="7" stroke="currentColor" stroke-width="1.4"/>
                        <path d="M8 5v3.5L10 10" stroke="currentColor" stroke-width="1.4" stroke-linecap="round"/>
                    </svg>
                    计划已就绪，请确认是否执行
                </div>
                <div class="confirm-actions">
                    <button class="confirm-btn confirm-yes" onclick="sendConfirm(this, '\u6267\u884c')">✅ 执行计划</button>
                    <button class="confirm-btn confirm-no"  onclick="sendConfirm(this, '\u4e0d\u6267\u884c')">❌ 不执行</button>
                </div>`;
            content.appendChild(wrapDiv);
        }

        // 在消息气泡下方追加推荐问题（仅非确认类回复）
        // 插入到 el（.message.assistant）内部、消息气泡之后，避免撑高内容区
        if (!hasConfirm && suggestedQuestions.length > 0 && !el.querySelector('.post-report-sugg')) {
            const chips = suggestedQuestions.map(q =>
                `<button class="post-report-sugg-chip" onclick="sendSuggestionText(this)">${escapeHtml(q)}</button>`
            ).join('');
            const suggDiv = document.createElement('div');
            suggDiv.className = 'post-report-sugg';
            suggDiv.innerHTML = `
                <div class="post-report-sugg-label">继续提问</div>
                <div class="post-report-sugg-scroll">${chips}</div>`;
            el.appendChild(suggDiv);
        }

        // Scroll to bottom only when there is no report/chart block;
        // report/chart scrolling is handled above with scrollIntoView.
        if (!reportHtml && !chartHtml) {
            document.getElementById('chatMessages').scrollTop = 99999;
        }
    }

    function appendTyping() {
        const container = document.getElementById('chatMessages');
        const div = document.createElement('div');
        div.className = 'message assistant';
        div.innerHTML = `<span class="message-label">助手</span>
            <div class="typing-indicator">
                <span class="typing-dot"></span><span class="typing-dot"></span><span class="typing-dot"></span>
            </div>`;
        container.appendChild(div);
        container.scrollTop = container.scrollHeight;
        return div;
    }

    function removeTyping(el) { if (el && el.parentNode) el.parentNode.removeChild(el); }
    function escapeHtml(t) { return t.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

    // 高亮单独一行的纯数字粗体（精确取数型结果）
    // 匹配模式：<p><strong>数字</strong></p>，其中数字只包含数字、逗号、小数点、百分号、空格
    function highlightSingleNumber(contentEl) {
        if (!contentEl) return;
        const paragraphs = contentEl.querySelectorAll('p');
        paragraphs.forEach(p => {
            const strong = p.querySelector('strong');
            // 确保 p 标签内只有一个 strong 子元素，且没有其他文本节点
            if (strong && p.children.length === 1 && p.childNodes.length === 1) {
                const text = strong.textContent.trim();
                // 检查是否为纯数字格式（允许逗号、小数点、百分号、空格）
                // 例如：168,613,795 或 85.6% 或 1,234.56
                if (/^[\d,\.\s%]+$/.test(text) && /\d/.test(text)) {
                    p.classList.add('single-number');
                }
            }
        });
    }

    // 初始化 marked.js：开启 GFM（表格/任务列表等）和换行符支持
    if (typeof marked !== 'undefined') {
        marked.setOptions({ gfm: true, breaks: true });
        console.log('[DEBUG] marked.js 加载成功，版本:', marked.version || 'unknown');
    } else {

        window.addEventListener('load', function() {

            warning.style.cssText = 'position:fixed;top:0;left:0;right:0;background:#ff4444;color:#fff;padding:10px;text-align:center;z-index:9999;font-size:14px;';
            warning.textContent = '警告：Markdown 解析库加载失败，报告将无法正确显示格式';
            document.body.appendChild(warning);

    /* ═══════════════════════ ECharts Engine ═══════════════════════ */
    const CHART_COLORS = [
        '#1a73e8','#ea4335','#fbbc04','#34a853','#9c27b0',
        '#ff6d00','#00bcd4','#795548','#607d8b','#e91e63'
    ];

    // 存储图表实例的映射表，用于切换图表/表格时销毁旧实例
    const chartInstances = new Map();

    function buildChartHtml(def) {
        if (!def || !Array.isArray(def.data) || def.data.length === 0) return '';
        const chartId = 'echarts_' + Math.random().toString(36).substr(2, 9);
        const tableId = 'table_' + Math.random().toString(36).substr(2, 9);
        
        // 构建工具栏HTML
        const toolbarHtml = `
            <div class="chart-toolbar">
                <button class="chart-tool-btn active" onclick="switchToChart('${chartId}', '${tableId}', this)" title="图表视图">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="18" height="18" rx="2"/><path d="M3 9h18M9 21V9"/></svg>
                </button>
                <button class="chart-tool-btn" onclick="switchToTable('${chartId}', '${tableId}', this)" title="表格视图">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="18" height="18" rx="2"/><path d="M3 9h18M3 15h18M9 3v18M15 3v18"/></svg>
                </button>
            </div>`;
        
        // 构建ECharts图表容器（JSON存入双引号属性，对"转义为&quot;以防止属性值截断）
        const safeJson = JSON.stringify(def).replace(/"/g, '&quot;');
        const chartHtml = `<div class="chart-container" id="${chartId}" data-chart-def="${safeJson}"></div>`;
        // 构建表格容器（默认隐藏）
        const tableHtml = `<div class="data-table-container" id="${tableId}" style="display:none;">${buildDataTable(def)}</div>`;
        
        return `<div class="chart-wrapper">
            <div class="chart-header">
                <div class="chart-title">${escapeHtml(def.title || '数据可视化')}</div>
                ${toolbarHtml}
            </div>
            ${chartHtml}${tableHtml}</div>`;
    }

    // 切换到图表视图
    function switchToChart(chartId, tableId, btn) {
        const chartEl = document.getElementById(chartId);
        const tableEl = document.getElementById(tableId);
        if (!chartEl || !tableEl) return;
        
        chartEl.style.display = 'block';
        tableEl.style.display = 'none';
        
        // 更新按钮状态
        const toolbar = btn.closest('.chart-toolbar');
        toolbar.querySelectorAll('.chart-tool-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        
        // 重新渲染图表
        renderEChart(chartId);
    }

    // 切换到表格视图
    function switchToTable(chartId, tableId, btn) {
        const chartEl = document.getElementById(chartId);
        const tableEl = document.getElementById(tableId);
        if (!chartEl || !tableEl) return;
        
        chartEl.style.display = 'none';
        tableEl.style.display = 'block';
        
        // 更新按钮状态
        const toolbar = btn.closest('.chart-toolbar');
        toolbar.querySelectorAll('.chart-tool-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        
        // 销毁图表实例以节省内存
        if (chartInstances.has(chartId)) {
            chartInstances.get(chartId).dispose();
            chartInstances.delete(chartId);
        }
    }

    // 构建数据表格HTML
    function buildDataTable(def) {
        if (!def || !Array.isArray(def.data) || def.data.length === 0) return '';
        
        // 获取所有列名
        const columns = ['label', 'value', ...(def.series ? Object.keys(def.series) : [])];
        
        let html = '<table class="data-table"><thead><tr>';
        html += '<th>序号</th>';
        html += '<th>类别</th>';
        html += '<th>数值</th>';
        html += '</tr></thead><tbody>';
        
        def.data.forEach((item, idx) => {
            html += `<tr>`;
            html += `<td>${idx + 1}</td>`;
            html += `<td>${escapeHtml(String(item.label || ''))}</td>`;
            html += `<td>${fmtNum(item.value)}</td>`;
            html += `</tr>`;
        });
        
        html += '</tbody></table>';
        return html;
    }

    // 使用ECharts渲染图表
    function renderEChart(chartId) {
        const chartEl = document.getElementById(chartId);
        if (!chartEl) return;
        
        // 获取图表定义数据
        const defAttr = chartEl.getAttribute('data-chart-def');
        if (!defAttr) return;
        
        let def;
        try {
            // getAttribute 会自动解码 HTML 实体（&quot; -> "），直接 parse 即可
            def = JSON.parse(defAttr);
        } catch(e) {
            console.error('解析图表数据失败:', e);
            return;
        }
        
        // 销毁旧实例
        if (chartInstances.has(chartId)) {
            chartInstances.get(chartId).dispose();
        }
        
        // 创建新实例
        const chart = echarts.init(chartEl);
        chartInstances.set(chartId, chart);
        
        const chartType = (def.type || 'bar').toLowerCase();
        let option;
        
        switch (chartType) {
            case 'line':
                option = buildLineOption(def);
                break;
            case 'pie':
                option = buildPieOption(def);
                break;
            case 'bar':
            default:
                option = buildBarOption(def);
        }
        
        chart.setOption(option);
        
        // 响应窗口大小变化
        const resizeHandler = () => chart.resize();
        window.addEventListener('resize', resizeHandler);
    }

    // 格式化数字（千位分隔符）
    function formatNumber(num) {
        if (num === null || num === undefined) return '-';
        const n = Number(num);
        if (isNaN(n)) return String(num);
        // 大数字简化
        if (Math.abs(n) >= 1e8) return (n / 1e8).toFixed(1) + '亿';
        if (Math.abs(n) >= 1e4) return (n / 1e4).toFixed(1) + '万';
        // 千位分隔符
        return n.toLocaleString('zh-CN');
    }

    // 下载HTML报告
    async function downloadHtmlReport(content) {
        try {
            const response = await fetch(BASE_PATH + '/api/reports/html', {
                method: 'POST',
                headers: { 'Content-Type': 'text/plain;charset=utf-8' },
                body: content
            });
            
            if (!response.ok) throw new Error('下载失败');
            
            const blob = await response.blob();
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = `report_${new Date().getTime()}.html`;
            document.body.appendChild(a);
            a.click();
            document.body.removeChild(a);
            URL.revokeObjectURL(url);
        } catch (e) {
            console.error('下载HTML报告失败:', e);
            alert('下载失败，请重试');
        }
    }

    /* ═══════════════════════ Plan SSE ═══════════════════════ */
    function connectPlanStream() {
        if (planEventSource) planEventSource.close();
        planEventSource = new EventSource(BASE_PATH + '/api/plan/stream');
        planEventSource.onmessage = (e) => { try { renderPlan(JSON.parse(e.data)); } catch(_) {} };
        planEventSource.onopen = () => updateConnStatus(true);
        planEventSource.onerror = () => { updateConnStatus(false); setTimeout(connectPlanStream, 3000); };
    }

    async function fetchCurrentPlan() {
        try { renderPlan(await (await fetch(BASE_PATH + '/api/plan')).json()); } catch(_) {}
    }

    /* ═══════════════════════ Plan render ═══════════════════════ */

    // Show pending state immediately after sendMessage (before any plan SSE arrives)
    // NOTE: No longer called directly – drawer is only shown when plan data arrives.
    function showPlanPending() {
        const hintEl    = document.getElementById('drawerHint');
        const emptyEl   = document.getElementById('emptyPlan');
        const contentEl = document.getElementById('planContent');
        const progressWrap = document.getElementById('drawerProgressWrap');

        hintEl.classList.add('hint-generating');
        hintEl.classList.remove('hint-running', 'hint-done');
        const _hintTxtPending = hintEl.querySelector('#drawerHintText');
        if (_hintTxtPending) _hintTxtPending.textContent = '🔄 正在生成任务计划…';

        emptyEl.style.display = 'none';
        contentEl.style.display = 'block';
        progressWrap.style.display = 'none';
        contentEl.innerHTML = `
            <div class="plan-generating-wrap">
                <div class="plan-generating-spinner"></div>
                <p>智能体正在分析数据集<br>并生成任务计划，请稍候…</p>
            </div>`;

        // 不再主动展开面板：setDrawerHasPlan / expandDrawer 由 renderPlan 控制
        setPlanGenerating(true);
    }

    // Called when doFinalize fires and no plan was ever pushed (Case A: direct answer)
    function clearPlanPendingIfNeeded() {
        if (!planPending) return;
        planPending = false;
        setPlanGenerating(false);
        // Restore drawer to previous state (empty or existing plan)
        if (!hasPlan) {
            const emptyEl   = document.getElementById('emptyPlan');
            const contentEl = document.getElementById('planContent');
            const hintEl    = document.getElementById('drawerHint');
            hintEl.classList.remove('hint-generating', 'hint-running', 'hint-done');
            emptyEl.style.display = 'block';
            contentEl.style.display = 'none';
            setDrawerHasPlan(false);
        }
    }

    function renderPlan(plan) {
        const emptyEl      = document.getElementById('emptyPlan');
        const contentEl    = document.getElementById('planContent');
        const progressWrap = document.getElementById('drawerProgressWrap');
        const progressFill = document.getElementById('drawerProgressFill');
        const progressText = document.getElementById('drawerProgressText');
        const hintEl       = document.getElementById('drawerHint');

        if (!plan || !plan.name) {
            // Backend pushed empty/null plan – keep existing content intact
            if (!hasPlan) {
                emptyEl.style.display = 'block';
                contentEl.style.display = 'none';
                progressWrap.style.display = 'none';
            }
            return;
        }

        const subtasks  = plan.subtasks || [];
        const doneCount = subtasks.filter(s => s.state === 'done').length;
        const total     = subtasks.length;
        const pct       = total > 0 ? Math.round(doneCount / total * 100) : 0;
        const isRunning = subtasks.some(s => s.state === 'in_progress');
        const allDone   = total > 0 && doneCount === total;

        // Once real subtasks arrive, clear the pending flag
        if (planPending && total > 0) {
            planPending = false;
            setPlanGenerating(false);
        }

        // ── Confirm buttons: injected by plan SSE, not by LLM token (reliable) ──
        // When the plan is freshly created (all subtasks TODO) and confirmation is needed,
        // inject the action buttons into the last assistant bubble.
        const needConfirm = plan.needConfirm === true;
        if (needConfirm && !confirmDecided) {
            const msgs = document.getElementById('chatMessages');
            // Find the last assistant message bubble
            const allBubbles = msgs ? msgs.querySelectorAll('.message.assistant .message-content') : [];
            const lastBubble = allBubbles.length > 0 ? allBubbles[allBubbles.length - 1] : null;
            if (lastBubble && !lastBubble.querySelector('.confirm-actions')) {
                const wrapDiv = document.createElement('div');
                wrapDiv.className = 'confirm-actions-wrap';
                wrapDiv.innerHTML = `
                    <div class="confirm-actions-label">
                        <svg class="confirm-actions-label-icon" viewBox="0 0 16 16" fill="none" xmlns="http://www.w3.org/2000/svg">
                            <circle cx="8" cy="8" r="7" stroke="currentColor" stroke-width="1.4"/>
                            <path d="M8 5v3.5L10 10" stroke="currentColor" stroke-width="1.4" stroke-linecap="round"/>
                        </svg>
                        计划已就绪，请确认是否执行
                    </div>
                    <div class="confirm-actions">
                        <button class="confirm-btn confirm-yes" onclick="sendConfirm(this, '\u6267\u884c')">✅ 执行计划</button>
                        <button class="confirm-btn confirm-no"  onclick="sendConfirm(this, '\u4e0d\u6267\u884c')">❌ 不执行</button>
                    </div>`;
                lastBubble.appendChild(wrapDiv);
                if (msgs) msgs.scrollTop = 99999;
            }
        }

        // ── Hint strip ──
        hintEl.classList.toggle('hint-generating', planPending && total === 0);
        hintEl.classList.toggle('hint-running',    isRunning && !allDone && !planPending);
        hintEl.classList.toggle('hint-done',       allDone);
        const hintTextEl = document.getElementById('drawerHintText');
        if (allDone) {
            if (hintTextEl) hintTextEl.textContent = '✅ 任务查询已完成，点击查看';
        } else if (planPending && total === 0) {
            if (hintTextEl) hintTextEl.textContent = '🔄 正在生成任务计划…';
        } else if (isRunning) {
            if (hintTextEl) hintTextEl.textContent = `⚙️ 子任务执行中（${doneCount}/${total}）`;
        } else {
            if (hintTextEl) hintTextEl.textContent = '📋 任务计划已生成，点击查看';
        }

        // ── Show drawer ──
        setDrawerHasPlan(true);
        // 展开策略：
        // · needConfirm=true（计划完整生成，等待用户确认）→ 强制收起面板（无论当前是否展开），让用户看气泡按钮
        // · allDone（所有子任务完成）→ 若面板展开则静默收起，用户回到主界面等待分析报告
        // · 子任务执行中 → 仅当用户已点「执行」（confirmExecuted=true）且未手动收起时才展开
        // · 用户手动收起过（userCollapsed=true）→ 不强制展开
        if (needConfirm) {
            // 强制收起，不受 drawerOpen 状态限制
            drawerOpen = false;
            const _d = document.getElementById('planDrawer');
            if (_d) _d.classList.remove('expanded');
            document.getElementById('drawerOverlay').classList.remove('active');
            syncDrawerPadding();
        } else if (allDone) {
            // 静默收起（不设 userCollapsed），hint strip 变绿提示完成，用户可随时点开查看
            if (drawerOpen) {
                drawerOpen = false;
                const _d = document.getElementById('planDrawer');
                if (_d) _d.classList.remove('expanded');
                document.getElementById('drawerOverlay').classList.remove('active');
                syncDrawerPadding();
            }
        } else if (!drawerOpen && !userCollapsed && confirmExecuted) {
            expandDrawer();
        }

        // ── Body content ──
        emptyEl.style.display = 'none';
        contentEl.style.display = 'block';

        if (planPending && total === 0) {
            // Still generating – keep spinner
            progressWrap.style.display = 'none';
            contentEl.innerHTML = `
                <div class="plan-generating-wrap">
                    <div class="plan-generating-spinner"></div>
                    <p>智能体正在分析数据集<br>并生成任务计划，请稍候…</p>
                </div>`;
            return;
        }

        // ── Progress bar ──
        progressWrap.style.display = 'flex';
        progressFill.style.width = pct + '%';
        progressText.textContent = `${doneCount}/${total}`;

        // ── Plan card with done banner ──
        let html = `<div class="plan-card">
            <div class="plan-card-title">${escapeHtml(plan.name||'')}</div>
            ${plan.description ? `<div class="plan-card-desc">${escapeHtml(plan.description)}</div>` : ''}
            <span class="plan-badge ${plan.state||'todo'}">${stateLabel(plan.state)}</span>
            ${total>0 ? `<div class="progress-bar-wrap"><div class="progress-bar-fill" style="width:${pct}%"></div></div><div class="progress-text">${pct}%</div>` : ''}
        </div>`;

        if (allDone) {
            html += `<div class="plan-done-banner">
                <span class="plan-done-check">✔</span>
                全部 ${total} 个子任务已完成
            </div>`;
        }

        if (subtasks.length > 0) {
            html += `<div class="subtasks-label">子任务 (${total})</div>`;
            subtasks.forEach((st, i) => {
                const icon = stateIcon(st.state);
                html += `<div class="subtask-item">
                    <div class="subtask-num">${i+1}</div>
                    <div class="subtask-icon ${st.state||'todo'}">${icon}</div>
                    <div class="subtask-body">
                        <div class="subtask-name">${escapeHtml(st.name||'')}</div>
                        ${st.description?`<div class="subtask-desc">${escapeHtml(st.description)}</div>`:''}
                        ${st.outcome?`<div class="subtask-outcome">✓ ${escapeHtml(st.outcome)}</div>`:''}
                    </div>
                </div>`;
            });
        }
        contentEl.innerHTML = html;
    }

    function stateLabel(s) {
        return {todo:'待开始',in_progress:'进行中',done:'已完成',abandoned:'已放弃'}[s]||s||'';
    }
    function stateIcon(s) {
        return {todo:'○', in_progress:'', done:'✓', abandoned:'✕'}[s] || '○';
    }

    // Disable/enable input area during plan generation (separate from chat processing)
    let planGenerating = false;
    function setPlanGenerating(flag) {
        planGenerating = flag;
        // Only disable if not already controlled by isProcessing
        if (!isProcessing) {
            document.getElementById('sendBtn').disabled = flag;
            document.getElementById('chatInput').disabled = flag;
            document.getElementById('hintText').textContent =
                flag ? '正在生成任务计划，请稍候…' : '输入问题或点击上方推荐';
        }
    }

    /* ═══════════════════════ Reset ═══════════════════════ */
    async function resetAll() {
        startNewSession();
        try {
            await fetch(BASE_PATH + '/api/reset?sessionId=' + encodeURIComponent(currentSessionId), { method: 'POST' });
        } catch (e) {}
    }

    /* ═══════════════════════ Connection ═══════════════════════ */
    function updateConnStatus(ok) {
        document.getElementById('statusDot').className = 'status-dot' + (ok ? '' : ' disconnected');
    }
</script>
</body>
</html>
